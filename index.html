  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #f5f3ee;
      background-image: radial-gradient(circle, #ccc 1px, transparent 1px);
      background-size: 22px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Kalam', 'Noto Sans TC', sans-serif;
    }

    /* ── 登入遮罩 ───────────────────────────── */
    #login-overlay {
      position: fixed; inset: 0;
      background: rgba(245,243,238,.92);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      transition: opacity .3s;
    }
    #login-overlay.hidden { opacity: 0; pointer-events: none; }
    #login-overlay.gone   { display: none; }

    .login-box {
      background: #fff;
      border: 2.5px solid #1a1a1a;
      border-radius: 12px;
      padding: 40px 44px;
      width: 320px;
      box-shadow: 6px 6px 0 #1a1a1a;
      text-align: center;
    }
    .login-box h2 {
      font-family: 'Kalam', 'Noto Sans TC', sans-serif;
      font-size: 28px; color: #1a1a1a;
      margin-bottom: 28px;
    }
    .login-box h2 span { color: #3b6fd4; }

    .user-select {
      display: flex; gap: 12px; margin-bottom: 16px;
    }
    .user-btn {
      flex: 1; padding: 10px;
      border: 2px solid #ccc; border-radius: 8px;
      background: #fff; cursor: pointer;
      font-size: 15px; font-weight: 600; color: #555;
      transition: all .15s;
    }
    .user-btn:hover { border-color: #3b6fd4; color: #3b6fd4; }
    .user-btn.active {
      border-color: #3b6fd4; background: #ebf0ff; color: #3b6fd4;
    }

    .login-box input[type="password"] {
      width: 100%; padding: 10px 14px;
      border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 15px; color: #333;
      outline: none; transition: border-color .15s;
      margin-bottom: 16px;
    }
    .login-box input[type="password"]:focus { border-color: #3b6fd4; }

    .login-btn {
      width: 100%; padding: 11px;
      background: #1a1a1a; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .login-btn:hover { background: #333; }

    .login-error {
      color: #e53935; font-size: 13px;
      margin-top: 10px; min-height: 18px;
    }

    /* ── 主內容 ─────────────────────────────── */
    #main {
      text-align: center;
      opacity: 0; transition: opacity .4s;
      padding: 40px 20px;
    }
    #main.visible { opacity: 1; }

   .title {
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 24px;

  /* 加入 header-title 的效果 */
  color: var(--ink);
  letter-spacing: 2px;
  -webkit-text-stroke: 1px rgba(45,45,45,0.2);
  transform: rotate(-1deg);
  display: inline-block;
}
 .title .t1 {
  font-size: 72px;
  color: #1a1a1a;
  display: block;
}

.title .t2 {
  font-size: 72px;
  color: #3b6fd4;
  font-style: italic;
  display: block;
}
.title .t1,
.title .t2 {
  letter-spacing: 2px;
  -webkit-text-stroke: 1px rgba(45,45,45,0.2);
}
    .divider {
      width: 80px; height: 2px;
      background: #1a1a1a;
      margin: 0 auto 44px;
    }

    /* ── 卡片格線 ─────────────────────────────── */
    .cards {
      display: flex; gap: 18px;
      flex-wrap: wrap; justify-content: center;
    }

    .card-wrap {
      position: relative;
      width: 104px; height: 120px;
      cursor: pointer;
    }
    .card-wrap::after {
      content: '';
      position: absolute;
      top: 7px; left: 7px;
      width: 100%; height: 100%;
      background: #e0ddd8;
      border: 2.5px solid #1a1a1a;
      border-radius: 4px;
      z-index: 0;
    }
    .card-wrap::before {
      content: '';
      position: absolute;
      top: 3.5px; left: 3.5px;
      width: 100%; height: 100%;
      background: #f0eee9;
      border: 2.5px solid #1a1a1a;
      border-radius: 4px;
      z-index: 1;
    }

    .card {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      background: #fff;
      border: 2.5px solid #1a1a1a;
      border-radius: 4px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px;
      transition: transform .12s;
    }
    .card-wrap:hover .card { transform: translate(-2px, -2px); }
    .card-wrap:active .card { transform: translate(1px, 1px); }

    .card-icon { font-size: 36px; line-height: 1; }
    .card-label {
      font-size: 15px; font-weight: 700; color: #1a1a1a;
      letter-spacing: .05em;
    }

    @media (max-width: 480px) {
      .title .t1, .title .t2 { font-size: 44px; }
      .divider { margin-bottom: 28px; }
      #main { padding: 24px 14px; }
      .cards { gap: 12px; }
      .card-wrap { width: 88px; height: 102px; }
      .card-icon { font-size: 28px; }
      .card-label { font-size: 13px; }
      .login-box { padding: 28px 24px; width: 290px; }
    }
  </style>
</head>
<body>

  <!-- 登入遮罩 -->
  <div id="login-overlay">
    <div class="login-box">
      <h2>Admin<br><span>Hub</span></h2>
      <div class="user-select">
        <button class="user-btn active" data-user="Shu">Shu</button>
        <button class="user-btn"       data-user="Su">Su</button>
      </div>
      <input type="password" id="pw-input" placeholder="輸入密碼">
      <button class="login-btn" id="login-btn">登入</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- 主頁內容 -->
  <div id="main">
    <div class="title">
      <span class="t1">Admin</span>
      <span class="t2">Hub</span>
    </div>
    <div class="divider"></div>
    <div class="cards">
      <div class="card-wrap" onclick="go('menu.html')">
        <div class="card">
          <div class="card-icon">🍽️</div>
          <div class="card-label">菜單</div>
        </div>
      </div>
      <div class="card-wrap" onclick="go('schedule.html')">
        <div class="card">
          <div class="card-icon">📅</div>
          <div class="card-label">班表</div>
        </div>
      </div>
      <div class="card-wrap" onclick="go('estimate.html')">
        <div class="card">
          <div class="card-icon">🦆</div>
          <div class="card-label">預估</div>
        </div>
      </div>
      <div class="card-wrap" onclick="go('price.html')">
        <div class="card">
          <div class="card-icon">🔍</div>
          <div class="card-label">查價</div>
        </div>
      </div>
      <div class="card-wrap" onclick="go('items.html')">
        <div class="card">
          <div class="card-icon">🍱</div>
          <div class="card-label">品項</div>
        </div>
      </div>
      <div class="card-wrap" onclick="go('admin.html')">
        <div class="card">
          <div class="card-icon">⚙️</div>
          <div class="card-label">後台</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    // ── 使用者選擇 ────────────────────────────
    let selectedUser = 'Shu';
    function selectUser(name) {
      selectedUser = name;
      document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.user-btn').forEach(b => {
        if (b.dataset.user === name) b.classList.add('active');
      });
      document.getElementById('pw-input').focus();
    }
    document.querySelectorAll('.user-btn').forEach(btn => {
      btn.addEventListener('click', () => selectUser(btn.dataset.user));
    });

    // ── Firebase 初始化 ───────────────────────
    let auth;
    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      auth = firebase.auth();
    } catch(e) {
      console.error('Firebase 初始化失敗', e);
    }

    // ── 還原登入狀態 ──────────────────────────
    if (localStorage.getItem('adminhub_test_user')) {
      showMain();
    } else if (auth) {
      auth.onAuthStateChanged((user) => { if (user) showMain(); });
    }

    // ── 登入 ──────────────────────────────────
    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('pw-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const pw    = document.getElementById('pw-input').value;
      const errEl = document.getElementById('login-error');
      if (!pw) { errEl.textContent = '請輸入密碼'; return; }
      errEl.textContent = '';

      const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:';
      if (isLocal && pw.toLowerCase() === 'ok') {
        localStorage.setItem('adminhub_test_user', JSON.stringify({
          uid: 'test-' + selectedUser,
          displayName: selectedUser,
          email: USERS[selectedUser] || selectedUser + '@test.local'
        }));
        showMain();
        return;
      }

      const email = USERS[selectedUser];
      document.getElementById('login-btn').textContent = '登入中…';
      try {
        await auth.signInWithEmailAndPassword(email, pw);
        showMain();
      } catch (e) {
        document.getElementById('login-btn').textContent = '登入';
        const msg = {
          'auth/wrong-password':         '密碼錯誤，請再試一次',
          'auth/user-not-found':         '找不到此帳號',
          'auth/invalid-credential':     '帳號或密碼錯誤',
          'auth/unauthorized-domain':    '網域未授權，請在 Firebase Console → Authentication → Settings → 已授權網域 加入此網站網址',
          'auth/network-request-failed': '網路錯誤，請檢查連線',
        }[e.code] || `錯誤：${e.code}`;
        errEl.textContent = msg;
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    }

    function showMain() {
      const overlay = document.getElementById('login-overlay');
      overlay.classList.add('hidden');
      // 加 gone class 確保 overlay 完全從排版中消失，不影響卡片顯示
      setTimeout(() => { overlay.classList.add('gone'); }, 300);
      document.getElementById('main').classList.add('visible');
    }

    function go(page) { window.location.href = page; }
  </script>
</body>
</html>
