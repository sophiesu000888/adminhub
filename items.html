<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bento Item List</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

:root {
  --paper: #fdfbf7;
  --ink: #2d2d2d;
  --s1: #ffffff;
  --s2: #f8f5ef;
  --border2: rgba(45,45,45,0.18);
  --dim: #555;
  --muted: #888;
  --red: #c0392b;
  --act: #27ae60;
  --blue: #2980b9;
  --gold: #b8942a;
  --card-radius: 12px 3px 10px 3px / 3px 10px 3px 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  background-image: radial-gradient(#c8c4bc 1.5px, transparent 1.5px);
  background-size: 20px 20px;
  padding-top: 44px;
}

#page-header { text-align: center; padding: 14px 16px 8px; }
#page-title {
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
  font-size: 2.4rem; font-weight: 700;
  color: var(--ink); letter-spacing: 2px;
  -webkit-text-stroke: 1px rgba(45,45,45,0.2);
  transform: rotate(-1deg);
  display: inline-block; margin-bottom: 8px;
}

#main { padding: 8px 20px 40px; max-width: 1100px; margin: 0 auto; }

/* ── TOOLBAR ── */
.toolbar {
  background: var(--s1);
  border: 2.5px solid var(--ink);
  border-radius: var(--card-radius);
  box-shadow: 4px 4px 0 0 var(--ink);
  padding: 14px 18px;
  margin-bottom: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.toolbar-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.site-btn {
  font-family: 'Kalam', cursive; font-weight: 700; font-size: 32px;
  background: white; color: var(--ink);
  border: 2px solid var(--ink); border-radius: 8px;
  padding: 3px 12px; cursor: pointer;
  box-shadow: 2px 2px 0 0 var(--ink); transition: all .1s;
}
.site-btn:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--ink); }
.site-btn.active { background: var(--ink); color: white; box-shadow: none; transform: translate(2px,2px); }

#search {
  flex: 1; min-width: 160px;
  padding: 6px 12px; border: 2px solid var(--border2);
  border-radius: 8px; font-size: 30px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none; background: var(--s2);
}
#search:focus { border-color: var(--ink); background: white; }

.avail-btn {
  font-size: 28px; font-weight: 700;
  background: white; color: var(--dim);
  border: 1.5px solid var(--border2); border-radius: 20px;
  padding: 3px 12px; cursor: pointer; white-space: nowrap; transition: all .1s;
  font-family: 'Noto Sans TC', sans-serif;
}
.avail-btn.active       { border-color: var(--act); color: var(--act); background: #f0fff4; }
.avail-btn.active-stop  { border-color: var(--red); color: var(--red); background: #fff0f0; }

.stats { font-size: 28px; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; }
.stats strong { color: var(--ink); }

/* ── ADD FORM ── */
.add-form {
  background: var(--s1);
  border: 2.5px solid var(--ink);
  border-radius: var(--card-radius);
  box-shadow: 4px 4px 0 0 var(--ink);
  padding: 14px 18px;
  margin-bottom: 14px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end;
}
.add-form label {
  display: flex; flex-direction: column; gap: 3px;
  font-size: 26px; font-weight: 700; color: var(--dim);
}
.add-form input, .add-form select {
  padding: 6px 9px; border: 2px solid var(--border2);
  border-radius: 6px; font-size: 28px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none; background: var(--s2); color: var(--ink);
  transition: border-color .1s;
}
.add-form input:focus, .add-form select:focus { border-color: var(--ink); background: white; }
.add-form .f-site  { width: 130px; }
.add-form .f-name  { min-width: 200px; }
.add-form .f-price { width: 120px; }
.add-form .f-box   { min-width: 180px; }
.add-form .f-note  { min-width: 180px; }

.btn {
  font-family: 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 30px;
  background: var(--ink); color: white;
  border: 2px solid var(--ink); border-radius: 8px;
  padding: 7px 18px; cursor: pointer;
  box-shadow: 2px 2px 0 0 var(--ink); transition: all .1s; white-space: nowrap;
}
.btn:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--ink); }

/* ── TABLE ── */
.tbl-wrap {
  background: var(--s1);
  border: 2.5px solid var(--ink);
  border-radius: var(--card-radius);
  box-shadow: 4px 4px 0 0 var(--ink);
  overflow: hidden;
}

table {
  width: 100%; border-collapse: collapse; font-size: 28px;
}

thead th {
  background: var(--ink); color: white;
  padding: 10px 12px; text-align: left; font-weight: 700;
  font-size: 26px; letter-spacing: 1px; white-space: nowrap;
  position: sticky; top: 44px; z-index: 2;
}
thead th:first-child { width: 36px; text-align: center; }
thead th.col-site  { width: 100px; }
thead th.col-name  { min-width: 200px; }
thead th.col-price { width: 100px; }
thead th.col-cat   { width: 130px; }
thead th.col-box   { width: 180px; }
thead th.col-avail { width: 110px; text-align: center; }
thead th.col-del   { width: 50px; text-align: center; }

tbody tr {
  border-bottom: 1px solid var(--border2);
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f5f2ea; }
tbody tr.unavail { opacity: .5; }

tbody td {
  padding: 10px 12px; vertical-align: middle;
}
tbody td:first-child { text-align: center; }

/* site badge */
.site-badge {
  display: inline-block; font-size: 24px; font-weight: 700;
  background: var(--ink); color: white;
  padding: 2px 10px; border-radius: 5px;
}

/* editable cells */
.editable {
  outline: none; display: block; width: 100%;
  min-height: 28px; border-radius: 4px;
  padding: 2px 4px; transition: background .1s;
}
.editable:hover  { background: #eef4ff; cursor: text; }
.editable:focus  { background: #ddeeff; }
.editable[data-ph]:empty::before { content: attr(data-ph); color: #ccc; font-style: italic; }

/* price cell */
.price-val { color: var(--blue); font-weight: 700; font-size: 30px; }

/* avail toggle */
.avail-toggle {
  display: inline-block; font-size: 24px; font-weight: 700;
  padding: 3px 12px; border-radius: 12px; cursor: pointer;
  border: 1.5px solid var(--act); color: var(--act); background: #f0fff4;
  transition: all .1s; white-space: nowrap;
  font-family: 'Noto Sans TC', sans-serif;
}
.unavail .avail-toggle { border-color: var(--muted); color: var(--muted); background: var(--s2); }

/* del btn */
.del-btn {
  background: none; border: none; cursor: pointer;
  color: var(--border2); font-size: 28px; padding: 2px 5px; border-radius: 4px;
  transition: color .1s; line-height: 1;
}
.del-btn:hover { color: var(--red); }

/* group header row */
tr.group-row td {
  background: var(--s2); padding: 8px 14px;
  font-weight: 700; font-size: 26px; color: var(--dim);
  letter-spacing: 1px; border-bottom: 1px solid var(--border2);
}

#empty-msg {
  text-align: center; padding: 40px; color: var(--muted); font-size: 30px;
}
</style>
</head>
<body>

<div id="page-header">
  <div id="page-title">便當品項管理</div>
</div>

<div id="main">

  <!-- 新增表單 -->
  <div class="add-form">
    <label>廠區
      <select class="f-site" id="f-site">
        <option>央廚</option>
        <option>群聯</option>
        <option>台積</option>
        <option>F20</option>
        <option>AP6B</option>
        <option>聯電</option>
        <option>P8</option>
      </select>
    </label>
    <label>品項名稱
      <input class="f-name" id="f-name" placeholder="e.g. 烤鴨飯">
    </label>
    <label>價格
      <input class="f-price" id="f-price" placeholder="120" type="number" min="0">
    </label>
    <label>類別
      <input class="f-cat" id="f-cat" placeholder="e.g. 雞">
    </label>
    <label>餐盒
      <input class="f-box" id="f-box" placeholder="e.g. 圓形鋁盒">
    </label>
    <button class="btn" onclick="addItem()" style="align-self:flex-end;">＋ 新增</button>
  </div>

  <!-- 工具列 -->
  <div class="toolbar">
    <div class="toolbar-row">
      <span style="font-size:14px;font-weight:700;color:var(--dim);white-space:nowrap;">廠區</span>
      <div id="site-filter-btns" style="display:flex;flex-wrap:wrap;gap:5px;">
        <button class="site-btn active" data-site="">全部</button>
        <button class="site-btn" data-site="央廚">央廚</button>
        <button class="site-btn" data-site="群聯">群聯</button>
        <button class="site-btn" data-site="台積">台積</button>
        <button class="site-btn" data-site="F20">F20</button>
        <button class="site-btn" data-site="AP6B">AP6B</button>
        <button class="site-btn" data-site="聯電">聯電</button>
        <button class="site-btn" data-site="P8">P8</button>
      </div>
    </div>
    <div class="toolbar-row">
      <input type="text" id="search" placeholder="搜尋品項、類別、餐盒…">
      <button class="avail-btn active" id="btn-all"   onclick="setAvailFilter('all')">全部</button>
      <button class="avail-btn"        id="btn-avail" onclick="setAvailFilter('avail')">供應中</button>
      <button class="avail-btn"        id="btn-stop"  onclick="setAvailFilter('stop')">暫停</button>
      <div class="stats" id="stats"></div>
      <div style="margin-left:auto;display:flex;gap:6px;">
        <button class="btn" style="font-size:26px;padding:5px 14px;background:white;color:var(--act);border-color:var(--act);box-shadow:2px 2px 0 0 var(--act);" onclick="exportExcel()">⬇ 匯出 Excel</button>
        <label class="btn" style="font-size:26px;padding:5px 14px;background:white;color:var(--blue);border-color:var(--blue);box-shadow:2px 2px 0 0 var(--blue);cursor:pointer;">
          ⬆ 匯入 Excel
          <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none;" onchange="importExcel(this)">
        </label>
      </div>
    </div>
  </div>

  <!-- 表格 -->
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th></th>
          <th class="col-site">廠區</th>
          <th class="col-name">品項</th>
          <th class="col-price">價格</th>
          <th class="col-cat">類別</th>
          <th class="col-box">餐盒</th>
          <th class="col-avail">狀態</th>
          <th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="items-tbody"></tbody>
    </table>
    <div id="empty-msg" style="display:none;">沒有符合的品項</div>
  </div>

</div>

<div id="saveToast" class="save-toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="shared.js"></script>
<script>
  const SITES = ['央廚','群聯','台積','F20','AP6B','聯電','P8'];

  let items = [];
  let autoSave;
  let filterSite  = '';
  let filterAvail = 'all';
  let searchQ     = '';
  let _remoteUpdate = false;

  requireAuth((user) => {
    injectStatusBar('items');
    autoSave = makeAutoSave('items', () => items);
    startSync('items', user, (content) => {
      if (!content) return;
      _remoteUpdate = true;
      items = Array.isArray(content) ? content : [];
      render();
      _remoteUpdate = false;
    });
  });

  // ── 廠區篩選 ──
  document.getElementById('site-filter-btns').addEventListener('click', (e) => {
    const btn = e.target.closest('.site-btn');
    if (!btn) return;
    filterSite = btn.dataset.site;
    document.querySelectorAll('.site-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });

  document.getElementById('search').addEventListener('input', (e) => {
    searchQ = e.target.value.toLowerCase();
    render();
  });

  function setAvailFilter(mode) {
    filterAvail = mode;
    document.getElementById('btn-all').classList.toggle('active', mode==='all');
    document.getElementById('btn-avail').classList.toggle('active', mode==='avail');
    document.getElementById('btn-avail').classList.toggle('active-stop', false);
    document.getElementById('btn-stop').classList.toggle('active', false);
    document.getElementById('btn-stop').classList.toggle('active-stop', mode==='stop');
    render();
  }

  // ── 從 note 欄位解析類別 ──
  function getCat(it) {
    if (it.cat) return it.cat;
    // 舊資料從 note 解析 "類別:xxx"
    const m = (it.note||'').match(/類別[:：]([^\s,，]+)/);
    return m ? m[1] : (it.note || '');
  }

  // ── RENDER ──
  function render() {
    const list = items.map((it, ri) => ({ it, ri })).filter(({ it }) => {
      const matchSite  = !filterSite || it.site === filterSite;
      const matchAvail = filterAvail === 'all' ||
                         (filterAvail === 'avail' && it.avail !== false) ||
                         (filterAvail === 'stop'  && it.avail === false);
      const cat = getCat(it).toLowerCase();
      const matchQ = !searchQ ||
                     (it.name||'').toLowerCase().includes(searchQ) ||
                     cat.includes(searchQ) ||
                     (it.box||'').toLowerCase().includes(searchQ) ||
                     (it.site||'').toLowerCase().includes(searchQ);
      return matchSite && matchAvail && matchQ;
    });

    // Stats
    const total = items.length;
    const avail = items.filter(i => i.avail !== false).length;
    document.getElementById('stats').innerHTML =
      `<span>全部 <strong>${total}</strong></span>
       <span style="color:var(--act);">供應中 <strong>${avail}</strong></span>
       <span style="color:var(--muted);">暫停 <strong>${total - avail}</strong></span>`;

    const tbody = document.getElementById('items-tbody');
    const empty = document.getElementById('empty-msg');
    tbody.innerHTML = '';
    empty.style.display = list.length ? 'none' : 'block';

    // 有廠區篩選 or 搜尋 → 直接列出，不分組
    if (filterSite || searchQ) {
      list.forEach(({ it, ri }) => tbody.appendChild(makeRow(it, ri)));
    } else {
      // 依廠區分組
      SITES.forEach(site => {
        const group = list.filter(({ it }) => it.site === site);
        if (!group.length) return;
        const grpRow = document.createElement('tr');
        grpRow.className = 'group-row';
        grpRow.innerHTML = `<td colspan="8">${site}　<span style="font-weight:400;font-size:12px;color:var(--muted);">${group.length} 筆</span></td>`;
        tbody.appendChild(grpRow);
        group.forEach(({ it, ri }) => tbody.appendChild(makeRow(it, ri)));
      });
      // 其他
      const other = list.filter(({ it }) => !SITES.includes(it.site));
      if (other.length) {
        const grpRow = document.createElement('tr');
        grpRow.className = 'group-row';
        grpRow.innerHTML = `<td colspan="8">其他　<span style="font-weight:400;font-size:12px;color:var(--muted);">${other.length} 筆</span></td>`;
        tbody.appendChild(grpRow);
        other.forEach(({ it, ri }) => tbody.appendChild(makeRow(it, ri)));
      }
    }
  }

  function makeRow(it, ri) {
    const isAvail = it.avail !== false;
    const cat = getCat(it);
    const tr = document.createElement('tr');
    tr.className = isAvail ? '' : 'unavail';
    tr.dataset.ri = ri;
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:12px;">${ri + 1}</td>
      <td><span class="site-badge">${esc(it.site||'—')}</span></td>
      <td><span class="editable" contenteditable data-ri="${ri}" data-field="name" data-ph="品項名稱">${esc(it.name)}</span></td>
      <td><span class="editable price-val" contenteditable data-ri="${ri}" data-field="price" data-ph="—">${esc(it.price)}</span></td>
      <td><span class="editable" contenteditable data-ri="${ri}" data-field="cat" data-ph="—">${esc(cat)}</span></td>
      <td><span class="editable" contenteditable data-ri="${ri}" data-field="box" data-ph="—">${esc(it.box)}</span></td>
      <td style="text-align:center;">
        <span class="avail-toggle" onclick="toggleAvail(${ri})">${isAvail ? '供應中' : '已暫停'}</span>
      </td>
      <td style="text-align:center;">
        <button class="del-btn" onclick="delItem(${ri})">✕</button>
      </td>
    `;

    // 監聽 contenteditable 修改
    tr.querySelectorAll('[contenteditable]').forEach(el => {
      el.addEventListener('blur', () => {
        if (_remoteUpdate) return;
        const field = el.dataset.field;
        const val = el.textContent.trim();
        items[+el.dataset.ri][field] = val;
        autoSave();
      });
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
        if (e.key === 'Escape') { el.blur(); }
      });
    });

    return tr;
  }

  // ── CRUD ──
  function addItem() {
    const site  = document.getElementById('f-site').value.trim();
    const name  = document.getElementById('f-name').value.trim();
    const price = document.getElementById('f-price').value.trim();
    const cat   = document.getElementById('f-cat').value.trim();
    const box   = document.getElementById('f-box').value.trim();
    if (!name) { alert('請填入品項名稱'); return; }
    items.unshift({ site, name, price, cat, box, avail: true });
    render(); autoSave();
    ['f-name','f-price','f-cat','f-box'].forEach(id => document.getElementById(id).value = '');
  }

  function toggleAvail(i) {
    items[i].avail = items[i].avail === false;
    render(); autoSave();
  }

  function delItem(i) {
    if (!confirm(`刪除「${items[i].name}」？`)) return;
    items.splice(i, 1);
    render(); autoSave();
  }

  // ── 匯出 Excel ──
  function exportExcel() {
    const rows = items.map(it => ({
      '廠區':   it.site  || '',
      '品項':   it.name  || '',
      '價格':   it.price || '',
      '類別':   getCat(it),
      '餐盒':   it.box   || '',
      '狀態':   it.avail === false ? '暫停' : '供應中',
    }));

    const ws = XLSX.utils.json_to_sheet(rows);

    // 欄寬
    ws['!cols'] = [
      { wch: 8 },  // 廠區
      { wch: 22 }, // 品項
      { wch: 8 },  // 價格
      { wch: 12 }, // 類別
      { wch: 16 }, // 餐盒
      { wch: 8 },  // 狀態
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '品項');
    const date = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `便當品項_${date}.xlsx`);
  }

  // ── 匯入 Excel ──
  function importExcel(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = ''; // reset 讓同一檔案可重複選

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

        if (!rows.length) { alert('Excel 沒有資料'); return; }

        // 欄位對應（容許中文或英文欄名）
        const mapped = rows.map(r => ({
          site:  r['廠區'] || r['site']  || '',
          name:  r['品項'] || r['name']  || '',
          price: String(r['價格'] || r['price'] || ''),
          cat:   r['類別'] || r['cat']   || '',
          box:   r['餐盒'] || r['box']   || '',
          avail: (r['狀態'] || r['avail'] || '供應中') !== '暫停',
        })).filter(r => r.name); // 過濾掉沒有品項名的空行

        if (!mapped.length) { alert('沒有找到有效品項（需有「品項」欄）'); return; }

        const mode = confirm(
          `讀取到 ${mapped.length} 筆品項。\n\n` +
          `確定 → 覆蓋現有全部資料\n取消 → 附加到現有資料末尾`
        );

        if (mode) {
          items = mapped;
        } else {
          items = [...items, ...mapped];
        }

        render();
        autoSave();
        alert(`✅ 已${mode ? '覆蓋匯入' : '附加匯入'} ${mapped.length} 筆品項`);
      } catch(err) {
        alert('匯入失敗：' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
