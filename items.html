        const grpRow = document.createElement('tr');
        grpRow.className = 'group-row ' + sc;
        grpRow.innerHTML = `<td colspan="8" style="background:${col.bg};color:${col.fg};">${esc(site)}　<span style="font-weight:400;font-size:22px;opacity:0.8;">${group.length} items</span></td>`;
        tbody.appendChild(grpRow);
        group.sort((a, b) => {
          const ai = CATS.indexOf(getCat(a.it)), bi = CATS.indexOf(getCat(b.it));
          if (ai === -1 && bi === -1) return 0;
          if (ai === -1) return 1; if (bi === -1) return -1;
          return ai - bi;
        });
        group.forEach(({ it, ri }) => tbody.appendChild(makeRow(it, ri)));
      });
    }
    // 重新套用折疊狀態
    const wrap = document.querySelector('.tbl-wrap');
    if (wrap) wrap.classList.toggle('matrix-site-collapsed', _siteColCollapsed);
  }

  function makeRow(it, ri) {
    const cat = getCat(it);
    const sc = getSiteClass(it.site);
    const cc = getCatClass(cat);
    const tr = document.createElement('tr');
    tr.dataset.ri = ri;
    if (selectedRis.has(ri)) tr.classList.add('selected');
    tr.innerHTML = `
      <td style="text-align:center;">
        <input type="checkbox" class="row-cb" data-ri="${ri}" ${selectedRis.has(ri)?'checked':''} onchange="toggleRow(this)">
      </td>
      <td class="col-site-cell" style="--site-color:${(_SITE_COLORS[parseInt((sc||'site-c0').replace('site-c',''))]||{bg:'#aaa'}).bg}"><span class="site-badge ${sc}">${esc(it.site||'—')}</span></td>
      <td>${esc(it.name)}</td>
      <td class="price-val">${it.price ? '$' + esc(it.price) : '—'}</td>
      <td><span class="cat-badge ${cc}">${esc(cat)}</span></td>
      <td>${esc(it.box||'—')}</td>
      <td class="col-time-cell" style="font-size:22px;color:var(--muted);white-space:nowrap;">${(() => { if (!it.updatedAt) return '—'; const d = new Date(it.updatedAt); const p = n => String(n).padStart(2,'0'); return d.getFullYear()+'/'+p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); })()}</td>
      <td style="text-align:center;white-space:nowrap;">
        <button class="edit-btn" onclick="openModal(${ri})">✏️ Edit</button>
        <button class="del-btn" onclick="delItem(${ri})">✕</button>
      </td>
    `;
    return tr;
  }

    const cat = getCat(it);

  // ── 匯出 Excel ──
  function exportExcel() {
    const rows = items.map(it => ({
      '廠區':   it.site  || '',
      '品項':   it.name  || '',
      '價格':   it.price || '',
      '類別':   getCat(it),
      '餐盒':   it.box   || '',
    }));

    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [
      { wch: 8 },  // 廠區
      { wch: 22 }, // 品項
      { wch: 8 },  // 價格
      { wch: 12 }, // 類別
      { wch: 16 }, // 餐盒
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Items');
    const date = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `BentoItemList_${date}.xlsx`);
  }

  // ── 匯入 Excel ──
  function importExcel(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = ''; // reset 讓同一檔案可重複選

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

        if (!rows.length) { alert('Excel 沒有資料'); return; }

        // 欄位對應（容許中文或英文欄名）
        const mapped = rows.map(r => ({
          site:  r['廠區'] || r['site']  || '',
          name:  r['品項'] || r['name']  || '',
          price: String(r['價格'] || r['price'] || ''),
          cat:   r['類別'] || r['cat']   || '',
          box:   r['餐盒'] || r['box']   || '',
          avail: (r['狀態'] || r['avail'] || '供應中') !== '暫停',
        })).filter(r => r.name); // 過濾掉沒有品項名的空行

        if (!mapped.length) { alert('沒有找到有效品項（需有「品項」欄）'); return; }

        const mode = confirm(
          `讀取到 ${mapped.length} 筆品項。\n\n` +
          `確定 → 覆蓋現有全部資料\n取消 → 附加到現有資料末尾`
        );

        if (mode) {
          items = mapped;
        } else {
          items = [...items, ...mapped];
        }

        render();
        autoSave();
        alert(`✅ 已${mode ? '覆蓋匯入' : '附加匯入'} ${mapped.length} 筆品項`);
      } catch(err) {
        alert('匯入失敗：' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }

    // only toggle visible rows
    document.querySelectorAll('#items-tbody input.row-cb').forEach(cb => {
      const ri = parseInt(cb.dataset.ri);
      const tr = cb.closest('tr');

  function syncSelectAll() {
    const all  = document.querySelectorAll('#items-tbody input.row-cb');

    const sa   = document.getElementById('select-all');

    if (_batchField === 'box') {

      if (!confirm(`確定把 ${selectedRis.size} 筆品項的餐盒改為「${val}」？`)) return;
      selectedRis.forEach(ri => { if (items[ri]) items[ri].box = val; });
    } else if (_batchField === 'cat') {
      const val = document.getElementById('batch-cat-input').value;
      if (!val) { alert('請選擇類別'); return; }
      if (!confirm(`確定把 ${selectedRis.size} 筆品項的類別改為「${val}」？`)) return;
      selectedRis.forEach(ri => { if (items[ri]) items[ri].cat = val; });
    } else if (_batchField === 'price') {
      const val = document.getElementById('batch-price-input').value.trim();
      if (!val) { alert('請輸入價格'); return; }
      if (!confirm(`確定把 ${selectedRis.size} 筆品項的價格改為「${val}」？`)) return;
      selectedRis.forEach(ri => { if (items[ri]) items[ri].price = val; });
    } else if (_batchField === 'name') {
      const val = document.getElementById('batch-name-input').value.trim();
      if (!val) { alert('請輸入新品項名稱'); return; }

      selectedRis.forEach(ri => { if (items[ri]) items[ri].name = val; });

  function batchDelete() {
    if (selectedRis.size === 0) return;
    const names = [...selectedRis].slice(0, 5).map(ri => items[ri]?.name).filter(Boolean);
    const preview = names.join('、') + (selectedRis.size > 5 ? `… 等` : '');
    if (!confirm(`確定刪除 ${selectedRis.size} 筆品項？\n（${preview}）\n\n此操作無法復原。`)) return;
    const toDelete = new Set(selectedRis);
    items = items.filter((_, ri) => !toDelete.has(ri));
    selectedRis.clear();
    buildFilterBtns();
    autoSave();
    render();
    if (currentTab === 'matrix') { buildMatrixFilters(); renderMatrix(); }

  // ── 從一覽表 dash-cell 快速新增品項 ──
  function _matrixEditItem(name, site, cat) {
    const matches = items.filter(it => it.name === name && (it.site || '') === site);
    if (!matches.length) return;
    const curPrices = matches.map(it => '$' + it.price).join(' / ');
    const val = prompt(
      `「${site}」×「${name}」\n目前價格：${curPrices}\n\n輸入新價格（留空確定 = 刪除）：`,
      matches[0].price
    );
    if (val === null) return;
    const trimmed = val.trim();
    if (trimmed === '') {
      items = items.filter(it => !(it.name === name && (it.site || '') === site));
    } else {
      if (isNaN(Number(trimmed))) { alert('請輸入數字價格'); return; }
      matches[0].price = trimmed;
      matches[0].updatedAt = Date.now();
      if (matches.length > 1) {
        const keep = matches[0];
        items = items.filter(it => it === keep || !(it.name === name && (it.site || '') === site));
      }
    }
    buildFilterBtns();
    render();
    buildMatrixFilters();
    renderMatrix();
    autoSave();
  }

  function _matrixAddItem(name, site, cat) {
    const _SITE_DEFAULT_PRICES = {
      '3C/P8(健)':    '90',
      '台耀/旭興(健)': '80',
      '揚明光學(健)':  '110',
      '休斯微(風)':    '110',
      '揚明光學(風)':  '110',
    };
    const defaultPrice = _SITE_DEFAULT_PRICES[site] || '';
    const priceStr = prompt(`為「${site}」新增「${name}」的價格：`, defaultPrice);
    if (priceStr === null) return;           // 按取消
    const trimmed = priceStr.trim();
    if (!trimmed) return;                    // 空白不新增
    if (isNaN(Number(trimmed))) { alert('請輸入數字價格'); return; }

    // 廠區含「(健)」→ 固定用十貫牛皮壽司盒，否則找同品項已有的 box
    const box = site.includes('(健)')
      ? '十貫牛皮壽司盒'
      : (items.find(it => it.name === name)?.box || '');

    // 若有同名「無廠區」品項 → 直接取代（而非新增一筆）
    const noSiteIdx = items.findIndex(it => it.name === name && (it.site || '') === '');
    if (noSiteIdx >= 0) {
      items[noSiteIdx] = { ...items[noSiteIdx], site, price: trimmed, box, updatedAt: Date.now() };
    } else {
      items.unshift({ site, name, price: trimmed, cat: cat || '', box, updatedAt: Date.now() });
    }
    buildFilterBtns();
    render();
    buildMatrixFilters();
    renderMatrix();
    autoSave();
  }

  // ── MATRIX FILTERS ──
  let mxFilterSites = new Set();

  function buildMatrixFilters() {
    const allCats  = [...new Set(items.map(i => getCat(i)).filter(Boolean))].sort();

    const cDiv = document.getElementById('mx-cat-btns');
    cDiv.innerHTML = '';
    allCats.forEach(cat => {
      const b = document.createElement('button');
      b.className = 'filter-tag' + (mxFilterCats.has(cat) ? ' active' : '');
      b.textContent = cat;
      b.onclick = () => {
        if (mxFilterCats.has(cat)) { mxFilterCats.delete(cat); b.classList.remove('active'); }
        else { mxFilterCats.add(cat); b.classList.add('active'); }
        renderMatrix();
      };
      cDiv.appendChild(b);
    });
    const clearBtn = document.getElementById('clear-mx-cat-btn');
    if (clearBtn) clearBtn.style.display = mxFilterCats.size > 0 ? '' : 'none';

  function renderMatrix() {
    const clearBtn = document.getElementById('clear-mx-cat-btn');
    if (clearBtn) clearBtn.style.display = mxFilterCats.size > 0 ? '' : 'none';
    const healthyBtn = document.getElementById('mx-healthy-btn');
    if (healthyBtn) healthyBtn.classList.toggle('active', mxFilterHealthy);
    const allSites = [...new Set([...SITES, ...items.map(i => i.site).filter(Boolean)])];
    const visibleSites = mxFilterSites.size > 0
      ? allSites.filter(s => mxFilterSites.has(s))
      : allSites;

    // 更新搜尋清除按鈕
    const searchClearBtn = document.getElementById('clear-mx-search-btn');
    if (searchClearBtn) searchClearBtn.style.display = mxSearchQ ? '' : 'none';

    // 篩選品項
    const filteredItems = items.filter(it => {
      const matchCat     = mxFilterCats.size === 0 || mxFilterCats.has(getCat(it));
      const matchQ       = !mxSearchQ || (it.name||'').toLowerCase().includes(mxSearchQ);
      const matchHealthy = !mxFilterHealthy || it.isHealthy;
      return matchCat && matchQ && matchHealthy && it.name;
    });

    // 依類別分組品項名稱（同名只出現一次）
    const catMap = {}; // cat → Set of names
    filteredItems.forEach(it => {
      const cat = getCat(it) || '其他';
      if (!catMap[cat]) catMap[cat] = new Set();
      catMap[cat].add(it.name);
    });

    // 建立 priceMap: name+site → 價格陣列
    const priceMap = {};
    filteredItems.forEach(it => {
      const key = it.name + '|||' + (it.site || '');
      if (!priceMap[key]) priceMap[key] = [];
      if (it.price) priceMap[key].push(it.price);
    });

    // 哪些品名被標記為健康餐
    const healthyNames = new Set(items.filter(it => it.isHealthy).map(it => it.name));

    const table = document.getElementById('matrix-table');
    table.innerHTML = '';

    // thead
    const thead = document.createElement('thead');
    const hr = document.createElement('tr');
    const th0 = document.createElement('th');
    th0.className = 'th-name'; th0.textContent = '品項';
    hr.appendChild(th0);
    const thH = document.createElement('th');
    thH.textContent = '健康餐'; thH.title = '勾選代表可同時當作健康餐';

  function deduplicateItems() {
    const seen = new Set();
    const before = items.length;
    items = items.filter(it => {
      const key = `${it.site}|||${it.name}|||${it.price}|||${it.box}`;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });
    const removed = before - items.length;
    if (removed === 0) { alert('沒有發現重複資料'); return; }
    buildFilterBtns(); render();
    if (currentTab === 'matrix') { buildMatrixFilters(); renderMatrix(); }

  // ── Render dish list (4欄，食材相似排序，hover tooltip) ──
  function renderDishDB() {
    const tbody = document.getElementById('dish-tbody');
    const stats  = document.getElementById('dish-stats');
    const empty  = document.getElementById('dish-empty-msg');
    if (!tbody) return;

    let entries = Object.entries(DISH_DB);
    const total = entries.length;

    if (dishSearchQ) entries = entries.filter(([k]) => k.toLowerCase().includes(dishSearchQ));
    if (dishFilterCats.size > 0) entries = entries.filter(([, d]) => dishFilterCats.has(d.category));
    if (dishFilterReview) entries = entries.filter(([, d]) => d.review);
    if (dishFilterDone)   entries = entries.filter(([, d]) => !d.review && (d.ingredients||[]).length > 0);

    if (stats) stats.innerHTML = `共 <strong>${total}</strong> 道料理，顯示 <strong>${entries.length}</strong> 筆`;

    tbody.innerHTML = '';
    if (!entries.length) {
      if (empty) empty.style.display = '';
      return;
    }
    if (empty) empty.style.display = 'none';

    // 依類別分組
    const catMap = {};
    entries.forEach(([name, data]) => {
      const cat = data.category || '（未分類）';
      if (!catMap[cat]) catMap[cat] = [];
      catMap[cat].push([name, data]);
    });

    // 食材相似度排序：greedy 近鄰法，讓共同食材多的排在一起
    function sortBySimilarity(rows) {
      if (rows.length <= 1) return rows;
      const getIngs = (data) => new Set((data.ingredients||[]).map(i => i.ingredient||i.name||'').filter(Boolean));
      const similarity = (a, b) => {
        const sa = getIngs(a), sb = getIngs(b);
        if (!sa.size && !sb.size) return 0;
        let common = 0;
        sa.forEach(i => { if (sb.has(i)) common++; });
        return common / Math.max(sa.size, sb.size, 1);
      };
      const sorted = [rows[0]];
      const remaining = rows.slice(1);
      while (remaining.length) {
        const last = sorted[sorted.length - 1];
        let bestIdx = 0, bestScore = -1;
        remaining.forEach(([, d], i) => {
          const s = similarity(last[1], d);
          if (s > bestScore) { bestScore = s; bestIdx = i; }
        });
        sorted.push(remaining.splice(bestIdx, 1)[0]);
      }
      return sorted;
    }

    Object.entries(catMap).sort(([a],[b]) => a.localeCompare(b,'zh-TW')).forEach(([cat, rawRows]) => {
      const rows = sortBySimilarity([...rawRows]);

      // group header
      const grpDiv = document.createElement('div');
      grpDiv.style.cssText = 'background:#5a1a8a;color:white;padding:8px 16px;font-weight:700;font-size:26px;letter-spacing:1px;';
      grpDiv.innerHTML = `${esc(cat)}<span style="font-weight:400;font-size:20px;opacity:.75;margin-left:10px;">${rows.length} 道</span>`;
      tbody.appendChild(grpDiv);

      // 4欄 grid
      const grid = document.createElement('div');
      grid.style.cssText = 'display:grid;grid-template-columns:repeat(4,1fr);';
      rows.forEach(([name, data], idx) => {
        const ingCount = (data.ingredients || []).filter(i => i && (i.ingredient || i.name)).length;
        const isEvenRow = Math.floor(idx / 4) % 2 === 1;
        const cell = document.createElement('div');
        cell.style.cssText = [
          'display:flex;flex-direction:column;justify-content:space-between;gap:6px;',
          'padding:10px 12px;cursor:default;transition:background .1s;',
          'border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);',
          (idx % 4 === 3) ? 'border-right:none;' : '',
          isEvenRow ? 'background:var(--s2);' : '',
        ].join('');

        cell.innerHTML = `
          <div style="font-weight:700;font-size:24px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${esc(name)}">${esc(name)}</div>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap;">
            <div style="display:flex;gap:5px;align-items:center;">
              ${ingCount > 0
                ? `<span style="font-size:18px;color:var(--act);">🥩 ${ingCount}</span>`
                : `<span style="font-size:18px;color:var(--red);">⚠️</span>`}
              ${data.review
                ? `<span style="font-size:16px;font-weight:700;background:#f0e6fb;color:#8e44ad;border:1.5px solid #8e44ad;border-radius:20px;padding:1px 7px;">待確認</span>`
                : ''}
            </div>
            <div style="display:flex;gap:4px;flex-shrink:0;">
              <button class="edit-btn" style="font-size:18px;padding:2px 8px;" onclick="openDishModal('${esc(name).replace(/'/g,"\\'")}')">✏️</button>
              <button class="del-btn" style="font-size:20px;" onclick="deleteDish('${esc(name).replace(/'/g,"\\'")}',event)">✕</button>
            </div>
          </div>
        `;
        // hover → tooltip
        cell.addEventListener('mouseenter', (e) => showDishTip(name, e));
        cell.addEventListener('mousemove',  (e) => _positionDishTip(e));
        cell.addEventListener('mouseleave', hideDishTip);
        grid.appendChild(cell);
      });
      // 補空格讓最後一列滿4欄
      const rem = rows.length % 4;
      if (rem) {
        for (let i = 0; i < 4 - rem; i++) {
          const blank = document.createElement('div');
          blank.style.cssText = 'border-bottom:1px solid var(--border2);background:var(--s2);';
          grid.appendChild(blank);
        }
      }
      tbody.appendChild(grid);
    });
  }

    document.getElementById('dishModal').classList.add('open');
    setTimeout(() => {
      if (!name) document.getElementById('dm-name').focus();
    }, 100);
  }

  function closeDishModal() {
    document.getElementById('dishModal').classList.remove('open');
    _editingDishKey = null;
  }

  function dishModalOverlayClick(e) {
    if (e.target === document.getElementById('dishModal')) closeDishModal();
  }

  // ── Ingredient rows ──
  function renderIngRows(ings) {
    const list = document.getElementById('dm-ing-list');
    list.innerHTML = '';
    (ings || []).forEach((ing, i) => addIngRow(ing));
  }

  // ── 單位管理 ──
  let _unitList = ['g','kg','個','支','隻','片','顆','ml','匙'];
  let _activeUnitWrap = null;

  function _closeAllUnitDropdowns(except) {
    document.querySelectorAll('.unit-dropdown.open').forEach(d => {
      if (d !== except) d.classList.remove('open');
    });
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.unit-wrap')) _closeAllUnitDropdowns(null);
  });

  function _buildUnitDropdown(wrap, inputEl) {
    const dd = wrap.querySelector('.unit-dropdown');
    const optsDiv = dd.querySelector('.unit-opts');
    optsDiv.innerHTML = '';
    _unitList.forEach(u => {
      const opt = document.createElement('div');
      opt.className = 'unit-opt';
      opt.innerHTML = `<span>${esc(u)}</span><button class="unit-opt-del" title="刪除此單位">✕</button>`;
      opt.querySelector('span').addEventListener('click', () => {
        inputEl.value = u;
        dd.classList.remove('open');
      });
      opt.querySelector('.unit-opt-del').addEventListener('click', (e) => {
        e.stopPropagation();
        _unitList = _unitList.filter(x => x !== u);
        _buildUnitDropdown(wrap, inputEl);
        // 更新所有其他已開啟的 unit dropdown
        document.querySelectorAll('.unit-wrap').forEach(w => {
          if (w !== wrap) {
            const inp = w.querySelector('.unit-input');
            _buildUnitDropdown(w, inp);
          }
        });
      });
      optsDiv.appendChild(opt);
    });
  }

  function _makeUnitWrap(currentUnit) {
    const wrap = document.createElement('div');
    wrap.className = 'unit-wrap';
    wrap.innerHTML = `
      <input class="ing-unit unit-input" type="text" value="${esc(currentUnit)}" placeholder="單位" autocomplete="off">
      <div class="unit-dropdown">
        <div class="unit-opts"></div>
        <div class="unit-add-row">
          <input class="unit-add-input" type="text" placeholder="新增單位…">
          <button class="unit-add-btn">＋</button>
        </div>
      </div>
    `;
    const inputEl  = wrap.querySelector('.unit-input');
    const dd       = wrap.querySelector('.unit-dropdown');
    const addInput = wrap.querySelector('.unit-add-input');
    const addBtn   = wrap.querySelector('.unit-add-btn');

    _buildUnitDropdown(wrap, inputEl);

    inputEl.addEventListener('focus', () => {
      _closeAllUnitDropdowns(dd);
      _buildUnitDropdown(wrap, inputEl);
      dd.classList.add('open');
    });
    inputEl.addEventListener('input', () => {
      // 手打時過濾
      const q = inputEl.value.trim().toLowerCase();
      wrap.querySelectorAll('.unit-opt').forEach(opt => {
        opt.style.display = !q || opt.querySelector('span').textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });
    inputEl.addEventListener('blur', (e) => {
      // 延遲，讓 click 事件先觸發
      setTimeout(() => {
        const val = inputEl.value.trim();
        if (val && !_unitList.includes(val)) {
          _unitList.push(val);
        }
        if (!wrap.contains(document.activeElement)) dd.classList.remove('open');
      }, 180);
    });

    const doAdd = () => {
      const val = addInput.value.trim();
      if (!val) return;
      if (!_unitList.includes(val)) {
        _unitList.push(val);
        // 更新所有 unit dropdown
        document.querySelectorAll('.unit-wrap').forEach(w => {
          const inp = w.querySelector('.unit-input');
          _buildUnitDropdown(w, inp);
        });
      }
      inputEl.value = val;
      addInput.value = '';
      dd.classList.remove('open');
    };
    addBtn.addEventListener('click', doAdd);
    addInput.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });

    return wrap;
  }

  function addIngRow(ing) {
    const list = document.getElementById('dm-ing-list');
    const row = document.createElement('div');
    row.className = 'ing-row';
    const name = (ing && (ing.ingredient || ing.name)) || '';
    const qty  = (ing && (ing.grams != null ? ing.grams : ing.qty)) || '';
    const unit = (ing && ing.unit) || 'g';

    const nameInput = document.createElement('input');
    nameInput.className = 'ing-name'; nameInput.type = 'text';
    nameInput.placeholder = '食材名稱'; nameInput.value = esc(String(name));

    const qtyInput = document.createElement('input');
    qtyInput.className = 'ing-qty'; qtyInput.type = 'text';
    qtyInput.placeholder = '用量'; qtyInput.value = esc(String(qty));

    const unitWrap = _makeUnitWrap(unit);

    const delBtn = document.createElement('button');
    delBtn.className = 'ing-del-btn'; delBtn.title = '移除'; delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => row.remove());

    row.appendChild(nameInput);
    row.appendChild(qtyInput);
    row.appendChild(unitWrap);
    row.appendChild(delBtn);
    list.appendChild(row);
    if (!ing) nameInput.focus();
  }

  function collectIngredients() {
    return [...document.querySelectorAll('#dm-ing-list .ing-row')].map(row => ({
      ingredient: row.querySelector('.ing-name').value.trim(),
      grams:      row.querySelector('.ing-qty').value.trim(),
      unit:       row.querySelector('.unit-input').value.trim(),
    })).filter(i => i.ingredient);
  }

  // ── Save dish ──
  function confirmDishEdit() {
    const newName = document.getElementById('dm-name').value.trim();
    if (!newName) { document.getElementById('dm-name').focus(); alert('請輸入料理名稱'); return; }
    const data = {
      category:    document.getElementById('dm-cat').value.trim(),
      review:      document.getElementById('dm-review').checked,
      ingredients: collectIngredients(),
    };
    // 改名：刪除舊 key，寫入新 key
    if (_editingDishKey && _editingDishKey !== newName) {
      delete DISH_DB[_editingDishKey];
    }
    DISH_DB[newName] = data;
    if (autoSaveDish) autoSaveDish();
    closeDishModal();
    buildDishCatBtns();
    renderDishDB();
    showDishToast(data.review
      ? `⚠️ ${newName} 已儲存（待確認）`
      : `✅ ${newName} 已儲存`);
  }

  // ── Delete dish ──
  function deleteDish(name, e) {
    if (e) e.stopPropagation();
    if (!confirm(`確定刪除料理「${name}」？`)) return;
    delete DISH_DB[name];
    if (autoSaveDish) autoSaveDish();
    buildDishCatBtns();
    renderDishDB();
  }

  // ── Toast (reuse or create) ──
  function showDishToast(msg) {
    let t = document.getElementById('saveToast');
    if (!t) {
      t = document.createElement('div');
      t.id = 'saveToast';
      t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2d2d2d;color:white;padding:10px 22px;border-radius:10px;font-size:26px;font-family:\'Noto Sans TC\',sans-serif;font-weight:700;z-index:999999;box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none;transition:opacity .3s;white-space:nowrap;';
      document.body.appendChild(t);
    }
    t.textContent = msg; t.style.opacity = '1';
    clearTimeout(t._to);
    t._to = setTimeout(() => { t.style.opacity = '0'; }, 2200);
  }

  function exportDishExcel() {
    // 建立 CSV 內容
    const rows = [['料理名稱', '類別', '狀態', '食材1', '用量1', '單位1', '食材2', '用量2', '單位2', '食材3', '用量3', '單位3']];
    Object.entries(DISH_DB).sort(([a],[b]) => a.localeCompare(b,'zh-TW')).forEach(([name, data]) => {
      const ings = data.ingredients || [];
      const row = [
        name,
        data.category || '',
        data.review ? '待確認' : '完成',
      ];
      ings.slice(0, 10).forEach(ing => {
        row.push(ing.ingredient || ing.name || '');
        row.push(ing.grams != null ? ing.grams : (ing.qty || ''));
        row.push(ing.unit || 'g');
      });
      rows.push(row);
    });
    const csv = '\uFEFF' + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `料理庫_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.csv`;
    a.click(); URL.revokeObjectURL(url);
    showDishToast('📤 料理庫已匯出');
  }
  window.addToDishDB = function(name, cat, opts) {
    // opts: { review, ingredients, overwrite }
    opts = opts || {};
    if (DISH_DB[name] && !opts.overwrite) {
      if (!confirm(`「${name}」已存在料理庫，要覆蓋嗎？`)) return false;
    }
    DISH_DB[name] = {
      cat: cat || '',
      note: opts.note || '',
      review: opts.review !== false,
      ingredients: opts.ingredients || [],
      updatedAt: Date.now(),
    };
    if (autoSaveDish) autoSaveDish();
    if (currentTab === 'dish') renderDishDB();
    showDishToast(`⚠️ ${name} 已加入料理BD（待確認）`);
    return true;
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('dishModal').classList.contains('open')) {
      closeDishModal();
    }
  });

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
