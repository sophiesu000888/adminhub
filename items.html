<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bento Item List</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

:root {
  --paper: #fdfbf7;
  --ink: #2d2d2d;
  --s1: #ffffff;
  --s2: #f8f5ef;
  --border2: rgba(45,45,45,0.18);
  --dim: #555;
  --muted: #888;
  --red: #c0392b;
  --act: #27ae60;
  --blue: #2980b9;
  --gold: #b8942a;
  --card-radius: 12px 3px 10px 3px / 3px 10px 3px 12px;

  /* 廠區顏色調色盤 */
  --site-c0: #e74c3c; --site-c0t: white;
  --site-c1: #e67e22; --site-c1t: white;
  --site-c2: #f39c12; --site-c2t: white;
  --site-c3: #27ae60; --site-c3t: white;
  --site-c4: #2980b9; --site-c4t: white;
  --site-c5: #8e44ad; --site-c5t: white;
  --site-c6: #16a085; --site-c6t: white;
  --site-c7: #d35400; --site-c7t: white;
  --site-c8: #c0392b; --site-c8t: white;

  /* 類別顏色 */
  --cat-豬: #e8825a; --cat-豬t: white;
  --cat-雞: #f0c040; --cat-雞t: #5a3a00;
  --cat-牛: #c0392b; --cat-牛t: white;
  --cat-鴨: #27ae60; --cat-鴨t: white;
  --cat-雙拼: #8e44ad; --cat-雙拼t: white;
  --cat-舒肥: #2980b9; --cat-舒肥t: white;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  background-image: radial-gradient(#c8c4bc 1.5px, transparent 1.5px);
  background-size: 20px 20px;
  padding-top: 44px;
}

#page-header { text-align: center; padding: 14px 16px 8px; }
#page-title {
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
  font-size: 3.2rem; font-weight: 700;
  color: var(--ink); letter-spacing: 2px;
  -webkit-text-stroke: 1px rgba(45,45,45,0.2);
  transform: rotate(-1deg);
  display: inline-block; margin-bottom: 8px;
}

#main { padding: 8px 20px 40px; }

/* ── TOOLBAR ── */
.toolbar {
  background: var(--s1);
  border: 2.5px solid var(--ink);
  border-radius: var(--card-radius);
  box-shadow: 4px 4px 0 0 var(--ink);
  padding: 14px 18px;
  margin-bottom: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.toolbar-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.site-btn {
  font-family: 'Kalam', cursive; font-weight: 700; font-size: 32px;
  background: white; color: var(--ink);
  border: 2px solid var(--ink); border-radius: 8px;
  padding: 3px 12px; cursor: pointer;
  box-shadow: 2px 2px 0 0 var(--ink); transition: all .1s;
}
.site-btn:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--ink); }
.site-btn.active { background: var(--ink); color: white; box-shadow: none; transform: translate(2px,2px); }

#search {
  flex: 1; min-width: 160px;
  padding: 6px 12px; border: 2px solid var(--border2);
  border-radius: 8px; font-size: 30px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none; background: var(--s2);
}
#search:focus { border-color: var(--ink); background: white; }

.avail-btn {
  font-size: 28px; font-weight: 700;
  background: white; color: var(--dim);
  border: 2px solid var(--border2);
  border-radius: 5px 12px 7px 10px / 10px 7px 12px 5px;
  padding: 3px 12px; cursor: pointer; white-space: nowrap; transition: all .1s;
  font-family: 'Noto Sans TC', sans-serif;
  box-shadow: 2px 2px 0 0 var(--border2);
}
.avail-btn.active       { border-color: var(--act); color: var(--act); background: #f0fff4; box-shadow: 2px 2px 0 0 var(--act); }
.avail-btn.active-stop  { border-color: var(--red); color: var(--red); background: #fff0f0; box-shadow: 2px 2px 0 0 var(--red); }

/* ── MULTI-FILTER TAGS ── */
.filter-tag {
  font-size: 26px; font-weight: 700;
  background: white; color: var(--dim);
  border: 2px solid var(--border2);
  border-radius: 6px 14px 8px 12px / 12px 8px 14px 6px;
  padding: 3px 14px; cursor: pointer; white-space: nowrap; transition: all .15s;
  font-family: 'Noto Sans TC', sans-serif; user-select: none;
  box-shadow: 2px 2px 0 0 var(--border2);
}
.filter-tag:hover { border-color: var(--ink); color: var(--ink); background: #f5f2ea; box-shadow: 2px 2px 0 0 var(--ink); }
.filter-tag.active {
  background: var(--ink); color: white;
  border-color: var(--ink); box-shadow: 2px 2px 0 0 var(--ink);
}
/* 廠區 filter tags — 彩色版 */
.filter-tag.site-tag.active { box-shadow: 2px 2px 0 0 rgba(0,0,0,.35); }
/* 類別 filter tags — 彩色版 */
.filter-tag.cat-tag.active  { box-shadow: 2px 2px 0 0 rgba(0,0,0,.25); }
.filter-row-label {
  font-size: 26px; font-weight: 700; color: var(--muted);
  white-space: nowrap; min-width: 60px;
}
/* 廠區 label */
.toolbar-row:nth-child(1) .filter-row-label { color: #e74c3c; }
/* 類別 label */
.toolbar-row:nth-child(2) .filter-row-label { color: #8e44ad; }
/* 餐盒 label */
.toolbar-row:nth-child(3) .filter-row-label { color: #2980b9; }
.clear-row-btn {
  font-size: 22px; font-weight: 700;
  background: none; color: var(--muted);
  border: 2px solid var(--border2);
  border-radius: 4px 9px 5px 8px / 8px 5px 9px 4px;
  padding: 2px 10px; cursor: pointer; white-space: nowrap;
  font-family: 'Noto Sans TC', sans-serif; transition: all .1s;
  margin-left: 2px;
}
.clear-row-btn:hover { border-color: var(--red); color: var(--red); background: #fff0f0; box-shadow: 2px 2px 0 0 var(--red); }

.stats { font-size: 28px; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; }
.stats strong { color: var(--ink); }

/* ── ADD FORM ── */
.add-form {
  background: var(--s1);
  border: 2.5px solid var(--ink);
  border-radius: var(--card-radius);
  box-shadow: 4px 4px 0 0 var(--ink);
  padding: 14px 18px;
  margin-bottom: 14px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end;
}
.add-form label {
  display: flex; flex-direction: column; gap: 3px;
  font-size: 26px; font-weight: 700; color: var(--dim);
}
.add-form input, .add-form select {
  padding: 6px 9px; border: 2px solid var(--border2);
  border-radius: 6px; font-size: 28px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none; background: var(--s2); color: var(--ink);
  transition: border-color .1s;
}
.add-form input:focus, .add-form select:focus { border-color: var(--ink); background: white; }
.add-form .f-site  { width: 130px; }
.add-form .f-name  { min-width: 200px; }
.add-form .f-price { width: 120px; }
.add-form .f-box   { min-width: 180px; }
.add-form .f-note  { min-width: 180px; }

.btn {
  font-family: 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 30px;
  background: var(--ink); color: white;
  border: 2.5px solid var(--ink);
  border-radius: 4px 10px 5px 9px / 9px 5px 10px 4px;
  padding: 7px 18px; cursor: pointer;
  box-shadow: 3px 3px 0 0 var(--ink); transition: all .1s; white-space: nowrap;
}
.btn:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0 0 var(--ink); }

/* ── TABLE ── */
.tbl-wrap {
  background: var(--s1);
  border: 2.5px solid var(--ink);
  border-radius: var(--card-radius);
  box-shadow: 4px 4px 0 0 var(--ink);
  overflow: auto;
  max-height: 2500px;
}

table {
  width: 100%; border-collapse: collapse; font-size: 28px;
}

thead th {
  background: var(--ink); color: white;
  padding: 10px 12px; text-align: left; font-weight: 700;
  font-size: 26px; letter-spacing: 1px; white-space: nowrap;
  position: sticky; top: 0; z-index: 2;
}
thead th:first-child { width: 36px; text-align: center; }
thead th.col-site  { width: 100px; }
thead th.col-name  { min-width: 200px; }
thead th.col-price { width: 100px; }
thead th.col-cat   { width: 130px; }
thead th.col-box   { width: 220px; white-space: nowrap; }
thead th.col-avail { width: 110px; text-align: center; }
thead th.col-del   { width: 50px; text-align: center; }

tbody tr {
  border-bottom: 1px solid var(--border2);
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f5f2ea; }

tbody td {
  padding: 10px 12px; vertical-align: middle; white-space: nowrap;
}
tbody td:first-child { text-align: center; }

/* site badge */
.site-badge {
  display: inline-block; font-size: 24px; font-weight: 700;
  background: var(--ink); color: white;
  padding: 2px 10px; border-radius: 5px;
}
.site-badge.site-c0 { background: var(--site-c0); color: var(--site-c0t); }
.site-badge.site-c1 { background: var(--site-c1); color: var(--site-c1t); }
.site-badge.site-c2 { background: var(--site-c2); color: #5a3a00; }
.site-badge.site-c3 { background: var(--site-c3); color: var(--site-c3t); }
.site-badge.site-c4 { background: var(--site-c4); color: var(--site-c4t); }
.site-badge.site-c5 { background: var(--site-c5); color: var(--site-c5t); }
.site-badge.site-c6 { background: var(--site-c6); color: var(--site-c6t); }
.site-badge.site-c7 { background: var(--site-c7); color: var(--site-c7t); }
.site-badge.site-c8 { background: var(--site-c8); color: var(--site-c8t); }

/* cat badge in table */
.cat-badge {
  display: inline-block; font-size: 22px; font-weight: 700;
  padding: 1px 10px; border-radius: 20px;
  background: #eee; color: var(--dim);
}
.cat-badge.cat-豬   { background: #fde8de; color: #c0471a; border: 1.5px solid #e8825a; }
.cat-badge.cat-雞   { background: #fff8d6; color: #7a5500; border: 1.5px solid #e0a800; }
.cat-badge.cat-牛   { background: #fde8e8; color: #8b0000; border: 1.5px solid #c0392b; }
.cat-badge.cat-鴨   { background: #e6f7ee; color: #1a5c35; border: 1.5px solid #27ae60; }
.cat-badge.cat-雙拼 { background: #f0e6fb; color: #5a1a8a; border: 1.5px solid #8e44ad; }
.cat-badge.cat-舒肥 { background: #e8f0fb; color: #1a3a7a; border: 1.5px solid #2980b9; }

/* price cell */
.price-val { color: var(--blue); font-weight: 700; }

/* edit / del btns */
.edit-btn {
  background: white; border: 2px solid var(--blue); color: var(--blue);
  border-radius: 4px 9px 5px 8px / 8px 5px 9px 4px;
  font-size: 24px; font-weight: 700; padding: 3px 14px;
  cursor: pointer; font-family: inherit; transition: all .1s;
  box-shadow: 2px 2px 0 0 var(--blue);
}
.edit-btn:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--blue); }

.del-btn {
  background: none; border: none; cursor: pointer;
  color: var(--border2); font-size: 28px; padding: 2px 5px; border-radius: 4px;
  transition: color .1s; line-height: 1;
}
.del-btn:hover { color: var(--red); }

/* ── CHECKBOX ── */
.row-cb { width: 20px; height: 20px; cursor: pointer; accent-color: var(--ink); }
tbody tr.selected { background: #f0eee8 !important; }

/* ── BATCH BAR ── */
#batch-bar {
  display: none;
  position: sticky; bottom: 16px; z-index: 50;
  margin: 10px 0 0;
  background: var(--ink); color: white;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,.35);
  padding: 12px 18px;
  align-items: center; gap: 12px; flex-wrap: wrap;
}
#batch-bar.show { display: flex; }
#batch-count { font-size: 26px; font-weight: 700; white-space: nowrap; }
#batch-box-input {
  flex: 1; min-width: 180px;
  padding: 7px 12px; border-radius: 8px;
  border: 2px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.12); color: white;
  font-size: 26px; font-family: inherit; outline: none;
}
#batch-box-input::placeholder { color: rgba(255,255,255,.5); }
#batch-box-input:focus { border-color: white; background: rgba(255,255,255,.2); }
.batch-btn {
  font-family: inherit; font-weight: 700; font-size: 26px;
  border-radius: 4px 10px 5px 9px / 9px 5px 10px 4px;
  padding: 7px 18px; cursor: pointer;
  border: 2px solid rgba(255,255,255,.4); transition: all .1s; white-space: nowrap;
}
.batch-confirm { background: var(--act); color: white; border-color: var(--act); box-shadow: 2px 2px 0 0 rgba(0,0,0,.3); }
.batch-confirm:hover { background: #1e8449; transform: translate(1px,1px); box-shadow: 1px 1px 0 0 rgba(0,0,0,.3); }
.batch-cancel  { background: transparent; color: rgba(255,255,255,.8); }
.batch-cancel:hover  { background: rgba(255,255,255,.1); }
.batch-field-btn {
  font-family: inherit; font-weight: 700; font-size: 24px;
  border-radius: 4px 10px 5px 9px / 9px 5px 10px 4px;
  padding: 5px 14px; cursor: pointer;
  border: 2px solid rgba(255,255,255,.3); transition: all .1s;
  background: transparent; color: rgba(255,255,255,.7); white-space: nowrap;
}
.batch-field-btn:hover { background: rgba(255,255,255,.1); color: white; }
.batch-field-btn.active { background: white; color: var(--ink); border-color: white; }
.batch-input {
  flex: 1; min-width: 160px;
  padding: 7px 12px; border-radius: 8px;
  border: 2px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.12); color: white;
  font-size: 26px; font-family: inherit; outline: none;
}
.batch-input::placeholder { color: rgba(255,255,255,.5); }
.batch-input:focus { border-color: white; background: rgba(255,255,255,.2); }
.batch-select { background: white !important; color: var(--ink) !important; }

/* group header row */
tr.group-row td {
  padding: 8px 14px;
  font-weight: 700; font-size: 26px; color: white;
  letter-spacing: 1px; border-bottom: 1px solid var(--border2);
  background: var(--ink);
}
tr.group-row.site-c0 td { background: var(--site-c0); }
tr.group-row.site-c1 td { background: var(--site-c1); }
tr.group-row.site-c2 td { background: var(--site-c2); color: #5a3a00; }
tr.group-row.site-c3 td { background: var(--site-c3); }
tr.group-row.site-c4 td { background: var(--site-c4); }
tr.group-row.site-c5 td { background: var(--site-c5); }
tr.group-row.site-c6 td { background: var(--site-c6); }
tr.group-row.site-c7 td { background: var(--site-c7); }
tr.group-row.site-c8 td { background: var(--site-c8); }

#empty-msg {
  text-align: center; padding: 40px; color: var(--muted); font-size: 30px;
}

/* ── EDIT MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(45,45,45,0.5);
  z-index: 99999;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--s1);
  border: 2.5px solid var(--ink);
  border-radius: var(--card-radius);
  box-shadow: 6px 6px 0 0 var(--ink);
  padding: 28px 32px 24px;
  width: min(520px, calc(100vw - 32px));
  animation: slideUp .18s ease;
}
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }

.modal h3 {
  font-size: 28px; font-weight: 700; margin-bottom: 20px;
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
}

.modal-field {
  display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px;
}
.modal-field label {
  font-size: 24px; font-weight: 700; color: var(--dim);
}
.modal-field input,
.modal-field select {
  padding: 8px 12px; border: 2px solid var(--border2);
  border-radius: 6px; font-size: 26px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none; background: var(--s2); color: var(--ink);
  transition: border-color .1s;
}
.modal-field input:focus,
.modal-field select:focus { border-color: var(--ink); background: white; }

.modal-actions {
  display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;
}
.btn-confirm {
  font-family: 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 26px;
  background: var(--ink); color: white;
  border: 2.5px solid var(--ink);
  border-radius: 5px 11px 6px 10px / 10px 6px 11px 5px;
  padding: 7px 24px; cursor: pointer;
  box-shadow: 3px 3px 0 0 var(--ink); transition: all .1s;
}
.btn-confirm:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0 0 var(--ink); }
.btn-cancel {
  font-family: 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 26px;
  background: white; color: var(--dim);
  border: 2px solid var(--border2);
  border-radius: 5px 11px 6px 10px / 10px 6px 11px 5px;
  padding: 7px 24px; cursor: pointer; transition: all .1s;
  box-shadow: 2px 2px 0 0 var(--border2);
}
.btn-cancel:hover { border-color: var(--ink); color: var(--ink); box-shadow: 2px 2px 0 0 var(--ink); }

/* ── TABS ── */
#tab-bar {
  display: flex; gap: 6px; margin-bottom: 14px;
}
.tab-btn {
  font-family: 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 28px;
  padding: 7px 22px;
  border: 2.5px solid var(--ink); cursor: pointer;
  border-radius: 3px 12px 4px 10px / 10px 4px 12px 3px;
  box-shadow: 4px 4px 0 var(--ink); transition: all .1s;
  background: white; color: var(--ink);
}
.tab-btn:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--ink); }
.tab-btn:nth-child(1).active { background: #2980b9; color: white; border-color: #1a5a8a; box-shadow: none; transform: translate(2px,2px); border-radius: 3px 12px 4px 10px / 10px 4px 12px 3px; }
.tab-btn:nth-child(2).active { background: #8e44ad; color: white; border-color: #5a1a8a; box-shadow: none; transform: translate(2px,2px); border-radius: 3px 12px 4px 10px / 10px 4px 12px 3px; }
.tab-btn.active { background: var(--ink); color: white; box-shadow: none; transform: translate(2px,2px); border-radius: 3px 12px 4px 10px / 10px 4px 12px 3px; }

/* ── MATRIX VIEW ── */
#matrix-wrap {
  background: var(--s1);
  border: 2.5px solid var(--ink);
  border-radius: var(--card-radius);
  box-shadow: 4px 4px 0 0 var(--ink);
  overflow: auto;
}
#matrix-wrap table {
  width: auto; min-width: 100%;
  border-collapse: collapse; font-size: 26px;
}
#matrix-wrap thead th {
  background: var(--ink); color: white;
  padding: 10px 14px; text-align: center; font-weight: 700;
  font-size: 24px; white-space: nowrap;
  position: sticky; top: 0; z-index: 2;
}
#matrix-wrap thead th.th-name {
  text-align: left; min-width: 180px;
  position: sticky; left: 0; z-index: 3;
}
#matrix-wrap tbody td {
  padding: 9px 14px; border-bottom: 1px solid var(--border2);
  vertical-align: middle; text-align: center; white-space: nowrap;
}
#matrix-wrap tbody td.td-name {
  text-align: left; font-weight: 700;
  background: var(--s2);
  position: sticky; left: 0; z-index: 1;
  border-right: 1px solid var(--border2);
}
#matrix-wrap tbody tr:nth-child(even) td { background: var(--s2); }
#matrix-wrap tbody tr:nth-child(even) td.td-name { background: #eeebe1; }
#matrix-wrap tbody tr:hover td { background: #f5f2ea; }
#matrix-wrap tbody tr:hover td.td-name { background: #edeae0; }
.price-cell { color: var(--blue); font-weight: 700; }
.dash-cell  { color: var(--muted); }
#matrix-wrap tr.mx-group-row td {
  background: var(--s2); font-weight: 700; font-size: 24px;
  color: var(--red); letter-spacing: 1px;
  border-bottom: 1px solid var(--border2);
  padding: 7px 14px; position: sticky; left: 0;
  text-align: left;
}
/* ── COMBO SELECT (下拉+新增) ── */
.combo-wrap { position: relative; display: inline-flex; gap: 0; }
.combo-wrap select {
  border-radius: 6px 0 0 6px;
  border-right: none;
}
.combo-add-btn {
  font-family: inherit; font-weight: 700; font-size: 26px;
  padding: 6px 10px; border: 2px solid var(--border2);
  border-radius: 0 6px 6px 0; background: var(--s2);
  cursor: pointer; color: var(--dim); line-height: 1;
  transition: all .1s; white-space: nowrap;
}
.combo-add-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
/* ── MANAGE OPTIONS MODAL ── */
#manageModal .modal { width: min(400px, calc(100vw - 32px)); }
.manage-header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; margin-bottom: 16px;
}
.manage-header h3 {
  margin: 0; font-size: 28px; font-weight: 700;
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
}
.manage-done-btn {
  font-family: 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 26px;
  background: var(--ink); color: white;
  border: 2.5px solid var(--ink);
  border-radius: 4px 10px 5px 9px / 9px 5px 10px 4px;
  padding: 6px 20px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  box-shadow: 3px 3px 0 var(--ink); transition: all .1s;
}
.manage-done-btn:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--ink); }
.opt-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; max-height: 260px; overflow-y: auto; }
.opt-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 8px;
  background: var(--s2); border: 1px solid var(--border2);
  font-size: 26px;
}
.opt-row span { flex: 1; }
.opt-del-btn {
  background: none; border: none; cursor: pointer;
  color: var(--border2); font-size: 22px; padding: 2px 6px;
  border-radius: 4px; transition: color .1s; line-height: 1;
  font-family: inherit;
}
.opt-del-btn:hover { color: var(--red); }
.drag-handle {
  cursor: grab; color: var(--muted); font-size: 20px;
  padding: 0 4px; user-select: none; flex-shrink: 0;
}
.drag-handle:active { cursor: grabbing; }
.opt-row.dragging { opacity: .4; }
.opt-row.drag-over { border-color: var(--ink); background: #f0eee8; }
.opt-add-row { display: flex; gap: 6px; align-items: stretch; }
.opt-add-row input {
  flex: 1; min-width: 0;
  padding: 7px 10px; border: 2px solid var(--border2);
  border-radius: 8px; font-size: 26px; font-family: inherit;
  background: var(--s2); outline: none;
}
.opt-add-row input:focus { border-color: var(--ink); background: white; }
.opt-add-row button {
  font-family: inherit; font-weight: 700; font-size: 26px;
  background: var(--ink); color: white;
  border: 2.5px solid var(--ink);
  border-radius: 4px 10px 5px 9px / 9px 5px 10px 4px;
  padding: 7px 16px; cursor: pointer;
  white-space: nowrap; flex-shrink: 0;
  box-shadow: 2px 2px 0 var(--ink); transition: all .1s;
}
.opt-add-row button:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
/* ── SIDE TAB RAIL ── */
.drawer-tabs-rail {
  position: fixed; right: 0; top: 50%; transform: translateY(-50%);
  z-index: 1100; display: flex; flex-direction: column; gap: 4px;
}
.side-tab {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 5px; width: 48px; padding: 15px 0;
  border-radius: 12px 0 0 12px; cursor: pointer; user-select: none;
  box-shadow: -3px 0 8px rgba(0,0,0,.12);
  transition: width .15s, box-shadow .15s;
  border-top: 1.5px solid rgba(45,45,45,.18);
  border-bottom: 1.5px solid rgba(45,45,45,.18);
}
.side-tab:hover { width: 54px; box-shadow: -4px 0 12px rgba(0,0,0,.2); }
.side-tab.open  { width: 54px; box-shadow: -4px 0 12px rgba(0,0,0,.25); }
.side-tab .st-icon  { font-size: 1.38rem; line-height: 1; }
.side-tab .st-label {
  writing-mode: vertical-rl; text-orientation: mixed;
  font-size: 0.87rem; font-weight: 700; letter-spacing: 2px;
  opacity: .9; line-height: 1;
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
}
#tab-add    { background: linear-gradient(160deg, #e6f4e7 0%, #c8edc9 100%); color: #2e7d32; border-left: 3px solid #2e7d32; }
#tab-export { background: linear-gradient(160deg, #e7f0ff 0%, #c5d9ff 100%); color: #2d5da1; border-left: 3px solid #2d5da1; }

/* ── DRAWER OVERLAY ── */
.drawer-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(45,45,45,.25); z-index: 1150;
  backdrop-filter: blur(2px);
}
.drawer-overlay.show { display: block; }

/* ── DRAWER PANEL ── */
.side-drawer {
  position: fixed; top: 0; right: -53vw;
  width: 52vw; max-width: 420px; height: 100vh;
  background-color: var(--paper);
  background-image: radial-gradient(#c8c4bc 1.5px, transparent 1.5px);
  background-size: 20px 20px;
  z-index: 1200; box-shadow: -6px 0 28px rgba(0,0,0,.18);
  transition: right .3s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column; overflow: hidden;
  border-left: 3px solid var(--ink);
}
.side-drawer.open { right: 0; }

/* ── DRAWER HEADER ── */
.drawer-header {
  padding: 20px 24px 17px;
  display: flex; align-items: center; gap: 15px;
  flex-shrink: 0; border-bottom: 2.5px solid var(--ink);
  background: white;
}
.drawer-header h2 {
  font-size: 1.5rem; font-weight: 700; margin: 0; flex: 1;
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
}
.drawer-close-btn {
  background: white; border: 2.5px solid var(--ink); color: var(--ink);
  border-radius: 4px 10px 5px 9px / 9px 5px 10px 4px;
  padding: 6px 15px; font-size: 1rem;
  cursor: pointer; font-family: inherit; font-weight: 700;
  transition: all .1s; box-shadow: 2px 2px 0 var(--ink); white-space: nowrap;
}
.drawer-close-btn:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
#drawer-add    .drawer-header { background: #e6f4e7; border-bottom-color: #2e7d32; }
#drawer-export .drawer-header { background: #e7f0ff; border-bottom-color: #2d5da1; }

/* ── DRAWER BODY ── */
.drawer-body { flex: 1; overflow-y: auto; padding: 20px 22px 28px; }

/* ── ADD DRAWER FIELDS ── */
.add-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.add-field label {
  font-size: 0.9rem; font-weight: 700; color: var(--dim);
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
}
.add-field input, .add-field select {
  padding: 9px 12px; border: 2px solid var(--border2);
  border-radius: 8px; font-size: 1rem;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none; background: white; color: var(--ink);
  transition: border-color .1s; width: 100%;
}
.add-field input:focus, .add-field select:focus { border-color: var(--ink); }
.add-combo { display: flex; }
.add-combo select { border-radius: 8px 0 0 8px; border-right: none; flex: 1; }
.add-combo .combo-add-btn {
  border-radius: 0 8px 8px 0; border: 2px solid var(--border2);
  background: var(--s2); color: var(--dim); font-size: 26px;
  padding: 9px 13px; cursor: pointer; transition: all .1s;
  font-family: inherit; font-weight: 700;
}
.add-combo .combo-add-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
.add-submit {
  width: 100%; margin-top: 8px;
  font-family: 'Kalam', 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 1.1rem;
  background: #2e7d32; color: white;
  border: 2.5px solid #1b5e20;
  border-radius: 5px 14px 7px 12px / 12px 7px 14px 5px;
  padding: 12px 18px; cursor: pointer;
  box-shadow: 3px 3px 0 #1b5e20; transition: all .1s;
}
.add-submit:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0 #1b5e20; }

/* ── EXPORT DRAWER BUTTONS ── */
.exp-btn {
  display: flex; align-items: center; gap: 12px;
  width: 100%; margin-bottom: 12px;
  font-family: 'Kalam', 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 1.05rem;
  border: 2.5px solid var(--ink);
  border-radius: 5px 14px 7px 12px / 12px 7px 14px 5px;
  padding: 12px 20px; cursor: pointer;
  box-shadow: 3px 3px 0 var(--ink); transition: all .1s; background: white;
}
.exp-btn:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--ink); }
.exp-btn.export { background: #f0fff4; color: #1b5e20; border-color: #2e7d32; box-shadow: 3px 3px 0 #2e7d32; }
.exp-btn.export:hover { box-shadow: 2px 2px 0 #2e7d32; transform: translate(1px,1px); }
.exp-btn.import { background: #e7f0ff; color: #1a3a7a; border-color: #2d5da1; box-shadow: 3px 3px 0 #2d5da1; }
.exp-btn.import:hover { box-shadow: 2px 2px 0 #2d5da1; transform: translate(1px,1px); }
.exp-btn .btn-icon { font-size: 1.4rem; }

/* ── POPOVER FILTER ── */
.popover-wrap {
  position: relative; display: inline-block;
}
.popover-trigger {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Noto Sans TC', sans-serif; font-weight: 700; font-size: 28px;
  background: white; color: var(--ink);
  border: 2.5px solid var(--ink);
  border-radius: 4px 10px 5px 9px / 9px 5px 10px 4px;
  padding: 5px 14px; cursor: pointer;
  box-shadow: 3px 3px 0 var(--ink); transition: all .1s;
  white-space: nowrap;
}
.popover-trigger:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--ink); }
.popover-trigger.has-filter { background: var(--ink); color: white; box-shadow: none; transform: translate(2px,2px); }
.popover-trigger.open .pt-arrow { display: inline-block; transform: rotate(180deg); }
.pt-label { pointer-events: none; }
.pt-arrow { font-size: 20px; opacity: .6; transition: transform .15s; pointer-events: none; display: inline-block; }
.pt-badge {
  background: var(--red); color: white;
  font-size: 20px; font-weight: 700;
  border-radius: 50%; width: 26px; height: 26px;
  display: inline-flex; align-items: center; justify-content: center;
  line-height: 1; pointer-events: none;
}
.popover-trigger.has-filter .pt-badge { background: white; color: var(--ink); }
.popover-panel {
  display: none;
  position: absolute; top: calc(100% + 8px); left: 0;
  z-index: 900;
  background: white;
  border: 2.5px solid var(--ink);
  border-radius: 4px 12px 10px 8px / 8px 10px 12px 4px;
  box-shadow: 5px 5px 0 var(--ink);
  padding: 12px 16px 14px;
  min-width: 260px; max-width: 440px;
  animation: popIn .15s ease;
}
.popover-panel.open { display: block; }
@keyframes popIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.pp-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; font-size: 24px;
}
.pp-clear {
  font-family: 'Noto Sans TC', sans-serif; font-size: 22px; font-weight: 700;
  background: none; color: var(--muted);
  border: 1.5px solid var(--border2);
  border-radius: 4px 8px 5px 7px / 7px 5px 8px 4px;
  padding: 2px 10px; cursor: pointer; transition: all .1s;
}
.pp-clear:hover { color: var(--red); border-color: var(--red); background: #fff0f0; }
.pp-tags { display: flex; flex-wrap: wrap; gap: 6px; }

@media print {
  @page { size: A4 portrait; margin: 8mm; }
  body { background: white !important; background-image: none !important; padding-top: 0 !important; margin: 0 !important; }
  #page-header, #tab-bar, .toolbar, .drawer-tabs-rail, .side-drawer, .drawer-overlay, #saveToast, #editModal, #manageModal { display: none !important; }
  #status-bar, [id^="status-bar"], [class*="status-bar"] { display: none !important; }
  #list-view { display: none !important; }
  #main { padding: 0 !important; }
  #matrix-view { display: block !important; }
  #matrix-wrap { overflow: visible !important; max-height: none !important; border: none !important; box-shadow: none !important; width: 100% !important; }
  #matrix-table { transform-origin: top left; page-break-inside: auto; }
  #matrix-wrap tr.mx-group-row { page-break-after: avoid; }
  #matrix-wrap tr { page-break-inside: avoid; }
  #matrix-wrap thead th { position: static !important; background: #2d2d2d !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  #matrix-wrap tbody tr:nth-child(odd)  td { background: #ffffff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  #matrix-wrap tbody tr:nth-child(even) td { background: #edeae0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  #matrix-wrap tbody td.td-name { position: static !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  #matrix-wrap tr.mx-group-row td { background: #2d2d2d !important; color: #ff9999 !important; font-weight: 700 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr { page-break-inside: avoid; }
}
</style>
</head>
<body>

<div id="page-header">
  <div id="page-title">Bento Item List</div>
</div>

<div id="main">

  <!-- 頁籤 -->
  <div id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('list')">📋 品項列表</button>
    <button class="tab-btn" onclick="switchTab('matrix')">📊 一覽表</button>
  </div>

  <!-- 列表 view -->
  <div id="list-view">

  <!-- 工具列 -->
  <div class="toolbar">
    <div class="toolbar-row" style="flex-wrap:wrap;gap:8px;align-items:center;">
      <!-- 廠區 popover -->
      <div class="popover-wrap" id="pw-site">
        <button class="popover-trigger" id="pt-site" onclick="toggleFilterPopover('site')">
          <span class="pt-label" style="color:#e74c3c;">廠區</span><span class="pt-badge" id="pb-site" style="display:none;"></span><span class="pt-arrow">▾</span>
        </button>
        <div class="popover-panel" id="pp-site">
          <div class="pp-header"><span style="color:#e74c3c;font-weight:700;">廠區</span> <button class="pp-clear" onclick="clearFilter('site')">清除</button></div>
          <div class="pp-tags" id="site-filter-btns"></div>
        </div>
      </div>
      <!-- 類別 popover -->
      <div class="popover-wrap" id="pw-cat">
        <button class="popover-trigger" id="pt-cat" onclick="toggleFilterPopover('cat')">
          <span class="pt-label" style="color:#8e44ad;">類別</span><span class="pt-badge" id="pb-cat" style="display:none;"></span><span class="pt-arrow">▾</span>
        </button>
        <div class="popover-panel" id="pp-cat">
          <div class="pp-header"><span style="color:#8e44ad;font-weight:700;">類別</span> <button class="pp-clear" onclick="clearFilter('cat')">清除</button></div>
          <div class="pp-tags" id="cat-filter-btns"></div>
        </div>
      </div>
      <!-- 餐盒 popover -->
      <div class="popover-wrap" id="pw-box">
        <button class="popover-trigger" id="pt-box" onclick="toggleFilterPopover('box')">
          <span class="pt-label" style="color:#2980b9;">餐盒</span><span class="pt-badge" id="pb-box" style="display:none;"></span><span class="pt-arrow">▾</span>
        </button>
        <div class="popover-panel" id="pp-box">
          <div class="pp-header"><span style="color:#2980b9;font-weight:700;">餐盒</span> <button class="pp-clear" onclick="clearFilter('box')">清除</button></div>
          <div class="pp-tags" id="box-filter-btns"></div>
        </div>
      </div>
      <!-- 搜尋 -->
      <input type="text" id="search" placeholder="搜尋品項、餐盒…" style="flex:1;min-width:160px;">
      <button id="clear-filter-btn" class="avail-btn" onclick="clearAllFilters()" style="display:none;">✕ 清除篩選</button>
      <div class="stats" id="stats"></div>
    </div>
  </div>
  <div id="popover-overlay" onclick="closeFilterPopovers()" style="display:none;position:fixed;inset:0;z-index:800;"></div>

  <!-- 表格 -->
  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:44px;text-align:center;"><input type="checkbox" class="row-cb" id="select-all" title="全選" onchange="toggleSelectAll(this.checked)"></th>
          <th class="col-site">廠區</th>
          <th class="col-name">品項</th>
          <th class="col-price">價格</th>
          <th class="col-cat">類別</th>
          <th class="col-box">餐盒</th>
          <th class="col-del"></th>
        </tr>
      </thead>
      <tbody id="items-tbody"></tbody>
    </table>
    <div id="empty-msg" style="display:none;">No items found</div>
  </div><!-- /tbl-wrap -->

  <!-- 批次操作 bar -->
  <div id="batch-bar">
    <span id="batch-count">已選 0 筆</span>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <button class="batch-field-btn active" id="bft-box" onclick="switchBatchField('box')">餐盒</button>
      <button class="batch-field-btn" id="bft-cat" onclick="switchBatchField('cat')">類別</button>
      <button class="batch-field-btn" id="bft-price" onclick="switchBatchField('price')">價格</button>
      <button class="batch-field-btn" id="bft-name" onclick="switchBatchField('name')">更名</button>
    </div>
    <select id="batch-box-input" class="batch-input batch-select"></select>
    <select id="batch-cat-input" class="batch-input batch-select" style="display:none;"></select>
    <input  id="batch-price-input" class="batch-input" type="number" min="0" placeholder="輸入價格…" style="display:none;flex:1;min-width:120px;">
    <input  id="batch-name-input" class="batch-input" type="text" placeholder="輸入新品項名稱…" style="display:none;flex:1;min-width:160px;">
    <button class="batch-btn batch-confirm" onclick="batchApply()">✔ 套用</button>
    <button class="batch-btn batch-cancel"  onclick="clearSelection()">✕ 取消</button>
  </div>

  </div><!-- /list-view -->

  <!-- 一覽表 view -->
  <div id="matrix-view" style="display:none;">
    <!-- 一覽表篩選工具列 -->
    <div class="toolbar" style="margin-bottom:12px;">
      <div class="toolbar-row">
        <span class="filter-row-label">類別</span>
        <div id="mx-cat-btns" style="display:flex;flex-wrap:wrap;gap:5px;"></div>
        <button id="clear-mx-cat-btn" class="clear-row-btn" onclick="clearMatrixFilter()" style="display:none;">✕</button>
      </div>
    </div>
    <div id="matrix-wrap">
      <table id="matrix-table"></table>
    </div>
  </div>

</div>

<!-- 豎排標籤軌道 -->
<div class="drawer-tabs-rail">
  <div class="side-tab" id="tab-add" onclick="toggleDrawer('add')">
    <span class="st-icon">＋</span>
    <span class="st-label">新增</span>
  </div>
  <div class="side-tab" id="tab-export" onclick="toggleDrawer('export')">
    <span class="st-icon">📤</span>
    <span class="st-label">匯出</span>
  </div>
</div>

<!-- 遮罩 -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeAllDrawers()"></div>

<!-- 新增品項抽屜 -->
<div class="side-drawer" id="drawer-add">
  <div class="drawer-header">
    <h2>＋ 新增品項</h2>
    <button class="drawer-close-btn" onclick="closeAllDrawers()">✕ 關閉</button>
  </div>
  <div class="drawer-body">
    <div class="add-field">
      <label>廠區</label>
      <div class="add-combo">
        <select id="f-site"></select>
        <button type="button" class="combo-add-btn" onclick="openManage('site')">⚙</button>
      </div>
    </div>
    <div class="add-field">
      <label>品項名稱</label>
      <input id="f-name" placeholder="e.g. 烤鴨飯" onkeydown="if(event.key==='Enter')addItem()">
    </div>
    <div class="add-field">
      <label>價格</label>
      <input id="f-price" placeholder="120" type="number" min="0" onkeydown="if(event.key==='Enter')addItem()">
    </div>
    <div class="add-field">
      <label>類別</label>
      <div class="add-combo">
        <select id="f-cat"></select>
        <button type="button" class="combo-add-btn" onclick="openManage('cat')">⚙</button>
      </div>
    </div>
    <div class="add-field">
      <label>餐盒</label>
      <div class="add-combo">
        <select id="f-box"></select>
        <button type="button" class="combo-add-btn" onclick="openManage('box')">⚙</button>
      </div>
    </div>
    <button class="add-submit" onclick="addItem()">＋ 新增</button>
  </div>
</div>

<!-- 匯出入抽屜 -->
<div class="side-drawer" id="drawer-export">
  <div class="drawer-header">
    <h2>📂 匯出 / 匯入</h2>
    <button class="drawer-close-btn" onclick="closeAllDrawers()">✕ 關閉</button>
  </div>
  <div class="drawer-body">
    <button class="exp-btn export" onclick="exportExcel();closeAllDrawers()">
      <span class="btn-icon">⬇</span><span>匯出 Excel</span>
    </button>
    <button class="exp-btn export" onclick="exportMatrixPDF();closeAllDrawers()">
      <span class="btn-icon">🖨</span><span>匯出一覽表 PDF</span>
    </button>
    <label class="exp-btn import" style="cursor:pointer;">
      <span class="btn-icon">⬆</span><span>匯入 Excel</span>
      <input type="file" id="importFile" accept=".xlsx,.xls" style="display:none;" onchange="importExcel(this);closeAllDrawers()">
    </label>
    <button class="exp-btn" style="background:#fff0f0;color:#c0392b;border-color:#c0392b;box-shadow:3px 3px 0 #c0392b;" onclick="deduplicateItems();closeAllDrawers()">
      <span class="btn-icon">🧹</span><span>清除完全重複的品項</span>
    </button>
    <p style="font-size:0.88rem;color:var(--muted);margin-top:12px;line-height:1.6;">匯入時可選擇覆蓋或附加到現有資料</p>
  </div>
</div>

<div id="saveToast" class="save-toast"></div>

<!-- 管理選項 Modal -->
<div class="modal-overlay" id="manageModal" style="display:none;" onclick="if(event.target===this)closeManage()">
  <div class="modal">
    <div class="manage-header">
      <h3 id="manage-title">管理類別</h3>
      <button class="manage-done-btn" onclick="closeManage()">完成</button>
    </div>
    <div class="opt-list" id="opt-list"></div>
    <div class="opt-add-row">
      <input id="opt-new-input" type="text" placeholder="輸入新選項…" onkeydown="if(event.key==='Enter')addOptionFromManage()">
      <button onclick="addOptionFromManage()">＋ 新增</button>
    </div>
  </div>
</div>

<!-- 編輯 Modal -->
<div class="modal-overlay" id="editModal" style="display:none;" onclick="modalOverlayClick(event)">
  <div class="modal">
    <h3>✏️ Edit Item</h3>
    <div class="modal-field">
      <label>廠區 Site</label>
      <div class="combo-wrap" style="width:100%;">
        <select id="m-site" style="flex:1;border-radius:6px 0 0 6px;width:100%;"></select>
        <button type="button" class="combo-add-btn" onclick="openManage('site')">⚙</button>
      </div>
    </div>
    <div class="modal-field">
      <label>品項 Name</label>
      <input id="m-name" type="text">
    </div>
    <div class="modal-field">
      <label>價格 Price</label>
      <input id="m-price" type="number" min="0">
    </div>
    <div class="modal-field">
      <label>類別 Category</label>
      <div class="combo-wrap" style="width:100%;">
        <select id="m-cat" style="flex:1;border-radius:6px 0 0 6px;width:100%;"></select>
        <button type="button" class="combo-add-btn" onclick="openManage('cat')">⚙</button>
      </div>
    </div>
    <div class="modal-field">
      <label>餐盒 Box</label>
      <div class="combo-wrap" style="width:100%;">
        <select id="m-box" style="flex:1;border-radius:6px 0 0 6px;width:100%;"></select>
        <button type="button" class="combo-add-btn" onclick="openManage('box')">⚙</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmEdit()">Confirm</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="shared.js"></script>
<script>
  const DEFAULT_SITES = ['央廚','群聯','台積','F20','AP6B','聯電','P8'];
  const DEFAULT_CATS  = ['豬','雞','牛','鴨','雙拼','舒肥'];
  const DEFAULT_BOXES = ['SP24-5黑色餐盒','CR900植纖餐盒','十貫牛皮壽司盒','7號輕食盒','902碗'];
  let SITES = [...DEFAULT_SITES];
  let CATS  = [...DEFAULT_CATS];
  let BOXES = [...DEFAULT_BOXES];
  let autoSaveOptions;

  // ── 同步所有類別/餐盒下拉選單 ──
  function syncSelects(type) {
    const list = type === 'cat' ? CATS : type === 'box' ? BOXES : SITES;
    const ids  = type === 'cat' ? ['f-cat','m-cat'] : type === 'box' ? ['f-box','m-box','batch-box-input'] : ['f-site','m-site'];
    ids.forEach(id => {
      const sel = document.getElementById(id);
      if (!sel) return;
      const cur = sel.value;
      sel.innerHTML = list.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
      if (list.includes(cur)) sel.value = cur;
    });
  }

  function addOption(type) {
    const label = type === 'cat' ? '類別' : '餐盒';
    const val = prompt(`新增${label}名稱：`);
    if (!val || !val.trim()) return;
    const trimmed = val.trim();
    const list = type === 'cat' ? CATS : BOXES;
    if (list.includes(trimmed)) { alert(`「${trimmed}」已存在`); return; }
    list.push(trimmed);
    syncSelects(type);
    ['f-','m-'].forEach(p => {
      const sel = document.getElementById(p + type);
      if (sel) sel.value = trimmed;
    });
  }

  let _manageType = null;
  function openManage(type) {
    _manageType = type;
    const titles = { cat: '⚙ 管理類別', box: '⚙ 管理餐盒', site: '⚙ 管理廠區' };
    document.getElementById('manage-title').textContent = titles[type];
    renderOptList();
    document.getElementById('opt-new-input').value = '';
    document.getElementById('manageModal').style.display = 'flex';
    document.getElementById('opt-new-input').focus();
  }
  function closeManage() {
    document.getElementById('manageModal').style.display = 'none';
    _manageType = null;
  }
  function renderOptList() {
    const list = _manageType === 'cat' ? CATS : _manageType === 'box' ? BOXES : SITES;
    const div = document.getElementById('opt-list');
    div.innerHTML = '';
    list.forEach((val, idx) => {
      const row = document.createElement('div');
      row.className = 'opt-row';
      row.draggable = true;
      row.dataset.idx = idx;
      row.innerHTML = `<span class="drag-handle" title="拖曳排序">⠿</span><span style="flex:1;">${esc(val)}</span><button class="opt-del-btn" onclick="deleteOption(${idx})" title="刪除">✕</button>`;
      row.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', idx); row.classList.add('dragging'); });
      row.addEventListener('dragend',   () => row.classList.remove('dragging'));
      row.addEventListener('dragover',  e => { e.preventDefault(); row.classList.add('drag-over'); });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', e => {
        e.preventDefault(); row.classList.remove('drag-over');
        const from = parseInt(e.dataTransfer.getData('text/plain'));
        const to   = parseInt(row.dataset.idx);
        if (from === to) return;
        const [moved] = list.splice(from, 1);
        list.splice(to, 0, moved);
        renderOptList();
        syncSelects(_manageType);
        buildFilterBtns();
        if (autoSaveOptions) autoSaveOptions();
      });
      div.appendChild(row);
    });
  }
  function addOptionFromManage() {
    const input = document.getElementById('opt-new-input');
    const trimmed = input.value.trim();
    if (!trimmed) return;
    const list = _manageType === 'cat' ? CATS : _manageType === 'box' ? BOXES : SITES;
    if (list.includes(trimmed)) { alert(`「${trimmed}」已存在`); return; }
    list.push(trimmed);
    syncSelects(_manageType);
    if (_manageType === 'site') buildFilterBtns();
    input.value = '';
    renderOptList();
    input.focus();
    if (autoSaveOptions) autoSaveOptions();
  }
  function deleteOption(idx) {
    const list = _manageType === 'cat' ? CATS : _manageType === 'box' ? BOXES : SITES;
    const val = list[idx];
    if (!confirm(`刪除「${val}」？`)) return;
    list.splice(idx, 1);
    syncSelects(_manageType);
    if (_manageType === 'site') buildFilterBtns();
    renderOptList();
    if (autoSaveOptions) autoSaveOptions();
  }

  let items = [];
  let autoSave;
  let filterSites = new Set();  // 空 = 全部
  let filterCats  = new Set();  // 空 = 全部
  let filterBoxes = new Set();  // 空 = 全部
  let searchQ     = '';
  let _remoteUpdate = false;

  requireAuth((user) => {
    syncSelects('site');
    syncSelects('cat');
    syncSelects('box');
    injectStatusBar('items');
    function applyBarHeight() {
      const bar = document.querySelector('#status-bar, [id^="status-bar"]');
      const h = bar ? bar.offsetHeight : 0;
      document.body.style.paddingTop = h + 'px';
      document.querySelectorAll('.side-drawer').forEach(d => d.style.top = h + 'px');
      document.querySelectorAll('.side-drawer').forEach(d => d.style.height = `calc(100vh - ${h}px)`);
    }
    requestAnimationFrame(applyBarHeight);
    setTimeout(applyBarHeight, 100);
    setTimeout(applyBarHeight, 500);
    try {
      const ro = new ResizeObserver(applyBarHeight);
      const watchBar = () => {
        const bar = document.querySelector('#status-bar, [id^="status-bar"]');
        if (bar) ro.observe(bar); else setTimeout(watchBar, 200);
      };
      watchBar();
    } catch(e) {}

    autoSaveOptions = makeAutoSave('options', () => ({ sites: SITES, cats: CATS, boxes: BOXES }));
    startSync('options', user, (content) => {
      if (!content) return;
      if (Array.isArray(content.sites) && content.sites.length) SITES = content.sites;
      if (Array.isArray(content.cats)  && content.cats.length)  CATS  = content.cats;
      if (Array.isArray(content.boxes) && content.boxes.length) BOXES = content.boxes;
      syncSelects('site'); syncSelects('cat'); syncSelects('box');
      buildFilterBtns();
    });
    autoSave = makeAutoSave('items', () => items);
    startSync('items', user, (content) => {
      if (!content) return;
      _remoteUpdate = true;
      items = Array.isArray(content) ? content : [];
      buildFilterBtns();
      render();
      _remoteUpdate = false;
    });
  });

  // ── 從 note 欄位解析類別 ──
  function getCat(it) {
    if (it.cat) return it.cat;
    const m = (it.note||'').match(/類別[:：]([^\s,，]+)/);
    return m ? m[1] : (it.note || '');
  }

  const _SITE_COLORS = [
    {bg:'#e74c3c',fg:'white'},{bg:'#e67e22',fg:'white'},{bg:'#f39c12',fg:'#5a3a00'},
    {bg:'#27ae60',fg:'white'},{bg:'#2980b9',fg:'white'},{bg:'#8e44ad',fg:'white'},
    {bg:'#16a085',fg:'white'},{bg:'#d35400',fg:'white'},{bg:'#c0392b',fg:'white'}
  ];
  const _CAT_COLORS = {
    '豬':  {bg:'#e8825a',fg:'white'},   '雞':  {bg:'#f0c040',fg:'#5a3a00'},
    '牛':  {bg:'#c0392b',fg:'white'},   '鴨':  {bg:'#27ae60',fg:'white'},
    '雙拼':{bg:'#8e44ad',fg:'white'},   '舒肥':{bg:'#2980b9',fg:'white'}
  };

  function _applyCatBtnColor(btn, cc, isActive) {
    const catName = cc.replace('cat-','');
    const col = _CAT_COLORS[catName];
    if (isActive && col) {
      btn.style.background = col.bg; btn.style.color = col.fg;
      btn.style.borderColor = col.bg; btn.style.boxShadow = `2px 2px 0 0 ${col.bg}`;
    } else {
      btn.style.background = ''; btn.style.color = '';
      btn.style.borderColor = ''; btn.style.boxShadow = '';
    }
  }

  // ── 動態建立篩選按鈕 ──
  function buildFilterBtns() {
    // 廠區：固定清單 + 資料中出現的
    const allSites = [...new Set([...SITES, ...items.map(i => i.site).filter(Boolean)])];
    const siteDiv = document.getElementById('site-filter-btns');
    siteDiv.innerHTML = '';
    allSites.forEach(site => {
      const sc = getSiteClass(site);
      const btn = document.createElement('button');
      btn.className = 'filter-tag site-tag' + (filterSites.has(site) ? ' active' : '');
      btn.textContent = site;
      if (filterSites.has(site) && sc) {
        btn.style.background = getComputedStyle(document.documentElement).getPropertyValue('--' + sc.replace('site-c','site-c')) || '';
      }
      btn.onclick = () => {
        toggleFilter(filterSites, site, btn, render);
        // 切換顏色
        if (btn.classList.contains('active') && sc) {
          const col = window._siteColors ? window._siteColors[sc] : null;
          if (col) { btn.style.background = col.bg; btn.style.color = col.fg; btn.style.borderColor = col.bg; }
        } else {
          btn.style.background = ''; btn.style.color = ''; btn.style.borderColor = '';
        }
      };
      siteDiv.appendChild(btn);
    });

    // 類別：從資料動態抽取
    const allCats = [...new Set(items.map(i => getCat(i)).filter(Boolean))].sort();
    const catDiv = document.getElementById('cat-filter-btns');
    catDiv.innerHTML = '';
    allCats.forEach(cat => {
      const btn = document.createElement('button');
      const cc = getCatClass(cat);
      btn.className = 'filter-tag cat-tag' + (filterCats.has(cat) ? ' active' : '');
      btn.textContent = cat;
      if (filterCats.has(cat) && cc) _applyCatBtnColor(btn, cc, true);
      btn.onclick = () => {
        toggleFilter(filterCats, cat, btn, render);
        _applyCatBtnColor(btn, cc, btn.classList.contains('active'));
      };
      catDiv.appendChild(btn);
    });

    // 餐盒：從資料動態抽取
    const allBoxes = [...new Set(items.map(i => i.box).filter(Boolean))].sort();
    const boxDiv = document.getElementById('box-filter-btns');
    boxDiv.innerHTML = '';
    allBoxes.forEach(box => {
      const btn = document.createElement('button');
      btn.className = 'filter-tag' + (filterBoxes.has(box) ? ' active' : '');
      btn.textContent = box;
      btn.onclick = () => toggleFilter(filterBoxes, box, btn, render);
      boxDiv.appendChild(btn);
    });
  }

  function clearAllFilters() {
    filterSites.clear();
    filterCats.clear();
    filterBoxes.clear();
    searchQ = '';
    document.getElementById('search').value = '';
    buildFilterBtns();
    render();
  }

  function clearFilter(type) {
    if (type === 'site') filterSites.clear();
    else if (type === 'cat') filterCats.clear();
    else if (type === 'box') filterBoxes.clear();
    buildFilterBtns();
    render();
  }

  function toggleFilter(set, val, btn, onUpdate) {
    if (set.has(val)) { set.delete(val); btn.classList.remove('active'); }
    else              { set.add(val);    btn.classList.add('active'); }
    onUpdate();
  }

  document.getElementById('search').addEventListener('input', (e) => {
    searchQ = e.target.value.toLowerCase();
    render();
  });

  function toggleFilterPopover(type) {
    const panel = document.getElementById('pp-' + type);
    const trigger = document.getElementById('pt-' + type);
    const overlay = document.getElementById('popover-overlay');
    const isOpen = panel.classList.contains('open');
    closeFilterPopovers();
    if (!isOpen) {
      panel.classList.add('open');
      trigger.classList.add('open');
      overlay.style.display = 'block';
    }
  }
  function closeFilterPopovers() {
    ['site','cat','box'].forEach(t => {
      document.getElementById('pp-' + t).classList.remove('open');
      document.getElementById('pt-' + t).classList.remove('open');
    });
    document.getElementById('popover-overlay').style.display = 'none';
  }

  function updatePopoverBadges() {
    [['site', filterSites], ['cat', filterCats], ['box', filterBoxes]].forEach(([t, set]) => {
      const badge = document.getElementById('pb-' + t);
      const trigger = document.getElementById('pt-' + t);
      if (!badge || !trigger) return;
      if (set.size > 0) {
        badge.textContent = set.size;
        badge.style.display = 'inline-flex';
        trigger.classList.add('has-filter');
      } else {
        badge.style.display = 'none';
        trigger.classList.remove('has-filter');
      }
    });
  }

  // ── 廠區顏色 ──
  const _siteColorMap = {};
  let _siteColorIdx = 0;
  function getSiteClass(site) {
    if (!site) return '';
    if (!_siteColorMap[site]) {
      _siteColorMap[site] = 'site-c' + (_siteColorIdx % 9);
      _siteColorIdx++;
    }
    return _siteColorMap[site];
  }

  const CAT_CSS_CLASSES = ['豬','雞','牛','鴨','雙拼','舒肥'];
  function getCatClass(cat) {
    if (CAT_CSS_CLASSES.includes(cat)) return 'cat-' + cat;
    return '';
  }

  // ── RENDER ──
  function render() {
    const list = items.map((it, ri) => ({ it, ri })).filter(({ it }) => {
      const matchSite = filterSites.size === 0 || filterSites.has(it.site);
      const cat = getCat(it);
      const matchCat  = filterCats.size  === 0 || filterCats.has(cat);
      const matchBox  = filterBoxes.size === 0 || filterBoxes.has(it.box);
      const matchQ    = !searchQ ||
                        (it.name||'').toLowerCase().includes(searchQ) ||
                        (it.box||'').toLowerCase().includes(searchQ);
      return matchSite && matchCat && matchBox && matchQ;
    });

    const total = items.length;
    document.getElementById('stats').innerHTML =
      `<span>全部 <strong>${total}</strong></span>
       <span style="color:var(--blue);">篩選後 <strong>${list.length}</strong></span>`;

    const tbody = document.getElementById('items-tbody');
    const empty = document.getElementById('empty-msg');
    tbody.innerHTML = '';
    empty.style.display = list.length ? 'none' : 'block';

    // 有篩選或搜尋時直接列出；否則依廠區分組
    const isFiltered = filterSites.size > 0 || filterCats.size > 0 || filterBoxes.size > 0 || searchQ;
    const clearBtn = document.getElementById('clear-filter-btn');
    if (clearBtn) clearBtn.style.display = isFiltered ? '' : 'none';
    updatePopoverBadges();
    if (isFiltered) {
      const wrap = document.querySelector('.tbl-wrap');
      if (wrap) wrap.scrollTop = 0;
    }
    if (isFiltered) {
      list.forEach(({ it, ri }) => tbody.appendChild(makeRow(it, ri)));
    } else {
      const sitesInData = [...new Set([...SITES, ...items.map(i => i.site).filter(Boolean)])];
      sitesInData.forEach(site => {
        const group = list.filter(({ it }) => it.site === site);
        if (!group.length) return;
        const sc = getSiteClass(site);
        const col = _SITE_COLORS[parseInt(sc.replace('site-c',''))] || {bg:'#2d2d2d',fg:'white'};
        const grpRow = document.createElement('tr');
        grpRow.className = 'group-row ' + sc;
        grpRow.innerHTML = `<td colspan="7" style="background:${col.bg};color:${col.fg};">${esc(site)}　<span style="font-weight:400;font-size:22px;opacity:0.8;">${group.length} items</span></td>`;
        tbody.appendChild(grpRow);
        group.sort((a, b) => {
          const ai = CATS.indexOf(getCat(a.it)), bi = CATS.indexOf(getCat(b.it));
          if (ai === -1 && bi === -1) return 0;
          if (ai === -1) return 1; if (bi === -1) return -1;
          return ai - bi;
        });
        group.forEach(({ it, ri }) => tbody.appendChild(makeRow(it, ri)));
      });
    }
  }

  function makeRow(it, ri) {
    const cat = getCat(it);
    const sc = getSiteClass(it.site);
    const cc = getCatClass(cat);
    const tr = document.createElement('tr');
    tr.dataset.ri = ri;
    if (selectedRis.has(ri)) tr.classList.add('selected');
    tr.innerHTML = `
      <td style="text-align:center;">
        <input type="checkbox" class="row-cb" data-ri="${ri}" ${selectedRis.has(ri)?'checked':''} onchange="toggleRow(this)">
      </td>
      <td><span class="site-badge ${sc}">${esc(it.site||'—')}</span></td>
      <td>${esc(it.name)}</td>
      <td class="price-val">${it.price ? '$' + esc(it.price) : '—'}</td>
      <td><span class="cat-badge ${cc}">${esc(cat)}</span></td>
      <td>${esc(it.box||'—')}</td>
      <td style="text-align:center;white-space:nowrap;">
        <button class="edit-btn" onclick="openModal(${ri})">✏️ Edit</button>
        <button class="del-btn" onclick="delItem(${ri})">✕</button>
      </td>
    `;
    return tr;
  }

  // ── MODAL ──
  let _editingRi = null;

  function openModal(ri) {
    _editingRi = ri;
    const it = items[ri];
    syncSelects('site'); syncSelects('cat'); syncSelects('box');
    // 若品項的廠區/類別/餐盒不在清單中，動態補入
    const site = it.site || '';
    if (site && !SITES.includes(site)) { SITES.push(site); syncSelects('site'); }
    const cat = getCat(it);
    if (cat && !CATS.includes(cat))  { CATS.push(cat);  syncSelects('cat'); }
    const box = it.box || '';
    if (box && !BOXES.includes(box)) { BOXES.push(box); syncSelects('box'); }
    document.getElementById('m-site').value  = site;
    document.getElementById('m-name').value  = it.name  || '';
    document.getElementById('m-price').value = it.price || '';
    document.getElementById('m-cat').value   = cat;
    document.getElementById('m-box').value   = box;
    document.getElementById('editModal').style.display = 'flex';
    document.getElementById('m-name').focus();
  }

  function closeModal() {
    document.getElementById('editModal').style.display = 'none';
    _editingRi = null;
  }

  function modalOverlayClick(e) {
    if (e.target === document.getElementById('editModal')) closeModal();
  }

  function confirmEdit() {
    if (_editingRi === null) return;
    items[_editingRi] = {
      site:  document.getElementById('m-site').value.trim(),
      name:  document.getElementById('m-name').value.trim(),
      price: document.getElementById('m-price').value.trim(),
      cat:   document.getElementById('m-cat').value.trim(),
      box:   document.getElementById('m-box').value.trim(),
    };
    closeModal();
    buildFilterBtns();
    render();
    if (currentTab === 'matrix') { buildMatrixFilters(); renderMatrix(); }
    autoSave();
  }

  // Enter key in modal confirms
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { closeModal(); closeAllDrawers(); }
  });

  // ── CRUD ──
  function addItem() {
    const site  = document.getElementById('f-site').value.trim();
    const name  = document.getElementById('f-name').value.trim();
    const price = document.getElementById('f-price').value.trim();
    const cat   = document.getElementById('f-cat').value.trim();
    const box   = document.getElementById('f-box').value.trim();
    if (!name) { document.getElementById('f-name').focus(); return; }
    const dup = items.find(it => it.site === site && it.name === name);
    if (dup && !confirm(`「${site}／${name}」已存在（價格 ${dup.price ? '$'+dup.price : '未填'}），確定要再新增一筆？`)) return;
    items.unshift({ site, name, price, cat, box });
    buildFilterBtns();
    render();
    if (currentTab === 'matrix') { buildMatrixFilters(); renderMatrix(); }
    autoSave();
    document.getElementById('f-name').value  = '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-name').focus();
  }

  function delItem(i) {
    if (!confirm(`刪除「${items[i].name}」？`)) return;
    items.splice(i, 1);
    buildFilterBtns();
    render();
    if (currentTab === 'matrix') { buildMatrixFilters(); renderMatrix(); }
    autoSave();
  }

  // ── 匯出 Excel ──
  function exportExcel() {
    const rows = items.map(it => ({
      '廠區':   it.site  || '',
      '品項':   it.name  || '',
      '價格':   it.price || '',
      '類別':   getCat(it),
      '餐盒':   it.box   || '',
    }));

    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [
      { wch: 8 },  // 廠區
      { wch: 22 }, // 品項
      { wch: 8 },  // 價格
      { wch: 12 }, // 類別
      { wch: 16 }, // 餐盒
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Items');
    const date = new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb, `BentoItemList_${date}.xlsx`);
  }

  // ── 匯入 Excel ──
  function importExcel(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = ''; // reset 讓同一檔案可重複選

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

        if (!rows.length) { alert('Excel 沒有資料'); return; }

        // 欄位對應（容許中文或英文欄名）
        const mapped = rows.map(r => ({
          site:  r['廠區'] || r['site']  || '',
          name:  r['品項'] || r['name']  || '',
          price: String(r['價格'] || r['price'] || ''),
          cat:   r['類別'] || r['cat']   || '',
          box:   r['餐盒'] || r['box']   || '',
          avail: (r['狀態'] || r['avail'] || '供應中') !== '暫停',
        })).filter(r => r.name); // 過濾掉沒有品項名的空行

        if (!mapped.length) { alert('沒有找到有效品項（需有「品項」欄）'); return; }

        const mode = confirm(
          `讀取到 ${mapped.length} 筆品項。\n\n` +
          `確定 → 覆蓋現有全部資料\n取消 → 附加到現有資料末尾`
        );

        if (mode) {
          items = mapped;
        } else {
          items = [...items, ...mapped];
        }

        render();
        autoSave();
        alert(`✅ 已${mode ? '覆蓋匯入' : '附加匯入'} ${mapped.length} 筆品項`);
      } catch(err) {
        alert('匯入失敗：' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // ── BATCH SELECT ──
  let selectedRis = new Set();

  function toggleRow(cb) {
    const ri = parseInt(cb.dataset.ri);
    const tr = cb.closest('tr');
    if (cb.checked) { selectedRis.add(ri); tr.classList.add('selected'); }
    else            { selectedRis.delete(ri); tr.classList.remove('selected'); }
    updateBatchBar();
    syncSelectAll();
  }

  function toggleSelectAll(checked) {
    // only toggle visible rows
    document.querySelectorAll('#items-tbody input.row-cb').forEach(cb => {
      const ri = parseInt(cb.dataset.ri);
      const tr = cb.closest('tr');
      cb.checked = checked;
      if (checked) { selectedRis.add(ri); tr.classList.add('selected'); }
      else          { selectedRis.delete(ri); tr.classList.remove('selected'); }
    });
    updateBatchBar();
  }

  function syncSelectAll() {
    const all  = document.querySelectorAll('#items-tbody input.row-cb');
    const chk  = document.querySelectorAll('#items-tbody input.row-cb:checked');
    const sa   = document.getElementById('select-all');
    if (!sa) return;
    sa.indeterminate = chk.length > 0 && chk.length < all.length;
    sa.checked = all.length > 0 && chk.length === all.length;
  }

  let _batchField = 'box';

  function switchBatchField(field) {
    _batchField = field;
    ['box','cat','price','name'].forEach(f => {
      document.getElementById('bft-' + f).classList.toggle('active', f === field);
      const el = document.getElementById('batch-' + f + '-input');
      if (el) el.style.display = f === field ? '' : 'none';
    });
    const boxEl = document.getElementById('batch-box-input');
    const catEl = document.getElementById('batch-cat-input');
    if (boxEl) boxEl.style.flex = field === 'box' ? '1' : '';
    if (catEl) catEl.style.flex = field === 'cat' ? '1' : '';
    if (field === 'name') setTimeout(() => document.getElementById('batch-name-input').focus(), 50);
  }

  function updateBatchBar() {
    const bar = document.getElementById('batch-bar');
    const cnt = document.getElementById('batch-count');
    if (selectedRis.size > 0) {
      // sync box select
      const boxSel = document.getElementById('batch-box-input');
      if (boxSel) { boxSel.innerHTML = BOXES.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join(''); }
      // sync cat select
      const catSel = document.getElementById('batch-cat-input');
      if (catSel) { catSel.innerHTML = CATS.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join(''); }
      bar.classList.add('show');
      cnt.textContent = `已選 ${selectedRis.size} 筆`;
    } else {
      bar.classList.remove('show');
    }
  }

  function clearSelection() {
    selectedRis.clear();
    render();
    updateBatchBar();
    const sa = document.getElementById('select-all');
    if (sa) { sa.checked = false; sa.indeterminate = false; }
  }

  function batchApply() {
    if (_batchField === 'box') {
      const val = document.getElementById('batch-box-input').value;
      if (!val) { alert('請選擇餐盒'); return; }
      if (!confirm(`確定把 ${selectedRis.size} 筆品項的餐盒改為「${val}」？`)) return;
      selectedRis.forEach(ri => { if (items[ri]) items[ri].box = val; });
    } else if (_batchField === 'cat') {
      const val = document.getElementById('batch-cat-input').value;
      if (!val) { alert('請選擇類別'); return; }
      if (!confirm(`確定把 ${selectedRis.size} 筆品項的類別改為「${val}」？`)) return;
      selectedRis.forEach(ri => { if (items[ri]) items[ri].cat = val; });
    } else if (_batchField === 'price') {
      const val = document.getElementById('batch-price-input').value.trim();
      if (!val) { alert('請輸入價格'); return; }
      if (!confirm(`確定把 ${selectedRis.size} 筆品項的價格改為「${val}」？`)) return;
      selectedRis.forEach(ri => { if (items[ri]) items[ri].price = val; });
    } else if (_batchField === 'name') {
      const val = document.getElementById('batch-name-input').value.trim();
      if (!val) { alert('請輸入新品項名稱'); return; }
      if (!confirm(`確定把已選 ${selectedRis.size} 筆品項名稱全部改為「${val}」？`)) return;
      selectedRis.forEach(ri => { if (items[ri]) items[ri].name = val; });
    }
    clearSelection();
    autoSave();
    render();
    if (currentTab === 'matrix') { buildMatrixFilters(); renderMatrix(); }
  }

  // ── TABS ──
  let currentTab = 'list';

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('list-view').style.display   = tab === 'list'   ? '' : 'none';
    document.getElementById('matrix-view').style.display = tab === 'matrix' ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', (i === 0 && tab === 'list') || (i === 1 && tab === 'matrix'));
    });
    if (tab === 'matrix') { buildMatrixFilters(); renderMatrix(); }
  }

  // ── MATRIX FILTERS ──
  let mxFilterSites = new Set();
  let mxFilterCats  = new Set();

  function buildMatrixFilters() {
    const allCats  = [...new Set(items.map(i => getCat(i)).filter(Boolean))].sort();

    const cDiv = document.getElementById('mx-cat-btns');
    cDiv.innerHTML = '';
    allCats.forEach(cat => {
      const b = document.createElement('button');
      b.className = 'filter-tag' + (mxFilterCats.has(cat) ? ' active' : '');
      b.textContent = cat;
      b.onclick = () => {
        if (mxFilterCats.has(cat)) { mxFilterCats.delete(cat); b.classList.remove('active'); }
        else { mxFilterCats.add(cat); b.classList.add('active'); }
        renderMatrix();
      };
      cDiv.appendChild(b);
    });
    const clearBtn = document.getElementById('clear-mx-cat-btn');
    if (clearBtn) clearBtn.style.display = mxFilterCats.size > 0 ? '' : 'none';
  }

  function clearMatrixFilter() {
    mxFilterCats.clear();
    buildMatrixFilters();
    renderMatrix();
  }

  function renderMatrix() {
    const clearBtn = document.getElementById('clear-mx-cat-btn');
    if (clearBtn) clearBtn.style.display = mxFilterCats.size > 0 ? '' : 'none';
    const allSites = [...new Set([...SITES, ...items.map(i => i.site).filter(Boolean)])];
    const visibleSites = mxFilterSites.size > 0
      ? allSites.filter(s => mxFilterSites.has(s))
      : allSites;

    // 篩選品項
    const filteredItems = items.filter(it => {
      const matchCat  = mxFilterCats.size === 0 || mxFilterCats.has(getCat(it));
      return matchCat && it.name;
    });

    // 依類別分組品項名稱（同名只出現一次）
    const catMap = {}; // cat → Set of names
    filteredItems.forEach(it => {
      const cat = getCat(it) || '其他';
      if (!catMap[cat]) catMap[cat] = new Set();
      catMap[cat].add(it.name);
    });

    // 建立 priceMap: name+site → 價格陣列
    const priceMap = {};
    filteredItems.forEach(it => {
      const key = it.name + '|||' + (it.site || '');
      if (!priceMap[key]) priceMap[key] = [];
      if (it.price) priceMap[key].push(it.price);
    });

    const table = document.getElementById('matrix-table');
    table.innerHTML = '';

    // thead
    const thead = document.createElement('thead');
    const hr = document.createElement('tr');
    const th0 = document.createElement('th');
    th0.className = 'th-name'; th0.textContent = '品項';
    hr.appendChild(th0);
    visibleSites.forEach(site => {
      const th = document.createElement('th');
      th.textContent = site;
      hr.appendChild(th);
    });
    thead.appendChild(hr);
    table.appendChild(thead);

    // tbody — 依類別分組
    const tbody = document.createElement('tbody');
    const cats = Object.keys(catMap).sort((a, b) => {
      const ai = CATS.indexOf(a), bi = CATS.indexOf(b);
      if (ai === -1 && bi === -1) return a.localeCompare(b, 'zh-TW');
      if (ai === -1) return 1; if (bi === -1) return -1;
      return ai - bi;
    });

    cats.forEach(cat => {
      // 類別 group header row
      const grpTr = document.createElement('tr');
      grpTr.className = 'mx-group-row';
      const grpTd = document.createElement('td');
      grpTd.colSpan = visibleSites.length + 1;
      grpTd.textContent = cat;
      grpTr.appendChild(grpTd);
      tbody.appendChild(grpTr);

      // 品項列
      [...catMap[cat]].sort((a,b) => a.localeCompare(b,'zh-TW')).forEach(name => {
        const tr = document.createElement('tr');
        const tdName = document.createElement('td');
        tdName.className = 'td-name'; tdName.textContent = name;
        tr.appendChild(tdName);
        visibleSites.forEach(site => {
          const td = document.createElement('td');
          const key = name + '|||' + site;
          const prices = priceMap[key];
          if (prices && prices.length) {
            td.className = 'price-cell';
            td.textContent = prices.map(p => '$' + p).join(' / ');
          } else {
            td.className = 'dash-cell'; td.textContent = '—';
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    });

    if (!cats.length) {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.colSpan = visibleSites.length + 1;
      td.style.cssText = 'text-align:center;padding:40px;color:var(--muted);font-size:28px;';
      td.textContent = '沒有符合的品項';
      tr.appendChild(td); tbody.appendChild(tr);
    }

    table.appendChild(tbody);
  }

  // ── DRAWERS ──
  function toggleDrawer(name) {
    const drawer  = document.getElementById('drawer-' + name);
    const tab     = document.getElementById('tab-' + name);
    const overlay = document.getElementById('drawer-overlay');
    const isOpen  = drawer.classList.contains('open');
    ['add','export'].forEach(n => {
      document.getElementById('drawer-' + n).classList.remove('open');
      document.getElementById('tab-' + n).classList.remove('open');
    });
    overlay.classList.remove('show');
    if (!isOpen) {
      drawer.classList.add('open');
      tab.classList.add('open');
      overlay.classList.add('show');
      if (name === 'add') {
        setTimeout(() => { const el = document.getElementById('f-name'); if (el) el.focus(); }, 320);
      }
    }
  }
  function closeAllDrawers() {
    ['add','export'].forEach(n => {
      document.getElementById('drawer-' + n).classList.remove('open');
      document.getElementById('tab-' + n).classList.remove('open');
    });
    document.getElementById('drawer-overlay').classList.remove('show');
  }
  function openDrawer()  { toggleDrawer('export'); }
  function closeDrawer() { closeAllDrawers(); }

  function deduplicateItems() {
    const seen = new Set();
    const before = items.length;
    items = items.filter(it => {
      const key = `${it.site}|||${it.name}|||${it.price}|||${it.box}`;
      if (seen.has(key)) return false;
      seen.add(key); return true;
    });
    const removed = before - items.length;
    if (removed === 0) { alert('沒有發現重複資料'); return; }
    buildFilterBtns(); render();
    if (currentTab === 'matrix') { buildMatrixFilters(); renderMatrix(); }
    autoSave();
    alert(`✅ 已清除 ${removed} 筆完全重複的品項`);
  }

  function exportMatrixPDF() {
    const matrixView = document.getElementById('matrix-view');
    const wasHidden  = matrixView.style.display === 'none';
    if (wasHidden) matrixView.style.display = '';

    buildMatrixFilters();
    renderMatrix();

    const table  = document.getElementById('matrix-table');
    const targetW = 734;
    const tableW  = table.scrollWidth;

    if (tableW > targetW) {
      table.style.zoom = (targetW / tableW).toFixed(4);
    }

    function cleanup() {
      table.style.zoom = '';
      if (wasHidden) matrixView.style.display = 'none';
      window.removeEventListener('afterprint', cleanup);
    }
    window.addEventListener('afterprint', cleanup);
    window.print();
  }

  function esc(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
