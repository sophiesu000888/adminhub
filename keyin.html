<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>銷貨憑單掃描器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#eef2f7;min-height:100vh;padding:20px}
.container{max-width:980px;margin:0 auto}

h1{text-align:center;color:#1e3a5f;font-size:24px;margin-bottom:4px;font-weight:700}
.subtitle{text-align:center;color:#888;font-size:13px;margin-bottom:20px}

/* 欄位對應 */
.col-section{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.col-section-title{font-size:12px;font-weight:bold;color:#888;margin-bottom:10px;letter-spacing:.5px}
.col-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.col-cell{background:#f5f7fc;border:1.5px solid #dde3f0;border-radius:8px;padding:8px 4px;text-align:center}
.col-cell.hl{background:#e8f0fe;border-color:#4472C4}
.col-letter{font-size:15px;font-weight:700;color:#4472C4;font-family:monospace}
.col-label{font-size:10px;color:#555;margin-top:3px}

/* 上傳區 */
.upload-zone{border:2.5px dashed #4472C4;border-radius:14px;background:#fff;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.upload-zone:hover,.upload-zone.drag{background:#eef3fc;border-color:#2952a3}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uz-icon{font-size:3rem;margin-bottom:10px}
.uz-text{font-size:16px;font-weight:bold;color:#4472C4}
.uz-hint{font-size:12px;color:#aaa;margin-top:5px}

/* 縮圖 */
.thumb-strip{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;min-height:0}
.thumb{position:relative;width:92px;border-radius:10px;border:2px solid #ddd;background:#fff;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.thumb img{width:100%;height:68px;object-fit:cover;display:block}
.thumb-name{font-size:10px;padding:3px 4px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;background:#f8f9fa}
.thumb.done{border-color:#43a047}
.thumb.err{border-color:#e53935}
.thumb.scanning{border-color:#4472C4;box-shadow:0 0 0 3px rgba(68,114,196,.25)}
.thumb-badge{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.thumb-del{position:absolute;top:4px;left:4px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.thumb-del:hover{background:#e53935}

/* 按鈕 */
.btn-row{display:flex;gap:10px;margin-bottom:14px}
.scan-btn{flex:1;padding:14px;background:linear-gradient(135deg,#4472C4,#2952a3);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;transition:opacity .2s;box-shadow:0 2px 8px rgba(68,114,196,.3)}
.scan-btn:hover:not(:disabled){opacity:.9}
.scan-btn:disabled{background:#bbb;box-shadow:none;cursor:not-allowed}
.reset-btn{padding:14px 20px;border:2px solid #ddd;border-radius:10px;background:#fff;color:#666;font-size:14px;cursor:pointer;display:none;font-weight:bold}
.reset-btn:hover{border-color:#e53935;color:#e53935}

/* 進度 */
.prog-wrap{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:14px;display:none;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.prog-bg{background:#e8edf5;border-radius:20px;height:10px;overflow:hidden}
.prog-bar{background:linear-gradient(90deg,#4472C4,#43a047);height:10px;border-radius:20px;transition:width .3s;width:0%}
.prog-txt{text-align:center;font-size:13px;color:#555;margin-top:8px}

/* 狀態 */
.status{text-align:center;padding:11px 16px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none;font-weight:500}
.status.ok{background:#e8f5e9;color:#2e7d32;display:block;border:1px solid #c8e6c9}
.status.err{background:#fce4ec;color:#c62828;display:block;border:1px solid #ffcdd2}
.status.info{background:#fff8e1;color:#e65100;display:block;border:1px solid #ffe082}

/* 每張卡片 */
.cards-wrap{margin-bottom:14px}
.inv-card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 8px rgba(0,0,0,.08);margin-bottom:10px;border-left:4px solid #4472C4}
.inv-card.err-card{border-left-color:#e53935}
.card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.card-fn{font-size:13px;font-weight:bold;color:#1e3a5f}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:500}
.tag-blue{background:#e8f0fe;color:#3558b8}
.tag-green{background:#e8f5e9;color:#2e7d32}
.tag-gray{background:#f0f4f8;color:#555}
.card-errmsg{font-size:12px;color:#c62828}
.mini-t{width:100%;border-collapse:collapse;font-size:12px}
.mini-t th{padding:5px 8px;text-align:center;color:#666;background:#f5f7fc;border-bottom:1px solid #e8edf5;font-weight:600}
.mini-t td{padding:5px 8px;text-align:center;border-bottom:1px solid #f0f0f0}
.mini-t tr:last-child td{border-bottom:none}
.c-code{font-family:monospace;font-weight:bold;color:#2952a3}
.c-qty{font-weight:bold;color:#2e7d32}
.c-price{color:#666}

/* 彙總表 */
.result-box{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.1);display:none;margin-bottom:16px}
.res-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.res-title{font-size:16px;font-weight:bold;color:#1e3a5f}
.res-stat{font-size:12px;background:#e8f0fe;color:#3558b8;padding:4px 12px;border-radius:20px;font-weight:500}
.big-t{width:100%;border-collapse:collapse;font-size:12px}
.big-t thead tr{background:#4472C4}
.big-t th{padding:9px 6px;text-align:center;color:#fff;font-size:11px;font-weight:600}
.big-t .ch{font-size:9px;color:rgba(255,255,255,.65);display:block;font-weight:400;margin-top:1px}
.big-t tbody tr:nth-child(even) td{background:#f8faff}
.big-t tbody tr:hover td{background:#eef3fc}
.big-t td{padding:8px 6px;text-align:center;border-bottom:1px solid #eee;font-size:12px}
.day-sep td{background:#f0f4f8!important;font-size:11px;color:#888;font-weight:bold;text-align:left;padding-left:12px!important;border-bottom:2px solid #dde3f0!important}
.t-a{width:13%}.t-b{width:10%}.t-c{width:6%}.t-d{width:5%}.t-e{width:5%}.t-f{width:11%}
.t-g{font-family:monospace;font-weight:bold;color:#2952a3;width:12%}
.t-h{font-weight:bold;color:#2e7d32;width:7%}
.t-i{color:#555;width:9%}
.t-j{color:#999;width:6%}
.vp{font-size:10px;padding:1px 8px;border-radius:10px;background:#e8f5e9;color:#2e7d32;font-weight:500}
.dp{font-size:10px;padding:1px 8px;border-radius:10px;background:#e8f0fe;color:#3558b8;font-weight:500}

.export-bar{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.exp-btn{flex:1;min-width:130px;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:bold;cursor:pointer;transition:opacity .2s}
.exp-btn:hover{opacity:.85}
.btn-copy{background:#e8f5e9;color:#2e7d32;border:1.5px solid #c8e6c9}
.btn-xlsx{background:#e3f2fd;color:#1565c0;border:1.5px solid #bbdefb}
</style>
</head>
<body>
<div class="container">
  <h1>📋 銷貨憑單掃描器</h1>
  <p class="subtitle">上傳多張圖片，AI 自動辨識，依日期 → 頁次排序匯出</p>

  <div class="col-section">
    <div class="col-section-title">📌 EXCEL 欄位對應</div>
    <div class="col-grid" style="margin-bottom:8px">
      <div class="col-cell"><div class="col-letter">A</div><div class="col-label">客戶編號</div></div>
      <div class="col-cell"><div class="col-letter">B</div><div class="col-label">廠商名稱</div></div>
      <div class="col-cell"><div class="col-letter">C</div><div class="col-label">年（西元）</div></div>
      <div class="col-cell"><div class="col-letter">D</div><div class="col-label">月</div></div>
      <div class="col-cell"><div class="col-letter">E</div><div class="col-label">日</div></div>
    </div>
    <div class="col-grid">
      <div class="col-cell hl"><div class="col-letter">F</div><div class="col-label">完整日期</div></div>
      <div class="col-cell"><div class="col-letter">G</div><div class="col-label">貨號</div></div>
      <div class="col-cell"><div class="col-letter">H</div><div class="col-label">數量</div></div>
      <div class="col-cell"><div class="col-letter">I</div><div class="col-label">金額／單價</div></div>
      <div class="col-cell"><div class="col-letter">J</div><div class="col-label">頁次</div></div>
    </div>
  </div>

  <div class="upload-zone" id="dz">
    <input type="file" accept="image/*" multiple id="fi">
    <div class="uz-icon">📷</div>
    <div class="uz-text">點擊選擇圖片（可多選）</div>
    <div class="uz-hint">支援 JPG、PNG、HEIC，可一次選多張</div>
  </div>

  <div class="thumb-strip" id="thumbs"></div>

  <div class="btn-row">
    <button class="scan-btn" id="scanBtn" disabled>🔍 開始 AI 批次辨識</button>
    <button class="reset-btn" id="resetBtn" onclick="resetAll()">✕ 清除</button>
  </div>

  <div class="prog-wrap" id="pw">
    <div class="prog-bg"><div class="prog-bar" id="pb"></div></div>
    <div class="prog-txt" id="pt">準備中…</div>
  </div>

  <div class="status" id="sb"></div>
  <div class="cards-wrap" id="cards"></div>

  <div class="result-box" id="rb">
    <div class="res-hd">
      <span class="res-title">📊 彙總結果（依日期 → 頁次排序）</span>
      <span class="res-stat" id="rs">0 筆</span>
    </div>
    <table class="big-t">
      <thead><tr>
        <th class="t-a">A<span class="ch">客戶編號</span></th>
        <th class="t-b">B<span class="ch">廠商</span></th>
        <th class="t-c">C<span class="ch">年</span></th>
        <th class="t-d">D<span class="ch">月</span></th>
        <th class="t-e">E<span class="ch">日</span></th>
        <th class="t-f">F<span class="ch">完整日期</span></th>
        <th class="t-g">G<span class="ch">貨號</span></th>
        <th class="t-h">H<span class="ch">數量</span></th>
        <th class="t-i">I<span class="ch">金額/單價</span></th>
        <th class="t-j">J<span class="ch">頁次</span></th>
      </tr></thead>
      <tbody id="rtb"></tbody>
    </table>
    <div class="export-bar">
      <button class="exp-btn btn-copy" onclick="copyTSV()">📋 複製全部（貼到 Excel）</button>
      <button class="exp-btn btn-xlsx" onclick="dlXLSX()">📥 下載 Excel 檔</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const PROXY='https://keyin.sophiesu000.workers.dev';
let files=[],allInvoices=[];

const fi=document.getElementById('fi');
const scanBtn=document.getElementById('scanBtn');
const resetBtn=document.getElementById('resetBtn');
const sb=document.getElementById('sb');
const rb=document.getElementById('rb');
const thumbs=document.getElementById('thumbs');
const cards=document.getElementById('cards');
const pw=document.getElementById('pw');
const pb=document.getElementById('pb');
const pt=document.getElementById('pt');
const dz=document.getElementById('dz');

dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');addFiles([...e.dataTransfer.files].filter(f=>f.type.startsWith('image/')))});
fi.addEventListener('change',()=>{addFiles([...fi.files]);fi.value='';});

function addFiles(newFs){
  newFs.forEach(f=>{
    if(files.find(x=>x.file.name===f.name&&x.file.size===f.size))return;
    const e={file:f,dataUrl:null,status:'pending',result:null};
    files.push(e);
    const r=new FileReader();
    r.onload=ev=>{e.dataUrl=ev.target.result;renderThumbs()};
    r.readAsDataURL(f);
  });
  renderThumbs();updateBtn();
  resetBtn.style.display=files.length?'block':'none';
}

function renderThumbs(){
  thumbs.innerHTML=files.map((f,i)=>{
    const badge=f.status==='done'?'✅':f.status==='err'?'❌':f.status==='scanning'?'⏳':'';
    const cls=f.status==='done'?'done':f.status==='err'?'err':f.status==='scanning'?'scanning':'';
    return`<div class="thumb ${cls}">
      <span class="thumb-del" onclick="rmFile(${i})">✕</span>
      ${f.dataUrl?`<img src="${f.dataUrl}" alt="">`:`<div style="height:68px;background:#eef2f7;display:flex;align-items:center;justify-content:center;font-size:22px">📄</div>`}
      <div class="thumb-name">${f.file.name}</div>
      ${badge?`<div class="thumb-badge">${badge}</div>`:''}
    </div>`;
  }).join('');
}

function rmFile(i){files.splice(i,1);renderThumbs();updateBtn();resetBtn.style.display=files.length?'block':'none';}

function updateBtn(){
  scanBtn.disabled=files.length===0;
  scanBtn.textContent=`🔍 開始 AI 批次辨識${files.length?' ('+files.length+' 張)':''}`;
}

function resetAll(){
  files=[];allInvoices=[];
  thumbs.innerHTML='';cards.innerHTML='';
  rb.style.display='none';pw.style.display='none';
  setStatus('');scanBtn.disabled=true;resetBtn.style.display='none';
  scanBtn.textContent='🔍 開始 AI 批次辨識';
}

function setStatus(msg,type=''){
  sb.innerHTML=msg;sb.className='status'+(type?' '+type:'');
  if(!type)sb.style.display='none';
}

function rocToAD(y){const n=parseInt(y);if(isNaN(n))return new Date().getFullYear();return n>1900?n:n+1911;}
function fDate(y,m,d){return `${y}/${m}/${d}`;}

scanBtn.addEventListener('click',async()=>{
  if(!files.length)return;
  scanBtn.disabled=true;resetBtn.style.display='none';
  allInvoices=[];cards.innerHTML='';rb.style.display='none';
  pw.style.display='block';setStatus('');
  const total=files.length;

  for(let i=0;i<total;i++){
    const entry=files[i];
    entry.status='scanning';renderThumbs();
    pb.style.width=Math.round(i/total*100)+'%';
    pt.textContent=`辨識第 ${i+1} / ${total} 張：${entry.file.name}`;

    try{
      const base64=entry.dataUrl.split(',')[1];
      const mime=entry.dataUrl.startsWith('data:image/png')?'image/png':'image/jpeg';
      const resp=await fetch(PROXY,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-6',max_tokens:1000,
          system:`你是銷貨憑單 OCR 助手。從圖片擷取資料，回傳純 JSON（不含 markdown 或說明）：
{"customer_id":"客戶編號欄完整內容","vendor":"廠商公司名稱（如：三憶食品、美食家）","year":年份數字（民國年加1911轉西元）,"month":月份數字,"day":日期數字,"page":頁次數字（右上角，找不到填1）,"items":[{"code":"貨號","qty":數量數字,"price":金額數字（找不到填0）}]}
廠商常見：三憶食品、美食家。items 只含有貨號+數量行，空白行忽略，price純數字。`,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:mime,data:base64}},
            {type:'text',text:'請擷取銷貨憑單資料，年份轉西元，回傳 JSON。'}
          ]}]
        })
      });
      const json=await resp.json();
      if(json.error)throw new Error(json.error.message);
      const txt=json.content.map(b=>b.text||'').join('');
      const data=JSON.parse(txt.replace(/```json|```/g,'').trim());
      if(!data.items?.length)throw new Error('未辨識到商品');
      data.year=rocToAD(data.year);
      entry.status='done';entry.result=data;
      allInvoices.push({customer_id:data.customer_id||'',vendor:data.vendor||'',year:data.year,month:data.month||0,day:data.day||0,page:data.page||1,items:data.items,src:entry.file.name});
      appendCard(entry.file.name,data,null);
    }catch(err){
      entry.status='err';
      appendCard(entry.file.name,null,err.message);
    }
    renderThumbs();
    if(i<total-1)await new Promise(r=>setTimeout(r,400));
  }

  pb.style.width='100%';
  const ok=files.filter(f=>f.status==='done').length;
  const fail=total-ok;
  pt.textContent=`完成！${ok} 張成功${fail?'，'+fail+' 張失敗':''}`;
  if(allInvoices.length){
    renderTable();
    const n=allInvoices.reduce((s,inv)=>s+inv.items.length,0);
    setStatus(`✅ 完成：${ok} 張成功${fail?'，'+fail+' 張失敗':''}，共 ${n} 筆資料`,fail?'info':'ok');
  }else{
    setStatus('❌ 全部辨識失敗，請確認圖片是否清晰','err');
  }
  scanBtn.disabled=false;resetBtn.style.display='block';updateBtn();
});

function getSorted(){
  return [...allInvoices].sort((a,b)=>{
    if(a.year!==b.year)return a.year-b.year;
    if(a.month!==b.month)return a.month-b.month;
    if(a.day!==b.day)return a.day-b.day;
    return a.page-b.page;
  }).flatMap(inv=>inv.items.map(it=>({
    customer_id:inv.customer_id,vendor:inv.vendor,
    year:inv.year,month:inv.month,day:inv.day,
    full_date:fDate(inv.year,inv.month,inv.day),
    code:it.code,qty:it.qty,price:it.price||0,page:inv.page
  })));
}

function appendCard(fn,data,err){
  const d=document.createElement('div');
  d.className='inv-card'+(err?' err-card':'');
  if(data){
    d.innerHTML=`<div class="card-hd">
      <span class="card-fn">📄 ${fn}</span>
      <div class="tags">
        <span class="tag tag-green">${data.vendor||'—'}</span>
        <span class="tag tag-blue">${fDate(data.year,data.month,data.day)}</span>
        <span class="tag tag-gray">頁次 ${data.page||'?'}</span>
        <span class="tag tag-gray">${data.customer_id||'—'}</span>
      </div>
    </div>
    <table class="mini-t">
      <thead><tr><th>#</th><th>貨號</th><th>數量</th><th>金額/單價</th></tr></thead>
      <tbody>${data.items.map((it,j)=>`<tr><td>${j+1}</td><td class="c-code">${it.code}</td><td class="c-qty">${it.qty}</td><td class="c-price">${it.price||'—'}</td></tr>`).join('')}</tbody>
    </table>`;
  }else{
    d.innerHTML=`<div class="card-hd"><span class="card-fn">📄 ${fn}</span><span class="card-errmsg">❌ ${err}</span></div>`;
  }
  cards.appendChild(d);
}

function renderTable(){
  const rows=getSorted();
  let lastKey='';
  document.getElementById('rtb').innerHTML=rows.map((r,i)=>{
    const key=`${r.year}-${r.month}-${r.day}`;
    let sep='';
    if(key!==lastKey){lastKey=key;if(i>0)sep=`<tr class="day-sep"><td colspan="10">📅 ${r.full_date}</td></tr>`;}
    return sep+`<tr>
      <td class="t-a">${r.customer_id||'—'}</td>
      <td class="t-b"><span class="vp">${r.vendor||'—'}</span></td>
      <td class="t-c">${r.year}</td>
      <td class="t-d">${r.month}</td>
      <td class="t-e">${r.day}</td>
      <td class="t-f"><span class="dp">${r.full_date}</span></td>
      <td class="t-g">${r.code}</td>
      <td class="t-h">${r.qty}</td>
      <td class="t-i">${r.price||'—'}</td>
      <td class="t-j">${r.page}</td>
    </tr>`;
  }).join('');
  document.getElementById('rs').textContent=`共 ${rows.length} 筆`;
  rb.style.display='block';
}

function copyTSV(){
  const rows=getSorted();
  if(!rows.length)return;
  const lines=['客戶編號\t廠商\t年\t月\t日\t完整日期\t貨號\t數量\t金額/單價\t頁次']
    .concat(rows.map(r=>`${r.customer_id}\t${r.vendor}\t${r.year}\t${r.month}\t${r.day}\t${r.full_date}\t${r.code}\t${r.qty}\t${r.price||''}\t${r.page}`));
  navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('✅ 已複製！\n開啟 Excel，點選 A1 儲存格，按 Ctrl+V 貼上'));
}

function dlXLSX(){
  const rows=getSorted();
  if(!rows.length||typeof XLSX==='undefined')return;
  const wb=XLSX.utils.book_new();
  const hdr=['客戶編號','廠商','年','月','日','完整日期','貨號','數量','金額/單價','頁次'];
  const data=[hdr,...rows.map(r=>[r.customer_id,r.vendor,r.year,r.month,r.day,r.full_date,r.code,r.qty,r.price||'',r.page])];
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:16},{wch:12},{wch:6},{wch:5},{wch:5},{wch:12},{wch:14},{wch:7},{wch:10},{wch:6}];
  XLSX.utils.book_append_sheet(wb,ws,'進貨記錄');
  XLSX.writeFile(wb,`進貨記錄_${new Date().toISOString().slice(0,10)}.xlsx`);
}
</script>
