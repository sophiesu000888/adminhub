

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>烤鴨庫存管理</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&family=Patrick+Hand&display=swap');

:root {
  --paper: #fdfbf7;
  --ink: #2d2d2d;
  --bg: var(--paper);
  --s1: #ffffff;
  --s2: #f8f5ef;
  --s3: #ece8df;
  
  --border: #2d2d2d;
  --border2: rgba(45,45,45,0.25);
  --border3: rgba(45,45,45,0.5);
  
  --gold: #b8942a;
  --gold2: #9e7f22;
  --gold3: #ffffff;
  --gold-dim: rgba(184,148,42,0.1);
  --gold-dim2: var(--ink);
  
  --text: #2d2d2d;
  --dim: #555555;
  --muted: #888888;
  
  --est: #d35400;
  --act: #27ae60;
  
  --red: #c0392b;
  --red-dim: rgba(192,57,43,0.1);
  
  --blue: #2980b9;
  --green: #27ae60;
  --purple: #8e44ad;
  
  --shadow: 3px 3px 0px 0px var(--ink);
  --shadow2: 4px 4px 0px 0px var(--ink);
  --shadow-sm: 2px 2px 0px 0px var(--ink);
  --shadow-hover: 1px 1px 0px 0px var(--ink);
  
  --hand-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
  --card-radius: 12px 3px 10px 3px / 3px 10px 3px 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Patrick Hand', 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  background-image: radial-gradient(#c8c4bc 1.5px, transparent 1.5px);
  background-size: 20px 20px;
  padding-top: 44px;
}

/* ── PAGE HEADER ── */
#page-header {
  text-align: center;
  padding: 14px 16px 10px;
}
#page-title {
  font-family: 'Kalam', 'Noto Sans TC', sans-serif;
  font-size: 3.2rem; font-weight: 700;
  color: var(--ink); letter-spacing: 2px;
  -webkit-text-stroke: 1px rgba(45,45,45,0.2);
  transform: rotate(-1deg);
  display: inline-block; width: 100%;
  text-align: center; margin-bottom: 10px;
}
#week-nav-wrap {
  display: flex; justify-content: center;
}
#week-nav {
  display: flex; align-items: center; gap: 6px;
}
/* ◀ ▶ arrows */
.wk-arrow {
  background: white; border: 2px solid var(--border); color: var(--ink);
  border-radius: 6px; width: 60px; height: 60px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; cursor: pointer; font-weight: 700;
  box-shadow: 2px 2px 0 0 var(--ink); transition: all .1s; flex-shrink: 0;
}
.wk-arrow:hover:not([disabled]) { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--ink); }
.wk-arrow[disabled] { opacity: .3; cursor: default; box-shadow: none; }
/* current week display */
.wk-label {
  font-family: 'Kalam', cursive; font-weight: 700; font-size: 28px;
  color: var(--ink); padding: 4px 14px; white-space: nowrap;
  background: #fff8e7; border: 2px solid var(--ink);
  border-radius: var(--hand-radius); box-shadow: 2px 2px 0 0 var(--ink);
  min-width: 240px; text-align: center;
}
.wk-label.archived { background: #f5f5f5; color: var(--dim); border-style: dashed; }
/* ＋ － buttons */
.wk-btn {
  background: white; border: 2px solid var(--border); color: var(--ink);
  border-radius: var(--hand-radius); padding: 4px 12px; font-size: 28px;
  font-family: 'Kalam', cursive; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: all .1s;
  box-shadow: 2px 2px 0 0 var(--ink);
}
.wk-btn:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--ink); }

/* ── DRAWER TABS RAIL (side tabs) ── */
.drawer-tabs-rail {
  position: fixed; right: 0; top: 50%;
  transform: translateY(-50%); z-index: 1100;
  display: flex; flex-direction: column; gap: 4px;
}
.side-tab {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; width: 52px; padding: 12px 0;
  border-radius: 10px 0 0 10px; cursor: pointer; user-select: none;
  box-shadow: -3px 0 8px rgba(0,0,0,.12); transition: width .15s, box-shadow .15s;
  border-top: 1.5px solid rgba(45,45,45,.18);
  border-bottom: 1.5px solid rgba(45,45,45,.18);
  border-left: 3px solid rgba(45,45,45,.18);
}
.side-tab:hover { width: 62px; box-shadow: -4px 0 12px rgba(0,0,0,.2); }
.side-tab.open  { width: 62px; box-shadow: -4px 0 12px rgba(0,0,0,.25); }
.side-tab .st-icon  { font-size: 1.6rem; line-height: 1; }
.side-tab .st-label {
  writing-mode: vertical-rl; text-orientation: mixed;
  font-size: 1.0rem; font-weight: 700; letter-spacing: 1px;
  opacity: .9; line-height: 1; font-family: 'Kalam', 'Noto Sans TC', sans-serif;
}
#stab-config { background: #f3e5f5; color: #7b1fa2; border-left-color: #7b1fa2; }
#stab-stock  { background: #e8f5e9; color: #2e7d32; border-left-color: #2e7d32; }

/* ── ALERT ── */
/* alert tab badge */
.alert-ok { background: #fff0f0; color: var(--red); font-family: 'Patrick Hand',sans-serif; font-weight: 700; font-size: 30px; padding: 14px 20px; border-radius: 8px; border: 1.5px solid var(--red); margin-bottom: 16px; }
.alert-safe { background: #e8f5e9; color: #2e7d32; font-family: 'Patrick Hand',sans-serif; font-weight: 700; font-size: 30px; padding: 14px 20px; border-radius: 8px; border: 1.5px solid #81c784; margin-bottom: 16px; }

/* ── OVERVIEW ── */
#tab-overview { padding: 2px 12px 16px; display: flex; justify-content: center; align-items: flex-start; gap: 16px; overflow-x: auto; }
#ov-container { display: flex; flex-direction: row; align-items: stretch; gap: 8px; flex-shrink: 0; }
#ov-container > .ov-wrap { display: inline-block; min-width: 0; }

/* ── WEEK PREVIEW PANELS ── */
.wk-preview {
  flex-shrink: 0;
  opacity: 0.75; pointer-events: none; user-select: none;
  transition: opacity .25s;
}
.wk-preview:hover { opacity: 0.9; }
#prev-week-panel { }
#next-week-panel { }
.preview-wk-label {
  font-family: 'Kalam', cursive; font-size: 24px; font-weight: 700;
  text-align: center; letter-spacing: 1px; color: var(--dim);
  height: 40px; display: flex; align-items: center; justify-content: center;
  margin-bottom: 7px;
}
/* ── INLINE ALERT ── */
#inline-alert { display: flex; align-items: stretch; }
#inline-alert .alert-ok, #inline-alert .alert-safe {
  writing-mode: vertical-rl; text-orientation: mixed;
  display: flex; align-items: center; justify-content: center;
  padding: 16px 10px; border-radius: 8px; margin-bottom: 0;
  font-size: 26px; letter-spacing: 2px; white-space: nowrap;
}

/* ── SECTION TITLE ── */
.sec-title {
  font-size: 44px; font-family: 'Kalam', cursive; font-weight: 700;
  color: var(--ink); padding-bottom: 10px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px; transform: rotate(-1deg);
}
.sec-title::before { content: '📌'; font-size: 40px; }

/* ── OV TABLE ── */
.ov-wrap { overflow-x: auto; background: white; border: 2.5px solid var(--border); border-radius: var(--card-radius); box-shadow: var(--shadow2); margin-bottom: 20px; }
table.ov { width: auto; border-collapse: collapse; table-layout: fixed; }
table.ov thead tr { background: var(--s2); border-bottom: 2.5px solid var(--ink); }
table.ov th {
  padding: 6px 8px; font-size: 30px; font-family: 'Kalam', cursive; font-weight: 700; color: var(--ink);
  border-right: 1px solid var(--border2); white-space: nowrap; vertical-align: bottom; text-align: center;
  width: 60px; height: 104px;
}
table.ov th:last-child { border-right: none; }
table.ov th.lft { text-align: center; }
table.ov td { padding: 0; border-bottom: 1.5px solid var(--border2); border-right: 1.5px solid var(--border2); vertical-align: middle; }
table.ov td:last-child { border-right: none; }
table.ov tr:last-child td { border-bottom: none; }
table.ov tr:hover td { background: rgba(0,0,0,.02); }
.sc { padding: 8px 6px; text-align: center; white-space: nowrap; }
.sn { font-weight: 700; font-size: 32px; font-family: 'Kalam', cursive; display: block; text-align: center; }
.st {
  font-size: 20px; font-family: 'Patrick Hand', sans-serif; font-weight: 700;
  background: white; border: 1.5px solid var(--ink); color: var(--ink);
  padding: 2px 6px; border-radius: 6px; margin-left: 8px; vertical-align: middle;
}
.dc { padding: 6px 4px; text-align: center; width: 60px; }
.dc.cs { background: #fdfbf7; }
.dc.cu { background: #fff0f0; }
.day-inner { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.ev {
  font-family: 'Kalam', cursive; font-weight: 700; font-size: 32px;
  color: var(--red); background: transparent;
  border-radius: 6px; padding: 2px 6px; display: flex; align-items: center; gap: 3px;
  border: none;
}
.ev input { background: transparent; border: none; color: var(--red); font-family: 'Kalam', cursive; font-weight: 700; font-size: 32px; width: 64px; text-align: center; padding: 0; }
.ev input:focus { outline: none; border-bottom: 1.5px dashed var(--red); }
.av {
  font-family: 'Kalam', cursive; font-weight: 700; font-size: 32px;
  color: var(--act); background: transparent;
  border-radius: 6px; padding: 2px 6px; display: flex; align-items: center; gap: 3px;
  border: none;
}
.av input { background: transparent; border: none; color: var(--act); font-family: 'Kalam', cursive; font-weight: 700; font-size: 32px; width: 64px; text-align: center; padding: 0; }
.av input:focus { outline: none; border-bottom: 1.5px dashed var(--act); }

.fa-btn {
  font-size: 24px; background: white; border: 2px solid var(--ink); color: var(--ink);
  border-radius: 6px; padding: 3px 8px; cursor: pointer; white-space: nowrap; transition: all .1s;
  font-family: 'Patrick Hand', sans-serif; font-weight: 700; box-shadow: 1.5px 1.5px 0 0 var(--ink);
}
.fa-btn:hover { transform: translate(1px, 1px); box-shadow: 0 0 0 0; background: #f0f0f0; }

.lv {
  font-family: 'Kalam', cursive; font-weight: 700; font-size: 36px;
  color: var(--ink); background: transparent;
  border-radius: 6px; padding: 3px 10px;
  border: none;
  display: inline-block;
}

/* ── HOLIDAY DIAGONAL ── */
.cell-holiday {
  position: relative; overflow: hidden;
}
.cell-holiday::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(
    to top right,
    transparent calc(50% - 0.8px),
    rgba(0,0,0,0.22) calc(50% - 0.8px),
    rgba(0,0,0,0.22) calc(50% + 0.8px),
    transparent calc(50% + 0.8px)
  );
}

.lock-week-btn {
  font-size: 22px; background: white; border: 1.5px solid var(--border2); color: var(--dim);
  border-radius: 6px; padding: 2px 7px; cursor: pointer; white-space: nowrap; transition: all .1s;
  font-family: 'Patrick Hand', sans-serif; font-weight: 700; margin-top: 3px; display: block;
}
.lock-week-btn:hover { border-color: var(--act); color: var(--act); background: rgba(39,174,96,.06); }
.lock-week-btn.locked { background: rgba(39,174,96,.1); border-color: var(--act); color: var(--act); }
.holi { font-size: 36px; line-height: 1; }
.zero { color: var(--muted); font-size: 28px; font-family: 'Kalam', cursive; }
th.cs { color: var(--gold); } th.cu { color: var(--red); }
tr.tr-total td {
  background: var(--s2); border-top: 2.5px solid var(--ink);
  font-family: 'Kalam', cursive; font-weight: 700; font-size: 36px;
  padding: 12px 6px; text-align: center; color: var(--ink);
}
tr.tr-total .sc { font-size: 28px; font-family: 'Patrick Hand', sans-serif; font-weight: 700; color: var(--ink); text-align: left; }

/* ── ACCORDION ── */
.acc-list { display: flex; flex-direction: column; gap: 12px; }
.acc-block {
  background: white; border: 2.5px solid var(--ink);
  border-radius: var(--card-radius); overflow: hidden; box-shadow: var(--shadow2);
}
.acc-header {
  padding: 16px 20px; background: var(--s2);
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; user-select: none; border-bottom: 2px solid transparent;
}
.acc-header:hover { background: var(--s3); }
.acc-header.open { border-bottom-color: var(--ink); }
.acc-header .ah-name { font-family: 'Kalam', cursive; font-size: 40px; font-weight: 700; color: var(--ink); }
.acc-header .ah-desc { font-size: 26px; color: var(--dim); margin-top: 2px; font-family: 'Patrick Hand', sans-serif; font-weight: 700; }
.acc-header .ah-badge {
  margin-left: auto; font-size: 26px; font-family: 'Patrick Hand', sans-serif; font-weight: 700;
  color: var(--ink); background: white; border: 1.5px solid var(--ink);
  padding: 4px 10px; border-radius: 8px;
}
.acc-header .ah-arrow { font-size: 24px; color: var(--ink); transition: transform .2s; flex-shrink: 0; }
.acc-header.open .ah-arrow { transform: rotate(180deg); }
.acc-body { padding: 20px; border-top: 2.5px solid var(--ink); }

/* ── WEEK LIST ── */
.week-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; padding-right: 5px; }
.wk-row {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  background: white; border: 1.5px solid var(--border2); border-radius: 8px;
}
.wk-row .wr-info { flex: 1; }
.wr-info .wr-label { font-size: 30px; font-weight: 700; font-family: 'Patrick Hand', sans-serif; color: var(--ink); }
.wr-info .wr-range { font-size: 24px; font-family: 'Patrick Hand', sans-serif; color: var(--dim); font-weight: 700; }
.wk-toggle-btn {
  font-size: 26px; font-weight: 700; border-radius: 6px; padding: 5px 12px;
  cursor: pointer; transition: all .1s; white-space: nowrap; font-family: 'Patrick Hand', sans-serif;
  box-shadow: 1.5px 1.5px 0 0 var(--ink);
}
.wk-toggle-btn:hover { transform: translate(1px, 1px); box-shadow: 0 0 0 0; }
.wk-toggle-btn.off { background: white; border: 1.5px solid var(--border2); color: var(--dim); }
.wk-toggle-btn.on-amber { background: #fff3cd; border: 1.5px solid #ffc107; color: #856404; }
.wk-toggle-btn.on-purple { background: #f3e5f5; border: 1.5px solid #ce93d8; color: #6a1b9a; }
.wk-toggle-btn.on-check { background: #e8f5e9; border: 1.5px solid #81c784; color: #2e7d32; }
.wk-toggle-btn.on-skip { background: #f5f5f5; border: 1.5px dashed var(--muted); color: var(--muted); text-decoration: line-through; box-shadow: none; }
.wk-qty { min-width: 120px; text-align: right; font-family: 'Kalam', cursive; font-size: 32px; color: var(--ink); font-weight: 700; }

/* ── TAG ── */
.tag { display: inline-flex; align-items: center; gap: 4px; font-size: 22px; font-weight: 700; border-radius: 6px; padding: 3px 8px; font-family: 'Patrick Hand', sans-serif; }
.tag-l { background: #fff8e7; color: var(--gold); border: 1.5px solid var(--gold); }
.tag-d { background: #f3e5f5; color: #8e44ad; border: 1.5px solid #8e44ad; }

/* ── INPUT ── */
.qty-inp { width: 108px; background: white; border: 1.5px solid var(--ink); color: var(--ink); border-radius: 6px; padding: 5px 7px; font-family: 'Kalam', cursive; font-weight: 700; font-size: 32px; text-align: center; }
.qty-inp:focus { outline: none; border-color: var(--blue); }
.qty-inp.purple { color: #8e44ad; }

/* ── STOCK ── */
.stock-panel { display: flex; flex-direction: column; gap: 20px; }
.s-card {
  background: white; border: 2.5px solid var(--ink);
  border-radius: var(--card-radius); padding: 20px; box-shadow: var(--shadow2);
}
.s-card h3 {
  font-size: 36px; font-family: 'Kalam', cursive; color: var(--ink);
  margin-bottom: 16px; border-bottom: 2px dashed var(--border2); padding-bottom: 8px;
}
.add-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg label { font-size: 26px; color: var(--ink); font-weight: 700; font-family: 'Patrick Hand', sans-serif; }
.fg input {
  background: white; border: 1.5px solid var(--ink); color: var(--ink);
  border-radius: 6px; padding: 6px 10px; font-size: 28px; font-family: 'Patrick Hand', sans-serif;
  font-weight: 700;
}
.fg input:focus { outline: none; border-color: var(--blue); }
.sle { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px dashed var(--border2); font-size: 28px; font-family: 'Patrick Hand', sans-serif; font-weight: 700; }
.sle:last-child { border-bottom: none; }
.sle .sd { font-family: 'Patrick Hand', sans-serif; font-size: 24px; color: var(--dim); min-width: 164px; }
.sle .sn2 { flex: 1; color: var(--ink); margin: 0 10px; }
.sle .sq { font-family: 'Kalam', cursive; font-weight: 700; font-size: 36px; color: var(--act); }

/* ── BTN ── */
.btn {
  background: white; color: var(--ink); border: 2.5px solid var(--ink);
  border-radius: var(--hand-radius); padding: 8px 20px;
  font-size: 28px; font-weight: 700; font-family: 'Patrick Hand', sans-serif;
  cursor: pointer; transition: all .1s; box-shadow: var(--shadow-sm);
}
.btn:hover { transform: translate(2px, 2px); box-shadow: 0 0 0 0; }
.btn-sm { padding: 5px 14px; font-size: 26px; }
.btn-out { background: white; }
.btn-g { background: #e8f5e9; border-color: var(--green); color: var(--green); }
.btn-red { background: #ffebee; border-color: var(--red); color: var(--red); }

/* ── DIVIDER ── */
.hdivide { height: 2px; background: dashed var(--border2); margin: 16px 0; }

/* ── SELECT ── */
select.ds {
  background: white; border: 1.5px solid var(--ink); color: var(--ink);
  border-radius: 6px; padding: 6px 10px; font-size: 28px; font-weight: 700;
  font-family: 'Patrick Hand', sans-serif; cursor: pointer;
}

/* ── CONFIG QTY FIELD bg ── */
.cfg-qty-panel {
  display: inline-flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; padding: 7px 12px;
  background: white; border: 1.5px dashed var(--border2); border-radius: 8px; align-items: center;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border3); border-radius: 3px; }

/* ── DRAWER OVERLAY ── */
.drawer-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 500;
}
.drawer-overlay.show { display: block; }

/* ── SIDE DRAWER ── */
.side-drawer {
  position: fixed; top: 0; right: -55vw; width: 50vw; max-width: 95vw;
  height: 100vh; background: var(--paper); z-index: 600;
  border-left: 2.5px solid var(--border); box-shadow: -4px 0 20px rgba(0,0,0,.15);
  transition: right .25s ease; display: flex; flex-direction: column;
}
.side-drawer.open { right: 0; }
.drawer-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 20px; border-bottom: 2.5px solid var(--border);
  background: var(--s2); flex-shrink: 0;
}
.drawer-header h2 {
  font-family: 'Kalam', cursive; font-size: 40px; font-weight: 700;
  color: var(--ink); margin: 0; flex: 1;
}
.drawer-close {
  background: none; border: 2px solid var(--border); border-radius: 8px;
  width: 64px; height: 64px; display: flex; align-items: center; justify-content: center;
  font-size: 32px; cursor: pointer; color: var(--ink); transition: all .1s;
  box-shadow: 2px 2px 0 0 var(--ink);
}
.drawer-close:hover { transform: translate(1px,1px); box-shadow: 1px 1px 0 0 var(--ink); }
.drawer-body { flex: 1; overflow-y: auto; padding: 20px; }
#drawer-config .drawer-header { background: #f3e5f5; border-bottom-color: #7b1fa2; }
#drawer-stock  .drawer-header { background: #e8f5e9; border-bottom-color: #2e7d32; }

/* ── NAV hidden ── */
#nav { display: none; }

@media(max-width:700px) {
  .stock-panel { grid-template-columns: 1fr; }
  #toolbar { gap: 6px; padding: 6px 10px; }
}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="shared.js"></script>
</head>
<body>

<!-- 頁首：標題 + 週次導覽 -->
<div id="page-header">
  <div id="page-title">🦆 Roast Duck Inventory</div>
  <div id="week-nav-wrap">
    <div id="week-nav"></div>
  </div>
</div>

<!-- 右側標籤群 -->
<div class="drawer-tabs-rail">
  <div class="side-tab" id="stab-config" onclick="openDrawer('config')" title="廠區設定">
    <span class="st-icon">⚙</span>
    <span class="st-label">廠區設定</span>
  </div>
  <div class="side-tab" id="stab-stock" onclick="openDrawer('stock')" title="庫存管理">
    <span class="st-icon">📦</span>
    <span class="st-label">庫存管理</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════
var SITES = ['F20','AP6B','聯電','群聯','央廚','P8'];
var DL = ['一','二','三','四','五','六','日'];
var DK = ['mon','tue','wed','thu','fri','sat','sun'];

function dowLabel(ds){ var p=ds.split('-'), d=new Date(+p[0],+p[1]-1,+p[2]).getDay(); return DL[d===0?6:d-1]; }
function dsIsWeekend(ds){ var p=ds.split('-'), d=new Date(+p[0],+p[1]-1,+p[2]).getDay(); return d===0||d===6; }

var BASE_HOLI = ['2026-04-03','2026-04-04','2026-04-05','2026-05-01','2026-05-30'];

// ═══════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════
function addDays(ds, n) {
  var p = ds.split('-'), d = new Date(+p[0], +p[1]-1, +p[2]+n);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmt(s) { var p=s.split('-'); return +p[1]+'/'+p[2]; }
function isWeekend(s) { var p=s.split('-'), d=new Date(+p[0],+p[1]-1,+p[2]); return d.getDay()===0||d.getDay()===6; }
function isNatHoli(s) { return BASE_HOLI.indexOf(s) >= 0; }
function isWorkday(s) { return !isWeekend(s) && !isNatHoli(s); }
function dateRange(start, end) {
  var arr = [], cur = start;
  while(cur <= end) { arr.push(cur); cur = addDays(cur,1); }
  return arr;
}
function weekMonForDate(ds) {
  var p = ds.split('-'), d = new Date(+p[0], +p[1]-1, +p[2]);
  var dow = d.getDay(), diff = dow===0 ? -6 : 1-dow;
  var mon = new Date(+p[0], +p[1]-1, +p[2]+diff);
  return mon.getFullYear()+'-'+String(mon.getMonth()+1).padStart(2,'0')+'-'+String(mon.getDate()).padStart(2,'0');
}
function weekRange(monDs) { return fmt(monDs) + '～' + fmt(addDays(monDs,6)); }
function workdaysInWeek(monDs) {
  var n=0;
  for(var i=0;i<5;i++) { if(!isNatHoli(addDays(monDs,i))) n++; }
  return n;
}

var WEEK_START = '2026-03-30';
var WEEK_INIT  = 8;
var WEEK_BASE_NUM = 14;

function genWeeks() {
  var weeks = [], cur = WEEK_START;
  var total = WEEK_INIT + (S ? (S.extraWeeks||0) : 0);
  for(var i=0;i<total;i++){ weeks.push(cur); cur=addDays(cur,7); }
  return weeks;
}
function rebuildWeeks(){
  // 若 state 裡已有自訂週次清單，直接用它；否則從 WEEK_START 生成
  if(S && S.weekMons && S.weekMons.length > 0){
    WEEK_MONS = S.weekMons.slice();
  } else {
    WEEK_MONS = genWeeks();
    if(S) S.weekMons = WEEK_MONS.slice();
  }
  WEEK_MONS.forEach(function(_,i){ensureWeek(i);});
}
var WEEK_MONS = [];

function twoMonthWeeks() {
  return WEEK_MONS.filter(function(ws,i){
    return !S.archivedWeeks || !S.archivedWeeks[i];
  });
}

function wkDs(wi, di) {
  var base = WEEK_MONS[wi];
  if(!base) return null;
  var p = base.split('-');
  var d = new Date(+p[0], +p[1]-1, +p[2]+di);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// ═══════════════════════════════════════
// SITE CONFIG DATA
// ═══════════════════════════════════════

var f20Cfg = {lunchBase:7, lunch1500:1, dinnerQty:4};
var f20LunchWeeks  = {};
var f20DinnerWeeks = {};
var f20Holi1500    = {};
var f20HoliDays    = {};

function f20LunchDayQty(mon){
  return f20Cfg.lunchBase + (f20Holi1500[mon]==='on' ? f20Cfg.lunch1500 : 0);
}

function f20Qty(ds) {
  if(isNatHoli(ds)||isWeekend(ds)) {
    return f20HoliDays[ds] ? (f20Cfg.lunchBase + f20Cfg.dinnerQty) : 0;
  }
  var mon = weekMonForDate(ds);
  var q = f20Cfg.lunchBase;
  if(f20Holi1500[mon]==='on') q += f20Cfg.lunch1500;
  if(f20DinnerWeeks[mon]==='on') q += f20Cfg.dinnerQty;
  return q;
}

var ap6bCfg = {lunchQty:3, dinnerQty:2, dinnerWeekOffset:0};

function ap6bHasDinner(mon) {
  var wi = WEEK_MONS.indexOf(mon);
  return wi>=0 && (wi%2)===ap6bCfg.dinnerWeekOffset;
}
function ap6bDayQty(ds) {
  if(isWeekend(ds)||isNatHoli(ds)) return 0;
  var mon = weekMonForDate(ds);
  return ap6bCfg.lunchQty + (ap6bHasDinner(mon)?ap6bCfg.dinnerQty:0);
}

var p8Weeks = {};
var p8Cfg = {wkQty:12};

function p8DayEst(ds) {
  if(isWeekend(ds)||isNatHoli(ds)) return 0;
  var mon = weekMonForDate(ds);
  if(!p8Weeks[mon] || p8Weeks[mon]!=='on') return 0;
  var avail = workdaysInWeek(mon);
  if(!avail) return 0;
  var wkQty = p8Cfg.wkQty;
  var base = Math.floor(wkQty/avail), rem = wkQty%avail;
  var idx=0;
  for(var i=0;i<5;i++) {
    var d2=addDays(mon,i);
    if(isNatHoli(d2)) continue;
    if(d2===ds) break;
    idx++;
  }
  return base + (idx<rem?1:0);
}

var qlCfg = {main:6, dbl:3};
var qunlianWeeks = {};

function qunlianDayQty(ds) {
  if(isWeekend(ds)||isNatHoli(ds)) return 0;
  var mon = weekMonForDate(ds);
  var w = qunlianWeeks[mon];
  if(!w) return 0;
  return (w.main==='on'?qlCfg.main:0)+(w.double==='on'?qlCfg.dbl:0);
}

var ycCfg = {main:2, dbl:1};
var yangchuDays = {};
var yangchuLocked = {};

function yangchuDayQty(ds) {
  if(isWeekend(ds)||isNatHoli(ds)) return 0;
  var d = yangchuDays[ds];
  if(!d) return 0;
  return (d.main==='on'?ycCfg.main:0)+(d.double==='on'?ycCfg.dbl:0);
}

var lianDianCfg = {main:8, dbl:4, dinner:4};
var lianDianWeeks = {};

function lianDianDayQty(ds) {
  if(isWeekend(ds)||isNatHoli(ds)) return 0;
  var p=ds.split('-'), dow=new Date(+p[0],+p[1]-1,+p[2]).getDay();
  var mon = weekMonForDate(ds);
  var w = lianDianWeeks[mon];
  if(!w) return 0;
  if(dow===2) return (w.main==='on' ? lianDianCfg.main : 0);       // 週二 → 主餐
  if(dow===4) return (w.double==='on' ? lianDianCfg.dbl : 0)+(w.dinner==='on' ? lianDianCfg.dinner : 0); // 週四 → 雙拼+晚餐
  return 0;
}

// ═══════════════════════════════════════
// CORE ESTIMATE
// ═══════════════════════════════════════
function getEst(site, ds) {
  if(site==='F20')  return f20Qty(ds);
  if(site==='AP6B') return ap6bDayQty(ds);
  if(site==='P8')   return p8DayEst(ds);
  if(site==='群聯')  return qunlianDayQty(ds);
  if(site==='央廚')  return yangchuDayQty(ds);
  if(site==='聯電')  return lianDianDayQty(ds);
  return 0;
}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
var S = {
  week: 0,
  initStock: 250,
  threshold: 50,
  extraWeeks: 0,
  stockLog: [],
  weekData: {},
  sitesOn: null,
  daysOn: null,
  openBlock: 'F20',
  archivedWeeks: {},
  pastExpanded: false
};
var f20HoliMonths = [];
// 廠區設定週次確認狀態：key = "site|mon", value = true
var cfgWeekConfirmed = {};

function ensureWeek(wi) {
  if(S.weekData[wi]) return;
  S.weekData[wi] = {};
  SITES.forEach(function(site) {
    S.weekData[wi][site] = {};
    DK.forEach(function(dk, di) {
      var ds = wkDs(wi, di);
      if(!ds) return;
      S.weekData[wi][site][dk] = {est: getEst(site,ds), act: null, locked: false};
    });
  });
}

function recompSite(site) {
  Object.keys(S.weekData).forEach(function(wi) {
    var wiNum = +wi;
    if(wiNum < 0 || wiNum >= WEEK_MONS.length || !WEEK_MONS[wiNum]) return;
    if(!S.weekData[wi][site]) return;
    DK.forEach(function(dk, di) {
      var ds = wkDs(wiNum, di);
      if(!ds) return;
      var cell = S.weekData[wi][site][dk];
      if(cell && cell.act===null) cell.est = getEst(site, ds);
    });
  });
}

function recompAll() {
  SITES.forEach(function(site) { recompSite(site); });
}

// 取得有效的庫存起始基準：
// 若有 monthInit 紀錄，以最新一筆的 date 為基準（realQty 為當日庫存，qty 為 diff）
// 回傳 { baseQty, baseDate }：baseDate 之後（含）的 stockLog 才計入，週次消耗也只算 baseDate 之後
function calcStockBase() {
  var lastInit = null;
  S.stockLog.forEach(function(e) {
    if(e.type === 'monthInit') {
      if(!lastInit || e.date >= lastInit.date) lastInit = e;
    }
  });
  if(lastInit) {
    return { baseQty: lastInit.realQty !== undefined ? lastInit.realQty : lastInit.qty, baseDate: lastInit.date };
  }
  return { baseQty: 0, baseDate: null };
}

function calcStock() {
  var base = calcStockBase();
  var t = base.baseQty;
  // 加上 baseDate 之後的非 monthInit 進貨（含 baseDate 當天之後的 monthInit diff 也不再計，因為已用 realQty）
  S.stockLog.forEach(function(e) {
    if(e.type === 'monthInit') {
      // 只有比 baseDate 更新的 monthInit 才計入（理論上不會有，因為 base 已是最新）
      if(base.baseDate && e.date > base.baseDate) t += e.qty;
      return;
    }
    if(!base.baseDate || e.date >= base.baseDate) t += e.qty;
  });
  // 扣掉 baseDate 之後所有週次的消耗
  var u = 0;
  Object.keys(S.weekData).forEach(function(wi) {
    var monDs = WEEK_MONS[+wi];
    if(!monDs) return;
    SITES.forEach(function(site) {
      DK.forEach(function(dk, di) {
        var ds = wkDs(+wi, di);
        if(!ds) return;
        if(base.baseDate && ds < base.baseDate) return; // 基準日之前不計
        var d = S.weekData[wi][site][dk];
        u += (d.act !== null ? d.act : d.est);
      });
    });
  });
  return t - u;
}

function weekTotals(wi) {
  var est=0,act=0,ha=false;
  SITES.forEach(function(site){
    DK.forEach(function(dk){
      var d=S.weekData[wi][site][dk];
      est+=d.est; if(d.act!==null){act+=d.act;ha=true;}
    });
  });
  return {est:est,act:act,ha:ha};
}

// ═══════════════════════════════════════
// WEEK NAV
// ═══════════════════════════════════════
function renderWeekNav() {
  var ws = WEEK_MONS[S.week];
  var endDs = addDays(ws, 6);
  var isArch = S.archivedWeeks && S.archivedWeeks[S.week];
  var label = fmt(ws) + ' ～ ' + fmt(endDs) + (isArch ? ' 📁' : '');

  var html = '';
  html += '<button class="wk-arrow" onclick="stepWeek(-1)"'+(S.week>0?'':' disabled')+'>◀</button>';
  html += '<span class="wk-label'+(isArch?' archived':'')+'">'+label+'</span>';
  html += '<button class="wk-arrow" onclick="stepWeek(1)"'+(S.week<WEEK_MONS.length-1?'':' disabled')+'>▶</button>';
  html += '<button class="wk-btn" style="background:var(--s2);border-style:dashed;color:var(--dim);padding:4px 10px;" onclick="addNextWeek()" title="新增下一週">＋</button>';
  if(WEEK_MONS.length > 1){
    html += '<button class="wk-btn" style="background:#fff0f0;border-style:dashed;color:var(--red);padding:4px 10px;font-size:22px;" onclick="deleteCurrentWeek()" title="刪除此週">🗑 刪除此週</button>';
  }
  document.getElementById('week-nav').innerHTML = html;
}

function stepWeek(dir){
  var n = S.week + dir;
  if(n >= 0 && n < WEEK_MONS.length) selWeek(n);
}

function addNextWeek(){
  // 加下一週：把新週次加到 S.weekMons 末尾
  if(!S.weekMons || S.weekMons.length === 0) {
    S.weekMons = genWeeks();
  }
  var lastMon = S.weekMons[S.weekMons.length-1];
  var nextMon = addDays(lastMon, 7);
  S.weekMons.push(nextMon);
  S.extraWeeks = (S.extraWeeks||0) + 1;
  rebuildWeeks();
  for(var i=WEEK_MONS.length-1;i>=0;i--){
    if(!S.archivedWeeks||!S.archivedWeeks[i]){S.week=i;break;}
  }
  saveState();
  renderWeekNav(); renderOverview(); renderTopStats();
}

function removeLastWeek(){
  if(WEEK_MONS.length <= 1) return;
  var lastWi = WEEK_MONS.length - 1;
  var hasData = false;
  if(S.weekData[lastWi]){
    SITES.forEach(function(site){
      DK.forEach(function(dk){
        var cell = S.weekData[lastWi][site][dk];
        if(cell && cell.act !== null) hasData = true;
      });
    });
  }
  if(hasData){
    if(!confirm('最後一週已有實際數值，確定要刪除嗎？')) return;
  }
  delete S.weekData[lastWi];
  if(S.archivedWeeks) delete S.archivedWeeks[lastWi];
  if(S.weekMons) S.weekMons.pop();
  if((S.extraWeeks||0) > 0) S.extraWeeks = S.extraWeeks - 1;
  rebuildWeeks();
  if(S.week >= WEEK_MONS.length){
    S.week = WEEK_MONS.length - 1;
  }
  saveState();
  renderWeekNav(); renderOverview(); renderTopStats();
}

function deleteCurrentWeek(){
  if(WEEK_MONS.length <= 1) return;
  var wi = S.week;
  var hasData = false;
  if(S.weekData[wi]){
    SITES.forEach(function(site){
      DK.forEach(function(dk){
        var cell = S.weekData[wi][site][dk];
        if(cell && (cell.act !== null || cell.locked)) hasData = true;
      });
    });
  }
  var monLabel = fmt(WEEK_MONS[wi]) + '～' + fmt(addDays(WEEK_MONS[wi],6));
  var msg = '確定要刪除「'+monLabel+'」這週的資料嗎？\n此操作無法復原。'+(hasData?'\n\n⚠ 此週已有確認數值！':'');
  if(!confirm(msg)) return;

  // 從 S.weekMons 直接移除這個週
  if(!S.weekMons || S.weekMons.length === 0) S.weekMons = WEEK_MONS.slice();
  S.weekMons.splice(wi, 1);

  // 重排 weekData：把 wi 之後的 index 全部 -1
  var newWeekData = {};
  var newArchivedWeeks = {};
  Object.keys(S.weekData).forEach(function(k){
    var n = +k;
    if(n < wi) { newWeekData[n] = S.weekData[n]; }
    else if(n > wi) { newWeekData[n-1] = S.weekData[n]; }
    // n===wi: 刪掉
  });
  Object.keys(S.archivedWeeks||{}).forEach(function(k){
    var n = +k;
    if(n < wi) { newArchivedWeeks[n] = true; }
    else if(n > wi) { newArchivedWeeks[n-1] = true; }
  });
  S.weekData = newWeekData;
  S.archivedWeeks = newArchivedWeeks;
  if((S.extraWeeks||0) > 0) S.extraWeeks = S.extraWeeks - 1;

  // 用新的 S.weekMons 重建（不會再從 WEEK_START 生成）
  rebuildWeeks();
  // 重算未鎖定的 est（因 index 移位後日期對應改變）
  recompAll();

  if(S.week >= WEEK_MONS.length) S.week = WEEK_MONS.length - 1;
  if(S.week < 0) S.week = 0;
  saveState();
  renderWeekNav(); renderOverview(); renderTopStats();
}

function togglePastExpand(){
  S.pastExpanded = !S.pastExpanded;
  renderWeekNav();
}
function selWeek(i) {
  S.week=i; ensureWeek(i);
  renderWeekNav(); renderOverview(); renderTopStats();
}
function archiveWeek(wi){
  if(!S.archivedWeeks) S.archivedWeeks={};
  S.archivedWeeks[wi]=true;
  S.pastExpanded=true;
  if(S.week===wi){
    for(var i=0;i<WEEK_MONS.length;i++){
      if(!S.archivedWeeks[i]){S.week=i;break;}
    }
  }
  saveState(); renderWeekNav(); renderOverview(); renderTopStats();
}
function unarchiveWeek(wi){
  if(S.archivedWeeks) delete S.archivedWeeks[wi];
  S.week=wi;
  saveState(); renderWeekNav(); renderOverview(); renderTopStats();
}

function renderTopStats() {
  var base = calcStockBase();
  // 計算基準日當天的庫存起始值（含基準日之後、非 monthInit 的進出）
  var totalIn = base.baseQty;
  S.stockLog.forEach(function(e) {
    if(e.type === 'monthInit') {
      if(base.baseDate && e.date > base.baseDate) totalIn += e.qty;
      return;
    }
    if(!base.baseDate || e.date >= base.baseDate) totalIn += e.qty;
  });
  var running = totalIn;
  var shortDate = null, shortQty = 0;
  for(var wi=0; wi<WEEK_MONS.length; wi++){
    ensureWeek(wi);
    for(var di=0; di<7; di++){
      var ds = wkDs(wi, di);
      if(!ds) continue;
      var dayTotal = 0;
      if(base.baseDate && ds < base.baseDate) { continue; } // 基準日之前跳過
      SITES.forEach(function(site){
        var cell = S.weekData[wi][site][DK[di]];
        dayTotal += (cell.act !== null ? cell.act : cell.est);
      });
      running -= dayTotal;
      if(running < 0 && shortDate === null){
        shortDate = ds;
        shortQty = -running;
      }
    }
  }
  var stab = document.getElementById('stab-alert');
  var body = document.getElementById('drawer-alert-body');
  var inline = document.getElementById('inline-alert');
  if(shortDate){
    var now = new Date();
    var today = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
    var diffDays = (new Date(shortDate).getTime() - new Date(today).getTime()) / 86400000;
    var urgent = diffDays <= 7;
    if(stab) stab.classList.add('has-alert');
    var alertHtml = '<div class="alert-ok">⚠ <strong>庫存不足</strong><br>'
      +'預計 <b>'+fmt(shortDate)+'</b> 缺少 <b>'+Math.ceil(shortQty)+' 隻</b>，請儘速叫貨！'
      +(urgent ? '<br><span style="font-size:24px;opacity:.8;">（'+Math.round(diffDays)+'天後）</span>' : '')
      +'</div>';
    if(body) body.innerHTML = alertHtml;
    var tcu = 'text-combine-upright:all;-webkit-text-combine:horizontal;';
    if(inline) inline.innerHTML = '<div class="alert-ok">⚠ 庫存不足・<span style="'+tcu+'">'+fmt(shortDate)+'</span>缺<span style="'+tcu+'">'+Math.ceil(shortQty)+'</span>隻</div>';
  } else {
    if(stab) stab.classList.remove('has-alert');
    var safeHtml = '<div class="alert-safe">✓ 庫存充足，目前無缺貨風險。</div>';
    if(body) body.innerHTML = safeHtml;
    if(inline) inline.innerHTML = '<div class="alert-safe">✓ 庫存充足</div>';
  }
}

function siteTag(s){
  if(s==='F20') return 'WEEKLY';
  if(s==='AP6B') return 'BI-WK';
  if(s==='P8') return 'WK-12';
  if(s==='群聯') return 'WEEKLY';
  if(s==='央廚') return 'DAILY';
  if(s==='聯電') return 'DAILY';
  return 'MANUAL';
}
function updEst(site,wi,dk,v){S.weekData[wi][site][dk].est=+v||0;renderTopStats();saveState();}
function updAct(site,wi,dk,v){S.weekData[wi][site][dk].act=+v||0;renderTopStats();updStockCalc();saveState();}
function fillAct(site,wi,dk){
  var cell=S.weekData[wi][site][dk];
  cell.act=cell.est; cell.locked=true;
  renderOverview();renderTopStats();updStockCalc();saveState();
}

function lockWeek(site,wi){
  ensureWeek(wi);
  var allLocked = DK.every(function(dk){
    var cell=S.weekData[wi][site][dk];
    return cell.locked || (cell.est===0 && cell.act===null);
  });
  if(allLocked){
    DK.forEach(function(dk){
      S.weekData[wi][site][dk].locked = false;
      S.weekData[wi][site][dk].act = null;
    });
  } else {
    DK.forEach(function(dk){
      var cell=S.weekData[wi][site][dk];
      if(cell.est>0 || cell.act!==null){
        if(cell.act===null) cell.act=cell.est;
        cell.locked=true;
      }
    });
  }
  renderOverview();renderTopStats();updStockCalc();saveState();
}

function unlockCell(site,wi,dk){
  var cell = S.weekData[wi][site][dk];
  cell.locked = false;
  cell.act = null;
  renderOverview();renderTopStats();updStockCalc();saveState();
}

function getBlockBadge(id) {
  var tmw = twoMonthWeeks();
  if(id==='F20'){
    var dc=tmw.filter(function(m){return f20DinnerWeeks[m]==='on';}).length;
    var hc=tmw.filter(function(m){return f20Holi1500[m]==='on';}).length;
    return '全週午餐・15:00 '+hc+'週・晚餐 '+dc+'週';
  }
  if(id==='AP6B') return '午'+ap6bCfg.lunchQty+'隻・晚'+ap6bCfg.dinnerQty+'隻';
  if(id==='P8'){
    var pc=tmw.filter(function(m){return p8Weeks[m]==='on';}).length;
    return pc?pc+'週・'+(pc*p8Cfg.wkQty)+'隻':'未選擇';
  }
  if(id==='群聯'){
    var qm=tmw.filter(function(m){return qunlianWeeks[m]&&qunlianWeeks[m].main==='on';}).length;
    var qd=tmw.filter(function(m){return qunlianWeeks[m]&&qunlianWeeks[m].double==='on';}).length;
    return (qm||qd)?'主餐'+qm+'週 / 雙拼'+qd+'週':'未設定';
  }
  if(id==='央廚'){
    var allYcDays = Object.keys(yangchuDays).filter(function(d){return yangchuDays[d]&&(yangchuDays[d].main==='on'||yangchuDays[d].double==='on');});
    var totalYc = allYcDays.reduce(function(s,d){return s+yangchuDayQty(d);},0);
    return allYcDays.length?allYcDays.length+'天・'+totalYc+'隻':'未設定';
  }
  if(id==='聯電'){
    var activeLdWeeks = tmw.filter(function(mon){var w=lianDianWeeks[mon];return w&&(w.main==='on'||w.double==='on'||w.dinner==='on');});
    var totalLd = activeLdWeeks.reduce(function(s,mon){return s+lianDianDayQty(addDays(mon,1))+lianDianDayQty(addDays(mon,3));},0);
    return activeLdWeeks.length?activeLdWeeks.length+'週・'+totalLd+'隻':'未設定';
  }
  return '';
}

function buildF20Block(tmw) {

function buildOneMonthCal(ym){
  var parts=ym.split('-');
  var yr=+parts[0], mo=+parts[1];
  var firstDay=yr+'-'+String(mo).padStart(2,'0')+'-01';
  var d0=new Date(yr,mo,1); d0.setDate(d0.getDate()-1);
  var lastDay=d0.getFullYear()+'-'+String(d0.getMonth()+1).padStart(2,'0')+'-'+String(d0.getDate()).padStart(2,'0');
  var allDays=dateRange(firstDay,lastDay).filter(function(ds){return isNatHoli(ds)||isWeekend(ds);});
  var mLabel=yr+'年'+mo+'月';

  var html='<div style="background:#fdfbf7;border:2px solid var(--border2);border-radius:12px;padding:12px 14px;min-width:200px;">';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;border-bottom:1px dashed var(--border2);padding-bottom:6px;">';
  html+='<span style="font-size:28px;font-weight:700;font-family:&apos;Patrick Hand&apos;,sans-serif;color:var(--ink);">📆 '+mLabel+'</span>';
  html+='<button onclick="f20RemoveMonth(&apos;'+ym+'&apos;)" style="font-size:22px;background:#fff0f0;border:1.5px solid var(--red);color:var(--red);border-radius:6px;padding:2px 7px;cursor:pointer;font-family:&apos;Patrick Hand&apos;,sans-serif;font-weight:700;" title="移除此月份（不影響已選日期）">移除月份</button>';
  html+='</div>';

  if(allDays.length===0){
    html+='<div style="font-size:24px;color:var(--muted);font-family:&apos;Patrick Hand&apos;,sans-serif;">該月無假日</div>';
  } else {
    html+='<div style="display:flex;flex-wrap:wrap;gap:6px;">';
    allDays.forEach(function(ds){
      var d=new Date(ds), dl=['日','一','二','三','四','五','六'][d.getDay()];
      var isNH=isNatHoli(ds), isSat=d.getDay()===6, isSun=d.getDay()===0;
      var isSel=!!f20HoliDays[ds];
      var dayNum=d.getDate();
      var bg,bc,tc;
      if(isSel){       bg='var(--red)';  bc='var(--red)';    tc='white';}
      else if(isNH){   bg='#fff0f0';     bc='#e57373';       tc='var(--red)';}
      else if(isSat){  bg='#fffde7';     bc='#f9c846';       tc='var(--gold2)';}
      else {           bg='#f5f5f5';     bc='var(--border2)';tc='var(--dim)';}
      html+='<button onclick="toggleF20HoliDay(&apos;'+ds+'&apos;)" '+
        'style="background:'+bg+';border:2px solid '+bc+';color:'+tc+';border-radius:8px;'+
        'padding:5px 7px;cursor:pointer;font-family:&apos;Patrick Hand&apos;,sans-serif;font-weight:700;'+
        'font-size:24px;line-height:1.3;text-align:center;min-width:88px;'+
        'box-shadow:'+(isSel?'none':'1px 1px 0 rgba(0,0,0,.1)')+'">';
      html+='<div style="font-size:34px;font-family:&apos;Kalam&apos;,cursive;font-weight:700;">'+(isSel?'✓':dayNum)+'</div>';
      html+='<div>週'+dl+'</div>';
      if(isNH) html+='<div style="font-size:18px;opacity:.85;">國定</div>';
      html+='</button>';
    });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function f20AddMonth(){
  if(!f20HoliMonths) f20HoliMonths=[];
  var last;
  if(f20HoliMonths.length===0){
    var d0=new Date(WEEK_MONS[0]);
    last=d0.getFullYear()+'-'+String(d0.getMonth()+1).padStart(2,'0');
  } else {
    last=f20HoliMonths.slice().sort().pop();
  }
  var p=last.split('-'), yr=+p[0], mo=+p[1];
  mo++; if(mo>12){mo=1;yr++;}
  var nm=yr+'-'+String(mo).padStart(2,'0');
  if(f20HoliMonths.indexOf(nm)<0) f20HoliMonths.push(nm);
  saveState(); renderConfig();
}

function buildYangchuBlock(tmw) {
  var firstMon = WEEK_MONS[0], lastMon = WEEK_MONS[WEEK_MONS.length-1];
  var allDays = dateRange(firstMon, addDays(lastMon,6)).filter(function(ds){return isWorkday(ds);});
  var weekGroups = {};
  allDays.forEach(function(ds){
    var mon = weekMonForDate(ds);
    if(!weekGroups[mon]) weekGroups[mon]=[];
    weekGroups[mon].push(ds);
  });
  var totalOn = Object.keys(yangchuDays).filter(function(d){return yangchuDays[d]&&(yangchuDays[d].main==='on'||yangchuDays[d].double==='on');}).length;
  var totalDucks = allDays.reduce(function(s,ds){return s+yangchuDayQty(ds);},0);

  var qtyPanel='<div class="cfg-qty-panel">'+
    '<span style="font-size:24px;color:var(--ink);font-weight:700;font-family:&apos;Patrick Hand&apos;,sans-serif;align-self:center;white-space:nowrap;">設定</span>'+
    cfgQtyField('主餐','yc-main',ycCfg.main,'隻/天','var(--est)')+
    cfgQtyField('雙拼','yc-dbl',ycCfg.dbl,'隻/天','var(--purple)')+
    '<button class="btn btn-sm" style="padding:3px 10px;font-size:24px;" onclick="applyYcQty()">套用</button>'+
    '</div>';

  var rows = Object.keys(weekGroups).sort().map(function(mon){
    var wn = WEEK_MONS.indexOf(mon)+WEEK_BASE_NUM;
    var allLocked = weekGroups[mon].every(function(ds){return yangchuLocked[ds];});
    var anyUnlocked = weekGroups[mon].some(function(ds){return !yangchuLocked[ds];});

    var dayBtns = weekGroups[mon].map(function(ds){
      var d=new Date(ds), dl=['日','一','二','三','四','五','六'][d.getDay()];
      var dd=yangchuDays[ds]||{};
      var dateLabel=(d.getMonth()+1)+'/'+d.getDate()+' 週'+dl;
      var mainOn=dd.main==='on', dblOn=dd.double==='on';
      var dayTotal=yangchuDayQty(ds);
      var locked=yangchuLocked[ds];
      var hasData = mainOn||dblOn;

      if(locked){
        var lockedColor = hasData ? 'var(--green)' : 'var(--muted)';
        var lockedLabel = hasData ? (dayTotal+'隻 ('+(mainOn?'主餐':'')+(mainOn&&dblOn?'+':'')+(dblOn?'雙拼':'')+')') : '— 無出貨';
        return '<div style="display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px dashed var(--border2);">'+
          '<div style="font-size:26px;font-family:&apos;Patrick Hand&apos;,sans-serif;font-weight:700;min-width:144px;color:var(--dim);">'+dateLabel+'</div>'+
          '<span style="font-size:26px;font-weight:700;color:'+lockedColor+';flex:1;">🔒 '+lockedLabel+'</span>'+
          '<button class="wk-toggle-btn off" style="font-size:22px;padding:2px 8px;border-color:var(--muted);box-shadow:none;" onclick="ycUnlock(&apos;'+ds+'&apos;)">修改</button>'+
          '</div>';
      }

      return '<div style="display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px dashed var(--border2);">'+
        '<div style="font-size:26px;font-family:&apos;Patrick Hand&apos;,sans-serif;font-weight:700;min-width:144px;color:var(--dim);">'+dateLabel+'</div>'+

        '<button class="wk-toggle-btn '+(dblOn?'on-purple':'off')+'" style="font-size:24px;padding:3px 8px;" onclick="toggleYangchu(&apos;'+ds+'&apos;,&apos;double&apos;)">'+(dblOn?'✓ 雙拼':'+ 雙拼')+'</button>'+
        '<div style="font-size:32px;font-family:&apos;Kalam&apos;,cursive;color:var(--est);min-width:72px;text-align:right;font-weight:700;">'+(dayTotal?dayTotal+'隻':'—')+'</div>'+
        '<button class="wk-toggle-btn off" style="font-size:24px;padding:3px 8px;border-color:var(--green);color:var(--green);" onclick="ycLockDay(&apos;'+ds+'&apos;)">🔒 確認</button>'+
        '</div>';
    }).join('');

    var weekHeader='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">'+
      '<div style="font-size:32px;font-weight:700;font-family:&apos;Patrick Hand&apos;,sans-serif;color:var(--est);">第 '+wn+' 週</div>'+
      '<div style="display:flex;align-items:center;gap:8px;">'+
      (anyUnlocked?'<button class="btn btn-sm" style="font-size:24px;padding:4px 10px;background:#e8f5e9;border:1.5px solid var(--green);color:var(--green);" onclick="ycLockWeekEmpty(&apos;'+mon+'&apos;)">🔒 鎖定本週空白</button>':
       '<span style="font-size:26px;font-weight:700;font-family:&apos;Patrick Hand&apos;,sans-serif;color:var(--green);">✅ 全週已鎖定</span>')+
      cfgConfirmBtn('央廚',mon)+

    return '<div style="background:white;border:1.5px solid var(--border2);border-radius:8px;padding:12px 16px;margin-bottom:10px;">'+
      weekHeader+dayBtns+'</div>';
  }).join('');

  return qtyPanel+
    '<div style="font-size:28px;color:var(--dim);margin-bottom:12px;font-family:&apos;Patrick Hand&apos;,sans-serif;">已選 <b style="color:var(--gold);font-size:36px;">'+totalOn+'</b> 天・預計 <b style="color:var(--gold);font-size:36px;">'+totalDucks+'</b> 隻</div>'+
    '<div style="max-height:420px;overflow-y:auto;padding-right:5px;">'+rows+'</div>';
}

function toggleYangchu(ds,type){

  yangchuDays[ds][type]=(yangchuDays[ds][type]==='on')?'':'on';

}
function ycLockDay(ds){

function ycUnlock(ds){

function ycLockWeekEmpty(mon){
  var fm=WEEK_MONS[0],lm=WEEK_MONS[WEEK_MONS.length-1];
  var allDays=dateRange(fm,addDays(lm,6)).filter(function(d){return isWorkday(d)&&weekMonForDate(d)===mon;});

    if(!yangchuLocked[ds]) yangchuLocked[ds]=true;
  });
  renderConfig();saveState();
}

  }, 0);
  var totalOn = tmw.filter(function(mon){
    var w=lianDianWeeks[mon]; return w&&(w.main==='on'||w.double==='on'||w.dinner==='on');
  }).length;

  var qtyPanel='<div class="cfg-qty-panel">'+
    '<span style="font-size:24px;color:var(--ink);font-weight:700;font-family:&apos;Patrick Hand&apos;,sans-serif;align-self:center;white-space:nowrap;">隻數設定</span>'+
    cfgQtyField('主餐（週二）','ld-main',lianDianCfg.main,'隻','var(--est)')+
    cfgQtyField('雙拼（週四）','ld-dbl',lianDianCfg.dbl,'隻','var(--purple)')+
    cfgQtyField('晚餐（週四）','ld-din',lianDianCfg.dinner,'隻','var(--blue)')+
    '<button class="btn btn-sm" style="padding:3px 10px;font-size:24px;" onclick="applyLdQty()">套用</button>'+
    '</div>';

  var rows = tmw.map(function(mon){
    var wn = WEEK_MONS.indexOf(mon)+WEEK_BASE_NUM, wd = workdaysInWeek(mon);
    var w = lianDianWeeks[mon]||{main:'',double:'',dinner:''};
    var tue = addDays(mon,1), thu = addDays(mon,3);
    var wkTotal = lianDianDayQty(tue) + lianDianDayQty(thu);
    return '<div class="wk-row">'+
      '<div class="wr-info"><div class="wr-label">第 '+wn+' 週</div><div class="wr-range">'+weekRange(mon)+'・'+wd+'平日</div></div>'+
      '<div style="display:flex;flex-direction:column;gap:2px;font-size:22px;color:var(--dim);font-family:&apos;Patrick Hand&apos;,sans-serif;margin-right:8px;line-height:1.3;">'+
        '<span>週二 '+fmt(tue)+'</span><span>週四 '+fmt(thu)+'</span>'+

      mkToggleBtn(w.dinner,'on-check','toggleLd(&apos;'+mon+'&apos;,&apos;dinner&apos;)','晚餐')+

// ── shared 3-state helpers ──
function cycle3(cur){
  if(!cur||cur==='') return 'on';
  if(cur==='on') return 'skip';
  return '';
}

function mkToggleBtn(state, onCls, onclick, label){
  var cls, txt;
  if(state==='on')  { cls='wk-toggle-btn '+onCls; txt='✓ '+label; }
  else if(state==='skip'){ cls='wk-toggle-btn on-skip'; txt='— '+label; }
  else               { cls='wk-toggle-btn off'; txt='+ '+label; }
  return '<button class="'+cls+'" onclick="'+onclick+'">'+txt+'</button>';
}

function wkRow3(mon, wn, wd, state, onCls, fnName, activeLabel, extra){
  var btn = mkToggleBtn(state, onCls, fnName+'(&apos;'+mon+'&apos;)', state==='on'?'已選':state==='skip'?'不調整':'加入');
  var cls, txt;
  if(state==='on')   {cls='wk-toggle-btn '+onCls; txt='✓ 已選';}
  else if(state==='skip'){cls='wk-toggle-btn on-skip'; txt='— 不調整';}
  else               {cls='wk-toggle-btn off'; txt='+ 加入';}
  return '<div class="wk-row">'+
    '<div class="wr-info"><div class="wr-label">第 '+wn+' 週</div><div class="wr-range">'+weekRange(mon)+'・'+wd+'平日</div></div>'+
    '<button class="'+cls+'" onclick="'+fnName+'(&apos;'+mon+'&apos;)">'+ txt+'</button>'+
    (extra||'')+
    '<div class="wk-qty">'+(state==='on'?activeLabel:state==='skip'?'<span style="color:var(--muted);font-family:&apos;Patrick Hand&apos;,sans-serif;font-size:28px;">略過</span>':'—')+'</div>'+
    '</div>';
}

function addStock(){
  var date=document.getElementById('in-date').value;
  var qty=+document.getElementById('in-qty').value;
  var note=document.getElementById('in-note').value;
  if(!date||isNaN(qty)||qty===0){alert('請填入日期及數量（可輸入負數代表盤差）');return;}
  S.stockLog.push({date:date,qty:qty,note:note});
  document.getElementById('in-qty').value='';
  document.getElementById('in-note').value='';
  renderStockLog();updStockCalc();renderTopStats();saveState();
}
function addMonthInit(){
  var date=document.getElementById('month-init-date').value;
  var qty=+document.getElementById('month-init-qty').value;
  if(!date||isNaN(qty)||qty===''){alert('請填入日期及實際庫存隻數');return;}
  // qty 直接作為月初實際庫存基準（realQty），不再需要算 diff
  S.stockLog.push({date:date,qty:0,note:'📅 月初庫存 '+qty+'隻',type:'monthInit',realQty:qty});
  document.getElementById('month-init-qty').value='';
  renderStockLog();updStockCalc();renderTopStats();saveState();
}
function removeStock(i){
  S.stockLog.splice(i,1);
  renderStockLog();
  renderOverview();
  renderTopStats();
  saveState();
}
function renderStockLog(){
  document.getElementById('stock-log').innerHTML=S.stockLog.map(function(e,i){
    var isMonthInit = e.type==='monthInit';
    // 月初庫存：顯示實際庫存數（realQty），其他：顯示 qty 差值
    var displayQty = isMonthInit ? (e.realQty !== undefined ? e.realQty : e.qty) : e.qty;
    var displayColor = isMonthInit ? 'var(--blue)' : (e.qty<0?'var(--red)':'var(--act)');
    var displaySign = isMonthInit ? '' : (e.qty>0?'+':'');
    return '<div class="sle"><span class="sd">'+e.date+'</span><span class="sn2">'+(e.note||'—')+'</span>'+
      '<span class="sq" style="color:'+displayColor+';">'+displaySign+displayQty+' 隻</span>'+
      '<button onclick="removeStock('+i+')" style="font-size:24px;background:#ffebee;border:1.5px solid var(--red);color:var(--red);border-radius:6px;padding:2px 8px;cursor:pointer;margin-left:12px;font-family:&apos;Patrick Hand&apos;,sans-serif;font-weight:700;">刪</button></div>';
  }).join('');
}
function updStockCalc(){
  renderTopStats();
  renderOverview();
}
function updateThreshold(){S.threshold=+document.getElementById('thr-in').value||50;renderTopStats();renderOverview();saveState();}

function applyRemoteData(data) {
  if(!data) return;
  if(data.weekData)       S.weekData        = data.weekData;
  if(data.stockLog)       S.stockLog        = data.stockLog;
  if(data.f20Cfg)         Object.assign(f20Cfg,        data.f20Cfg);
  if(data.f20LunchWeeks)  f20LunchWeeks     = data.f20LunchWeeks;
  if(data.f20DinnerWeeks) f20DinnerWeeks    = data.f20DinnerWeeks;
  if(data.f20Holi1500)    f20Holi1500       = data.f20Holi1500;
  if(data.f20HoliDays)    f20HoliDays       = data.f20HoliDays;
  if(data.ap6bCfg)        Object.assign(ap6bCfg,       data.ap6bCfg);
  if(data.p8Cfg)          Object.assign(p8Cfg,         data.p8Cfg);
  if(data.p8Weeks)        p8Weeks           = data.p8Weeks;
  if(data.qlCfg)          Object.assign(qlCfg,         data.qlCfg);
  if(data.qunlianWeeks)   qunlianWeeks      = data.qunlianWeeks;
  if(data.ycCfg)          Object.assign(ycCfg,         data.ycCfg);
  if(data.yangchuDays)    yangchuDays       = data.yangchuDays;
  if(data.yangchuLocked)  yangchuLocked     = data.yangchuLocked;
  if(data.lianDianCfg)    Object.assign(lianDianCfg,   data.lianDianCfg);
  if(data.lianDianWeeks)  lianDianWeeks     = data.lianDianWeeks;
  if(data.extraWeeks !== undefined) S.extraWeeks = data.extraWeeks;
  if(data.archivedWeeks)  S.archivedWeeks   = data.archivedWeeks;
  if(data.f20HoliMonths)  f20HoliMonths     = data.f20HoliMonths;
  if(data.threshold !== undefined) S.threshold = data.threshold;
  if(data.cfgWeekConfirmed) cfgWeekConfirmed = data.cfgWeekConfirmed;
  if(data.weekMons && data.weekMons.length) S.weekMons = data.weekMons;
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
var _initialized = false;

function _bootApp(user) {
  injectStatusBar('estimate');
  _triggerSave = makeAutoSave('estimate', getEstimateData, 2000);

  startSync('estimate', user, function(remoteData) {
    if(!_initialized) {
      // 首次載入：套用資料並完整初始化
      if(remoteData) {
        applyRemoteData(remoteData);
      } else {
        loadState();
      }
      _initialized = true;
      _finishInit();
    } else {
      // 已初始化後收到遠端更新：只在不是自己剛觸發的存檔時才套用
      // 用時間戳判斷：若 lastSaved 是自己，跳過（makeAutoSave 已處理）
      if(remoteData) {
        applyRemoteData(remoteData);
        renderWeekNav();
        renderOverview();
        renderTopStats();
      }
    }
  });
}

function _finishInit() {
  if(!S.archivedWeeks) S.archivedWeeks={};
  if(!S.pastExpanded) S.pastExpanded=false;
  rebuildWeeks();
  Object.keys(S.weekData).forEach(function(wi){
    var n = +wi;
    if(isNaN(n) || n < 0 || n >= WEEK_MONS.length || !WEEK_MONS[n]){
      delete S.weekData[wi];
    }
  });
  if(!f20HoliMonths || f20HoliMonths.length===0){
    var d0=new Date(WEEK_MONS[0]);
    var m0=d0.getFullYear()+'-'+String(d0.getMonth()+1).padStart(2,'0');
    var d1=new Date(d0); d1.setMonth(d1.getMonth()+1);
    var m1=d1.getFullYear()+'-'+String(d1.getMonth()+1).padStart(2,'0');
    f20HoliMonths=[m0,m1];
  }
  var now = new Date();
  var todayDs = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  var curWi = 0;
  for(var i=0;i<WEEK_MONS.length;i++){
    if(WEEK_MONS[i] <= todayDs && addDays(WEEK_MONS[i],6) >= todayDs){ curWi=i; break; }
    if(WEEK_MONS[i] > todayDs){ curWi=i; break; }
    curWi = i;
  }
  S.week = curWi;
  document.getElementById('in-date').value = todayDs;
  var thrEl = document.getElementById('thr-in'); if(thrEl) thrEl.value = S.threshold||50;
  var mid=document.getElementById('month-init-date'); if(mid) mid.value=todayDs;
  renderWeekNav();
  renderOverview();
  renderTopStats();
}

// 本機 file:// 開啟時自動進入測試模式，不跳轉 index.html
if(window.location.protocol === 'file:') {
  try {
    if(!localStorage.getItem('adminhub_test_user')) {
      localStorage.setItem('adminhub_test_user', JSON.stringify({displayName:'本機預覽',email:'local@preview'}));
    }
  } catch(e) {}
}
requireAuth(_bootApp);
