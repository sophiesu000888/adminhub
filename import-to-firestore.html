function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

async function doImport() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').textContent = '';
  log('🔐 登入驗證中…');

  requireAuth(async (user) => {
    log(`✅ 已登入：${user.email}`);
    log(`📝 準備寫入 ${ITEMS.length} 筆品項…`);

    try {
      const db = firebase.firestore();
      // 讀取現有資料
      const snap = await db.collection('userData').doc(user.uid).get();
      const existing = snap.exists ? (snap.data().items || []) : [];
      log(`ℹ️  現有品項：${existing.length} 筆`);

      if (existing.length > 0) {
        const ok = confirm(`Firestore 已有 ${existing.length} 筆品項，確定要覆蓋嗎？`);
        if (!ok) { log('❌ 已取消'); btn.disabled = false; return; }
      }

      await db.collection('userData').doc(user.uid).set(
        { items: ITEMS },
        { merge: true }
      );

      log(`✅ 成功匯入 ${ITEMS.length} 筆品項！`);
      log('👉 請前往 items.html 確認資料。');
    } catch (e) {
      log('❌ 錯誤：' + e.message);
      btn.disabled = false;
    }
  });
}
