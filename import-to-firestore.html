function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

async function doImport() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').textContent = '';
  log('🔐 登入驗證中…');

  requireAuth(async (user) => {
    log(`✅ 已登入：${user.email}`);
    log(`📝 準備寫入 ${ITEMS.length} 筆品項…`);

    try {
      const db = firebase.firestore();
      // 讀取現有資料（路徑與 items.html 一致：modules/items）
      const snap = await db.collection('modules').doc('items').get();
      const existing = snap.exists ? (snap.data().content || []) : [];
      log(`ℹ️  現有品項：${existing.length} 筆`);

      if (existing.length > 0) {
        const ok = confirm(`Firestore 已有 ${existing.length} 筆品項，確定要覆蓋嗎？`);
        if (!ok) { log('❌ 已取消'); btn.disabled = false; return; }
      }

      await db.collection('modules').doc('items').set({
        content: ITEMS,
        lastSaved: {
          uid: user.uid,
          displayName: user.displayName || user.email,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }
      });

      log(`✅ 成功匯入 ${ITEMS.length} 筆品項！`);
      log('👉 請前往 items.html 確認資料。');
    } catch (e) {
      log('❌ 錯誤：' + e.message);
      btn.disabled = false;
    }
  });
}
